<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:radial-gradient(ellipse at 20% 30%,#eef2f9,#d9e2ec);min-height:100vh;padding:1rem}
    .glass-header{background:linear-gradient(135deg,rgba(30,58,65,.95),rgba(20,45,50,.95));border-radius:2rem;margin-bottom:1.5rem;padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;box-shadow:0 8px 20px rgba(0,0,0,.1);color:white}
    .back-btn{background:rgba(255,255,255,.15);border:0;padding:8px 18px;border-radius:40px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:6px;color:white}.admin-title{font-weight:800;background:rgba(255,255,255,.2);padding:6px 20px;border-radius:40px;font-size:.9rem}
    .chat-container{max-width:1400px;margin:0 auto;display:flex;flex-wrap:wrap;gap:1.5rem}.contacts-panel{flex:1.2;min-width:290px;background:rgba(255,255,255,.96);border-radius:1.8rem;box-shadow:0 12px 28px rgba(0,0,0,.08);overflow:hidden;border:1px solid rgba(0,0,0,.05)}
    .panel-header{background:#f8fafc;padding:1.2rem;border-bottom:1px solid #e2e8f0}.panel-header h2{font-size:1.2rem;font-weight:900;color:#1e5a4c;display:flex;align-items:center;gap:8px}.me-box{font-size:.78rem;color:#64748b;margin-top:6px;font-weight:700}
    .search-box{margin-top:12px;display:flex;gap:8px}.search-box input{flex:1;padding:10px 16px;border-radius:2rem;border:1px solid #e2e8f0;background:white;font-size:.85rem;outline:none}.search-box button{border:0;background:#1f6e68;color:white;border-radius:2rem;padding:0 14px;font-weight:800;cursor:pointer}
    .contacts-list{max-height:610px;overflow-y:auto}.contact-item{padding:1rem;border-bottom:1px solid #edf2f7;cursor:pointer;transition:.2s;display:flex;align-items:center;gap:12px}.contact-item.active{background:#eef6f4;border-left:4px solid #1f6e68}.contact-item.pending{background:#fff7ed}.contact-item.blocked{opacity:.58;background:#f1f5f9}
    .contact-avatar{width:45px;height:45px;background:linear-gradient(135deg,#1f6e68,#155a54);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:.9rem;position:relative}.contact-dot{width:10px;height:10px;border-radius:50%;background:#94a3b8;border:2px solid #fff;position:absolute;right:0;bottom:0}.contact-dot.online{background:#22c55e}.contact-info{flex:1;min-width:0}.contact-name{font-weight:800;color:#1e5a4c}.contact-role{font-size:.7rem;color:#6b8c9c}.last-msg{font-size:.7rem;color:#94a3b8;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}.unread-badge{background:#e84c3d;color:white;font-size:.6rem;font-weight:800;padding:2px 6px;border-radius:20px}
    .online-dot{width:10px;height:10px;background:#22c55e;border-radius:50%;display:inline-block;margin-left:6px;box-shadow:0 0 0 3px rgba(34,197,94,.15)}
    .section-chip{background:#e2e8f0;color:#334155;font-size:.68rem;font-weight:900;padding:3px 9px;border-radius:999px;margin-left:6px}
    .mini-btn{border:1px solid #1f6e68;background:white;color:#1f6e68;border-radius:30px;padding:5px 9px;font-size:.7rem;font-weight:900;cursor:pointer}.mini-danger{border-color:#b91c1c;color:#b91c1c}
    .chat-panel{flex:2.2;min-width:320px;background:rgba(255,255,255,.96);border-radius:1.8rem;box-shadow:0 12px 28px rgba(0,0,0,.08);display:flex;flex-direction:column;overflow:hidden;border:1px solid rgba(0,0,0,.05)}
    .chat-header{background:#f8fafc;padding:1rem 1.2rem;border-bottom:1px solid #e2e8f0;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:10px}.chat-contact{display:flex;align-items:center;gap:12px}.chat-avatar{width:48px;height:48px;background:linear-gradient(135deg,#1f6e68,#155a54);border-radius:50%;display:flex;align-items:center;justify-content:center;color:white;font-weight:900;font-size:1rem}
    .contact-actions{display:flex;gap:10px;flex-wrap:wrap}.action-icon{background:#eef2f5;border-radius:30px;padding:8px 12px;display:flex;align-items:center;gap:4px;cursor:pointer;color:#2c655e;border:0;font-weight:900}.action-icon:hover{background:#1f6e68;color:white}.danger-action{color:#b91c1c}.danger-action:hover{background:#b91c1c;color:white}
    .messages-area{flex:1;padding:1rem;overflow-y:auto;max-height:500px;background:#fcfdfe;display:flex;flex-direction:column}.message-wrapper{margin-bottom:1rem;display:flex;flex-direction:column;position:relative}.message-bubble{display:flex;align-items:flex-start;gap:8px}.sent-msg{justify-content:flex-end}.received-msg{justify-content:flex-start}.bubble{max-width:70%;padding:10px 14px;border-radius:1.2rem;font-size:.85rem;line-height:1.4;word-wrap:break-word;position:relative}.sent-msg .bubble{background:#1f6e68;color:white;border-bottom-right-radius:4px}.received-msg .bubble{background:#eef6f4;color:#1e5a4c;border-bottom-left-radius:4px}
    .msg-media{max-width:220px;max-height:170px;border-radius:.8rem;margin-top:5px;cursor:pointer;display:block}.msg-time{font-size:.6rem;opacity:.75;margin-top:4px;text-align:right}.delete-msg-icon{position:absolute;right:-4px;top:-8px;opacity:0;transition:.2s;cursor:pointer;color:#64748b;background:white;border:1px solid #e2e8f0;border-radius:50%;width:25px;height:25px;display:flex;align-items:center;justify-content:center}.message-wrapper:hover .delete-msg-icon{opacity:1}
    .reply-area{padding:1rem;background:white;border-top:1px solid #e2e8f0}.input-group{display:flex;gap:10px;align-items:center}.reply-area textarea{flex:1;padding:10px 16px;border-radius:2rem;border:1px solid #e2e8f0;resize:none;font-family:inherit;font-size:.85rem;outline:none}.attach-btn,.send-btn{background:#1f6e68;color:white;border:0;padding:9px 16px;border-radius:2rem;cursor:pointer;display:flex;align-items:center;gap:4px;font-weight:800}.attach-btn{background:#e2e8f0;color:#2c655e}.reply-disabled{padding:14px;text-align:center;color:#b91c1c;font-weight:900;background:#fff1f2;border-radius:18px}
    .preview-area{display:flex;flex-wrap:wrap;gap:8px;margin-top:8px}.preview-item{position:relative;display:inline-block}.preview-item img,.preview-item video{width:65px;height:65px;object-fit:cover;border-radius:8px;border:1px solid #e2e8f0}.preview-item audio{width:170px;height:38px}.remove-preview{position:absolute;top:-6px;right:-6px;background:#b91c1c;color:white;border-radius:50%;width:18px;height:18px;font-size:10px;display:flex;align-items:center;justify-content:center;cursor:pointer}
    .media-actions{display:flex;gap:6px;align-items:center;margin-top:7px;flex-wrap:wrap}.download-media-btn{display:inline-flex;align-items:center;gap:4px;text-decoration:none;border:1px solid rgba(31,110,104,.25);background:rgba(255,255,255,.9);color:#1f6e68;border-radius:999px;padding:5px 9px;font-size:.68rem;font-weight:900}.sent-msg .download-media-btn{background:rgba(255,255,255,.16);color:white;border-color:rgba(255,255,255,.35)}.audio-card{min-width:220px;margin-top:5px}.audio-card audio{width:100%}.image-viewer{display:none;position:fixed;inset:0;background:rgba(0,0,0,.92);z-index:99999;justify-content:center;align-items:center;padding:12px}.image-viewer.open{display:flex}.image-viewer img{max-width:96vw;max-height:92vh;border-radius:14px;box-shadow:0 16px 40px rgba(0,0,0,.45)}.image-viewer-close{position:absolute;right:18px;top:18px;background:white;color:#111;border:0;border-radius:999px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer;font-weight:900}
    .chat-menu-wrap{position:relative;display:inline-flex;align-items:center}.chat-menu-btn{background:#eef2f5;border:0;border-radius:50%;width:40px;height:40px;display:flex;align-items:center;justify-content:center;color:#2c655e;cursor:pointer;font-weight:900}.chat-menu-btn:hover{background:#1f6e68;color:white}.chat-menu{position:absolute;right:0;top:46px;background:white;border:1px solid #e2e8f0;border-radius:14px;box-shadow:0 16px 38px rgba(15,23,42,.18);min-width:205px;z-index:3000;display:none;overflow:hidden}.chat-menu.open{display:block}.chat-menu button{width:100%;border:0;background:white;padding:12px 14px;text-align:left;font-weight:900;color:#334155;cursor:pointer;display:flex;align-items:center;gap:8px}.chat-menu button:hover{background:#f1f5f9}.chat-menu button.danger-menu{color:#b91c1c}.chat-menu button.danger-menu:hover{background:#fff1f2}.scroll-bottom-btn{position:fixed;right:22px;bottom:96px;width:52px;height:52px;border:0;border-radius:50%;background:#1f6e68;color:white;display:none;align-items:center;justify-content:center;z-index:2500;cursor:pointer;box-shadow:0 10px 24px rgba(15,23,42,.28)}.scroll-bottom-btn.show{display:flex}.scroll-bottom-btn .material-icons{font-size:2rem}

    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center;z-index:2000}.modal-content{background:white;max-width:430px;width:90%;border-radius:1.5rem;padding:1.5rem;text-align:center}.modal-buttons{display:flex;gap:10px;justify-content:center;margin-top:1rem;flex-wrap:wrap}.modal button{border:0;border-radius:2rem;padding:8px 14px;font-weight:900;cursor:pointer}.toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:white;padding:8px 16px;border-radius:40px;font-size:.8rem;z-index:1000}.toast.err{background:#b91c1c}
  

    /* ===== Mobile full chat + realtime typing UI ===== */
    #typingIndicator{font-size:.72rem;color:#22c55e;font-weight:900;margin-top:2px;min-height:14px}
    @media(max-width:860px){
      body{padding:.6rem;overflow-x:hidden}
      .glass-header{margin-bottom:.8rem;border-radius:1.4rem;padding:.7rem 1rem}
      .chat-container{display:flex;flex-direction:column;gap:.8rem;max-width:100%;height:calc(100vh - 86px)}
      .contacts-panel{width:100%;min-width:0;flex:none;border-radius:1.4rem;max-height:calc(100vh - 95px);display:flex;flex-direction:column}
      .contacts-list{max-height:none;flex:1;overflow-y:auto}
      .chat-panel{display:none;width:100%;min-width:0;flex:none;border-radius:1.4rem}
      body.mobile-chat-mode{padding:0;background:#fff;overflow:hidden}
      body.mobile-chat-mode .glass-header{display:none}
      body.mobile-chat-mode .contacts-panel{display:none!important}
      body.mobile-chat-mode .chat-container{height:100vh;margin:0;max-width:100%;display:block}
      body.mobile-chat-mode .chat-panel{display:flex!important;position:fixed;inset:0;z-index:9999;width:100vw;height:100dvh;max-height:100dvh;border-radius:0;border:0;box-shadow:none;min-width:0;background:#fff;flex-direction:column;overflow:hidden}
      body.mobile-chat-mode .chat-header{flex:0 0 auto;border-radius:0;padding:.75rem .8rem;gap:8px;flex-wrap:nowrap}
      body.mobile-chat-mode .chat-contact{min-width:0;flex:1}
      body.mobile-chat-mode .chat-contact>div:last-child{min-width:0}
      body.mobile-chat-mode #chatName{white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:54vw}
      body.mobile-chat-mode .contact-actions{gap:5px;flex-wrap:nowrap}
      body.mobile-chat-mode .action-icon{padding:7px 9px;font-size:.72rem}
      body.mobile-chat-mode .messages-area{flex:1 1 auto;max-height:none;min-height:0;overflow-y:auto;padding:.8rem;padding-bottom:.8rem}
      body.mobile-chat-mode .reply-area{display:block!important;flex:0 0 auto;position:sticky;bottom:0;background:#fff;z-index:50;padding:8px 8px calc(8px + env(safe-area-inset-bottom));border-top:1px solid #e2e8f0}
      body.mobile-chat-mode .input-group{display:flex!important;align-items:center;gap:6px}
      body.mobile-chat-mode .reply-area textarea{min-height:42px;max-height:110px;flex:1;min-width:0;padding:10px 13px}
      body.mobile-chat-mode .attach-btn,body.mobile-chat-mode .send-btn{padding:9px 11px;white-space:nowrap}
      body.mobile-chat-mode .bubble{max-width:82%}
      body.mobile-chat-mode .msg-media{max-width:72vw;max-height:220px}
      .mobile-chat-back{display:none!important}
      body.mobile-chat-mode .mobile-chat-back{display:flex!important;background:#eef2f5;border:0;border-radius:50%;width:38px;height:38px;align-items:center;justify-content:center;color:#1f6e68;cursor:pointer;flex-shrink:0}
      body.mobile-chat-mode .chat-avatar{width:40px;height:40px;font-size:.88rem;flex-shrink:0}
    }

    @media(max-width:860px){
      body.mobile-chat-mode .delete-msg-icon{opacity:1!important;right:6px;top:-10px;width:32px;height:32px;z-index:80;touch-action:manipulation}
      body.mobile-chat-mode #deleteModal{z-index:1000000!important}
    }

  </style>
</head>
<body>
<div class="glass-header">
  <button class="back-btn" id="backBtn"><span class="material-icons" style="font-size:1.2rem">arrow_back</span> Back</button>
  <div class="admin-title">💬 Employee Chat</div>
  <div style="width:80px"></div>
</div>

<div class="chat-container">
  <div class="contacts-panel">
    <div class="panel-header">
      <h2><span class="material-icons">people</span> Contacts</h2>
      <div class="me-box" id="meBox">Loading...</div>
      <div class="search-box">
        <input type="text" id="searchContact" placeholder="Emp ID / Name search for chat request...">
        <button id="searchBtn">Search</button>
      </div>
    </div>
    <div id="contactsList" class="contacts-list">Loading...</div>
  </div>

  <div class="chat-panel">
    <div class="chat-header" id="chatHeader">
      <button class="mobile-chat-back" id="mobileChatBack" type="button"><span class="material-icons">arrow_back</span></button>
      <div class="chat-contact">
        <div class="chat-avatar" id="chatAvatar">👤</div>
        <div>
          <div style="font-weight:800" id="chatName">Select a contact</div>
          <div style="font-size:.72rem;color:#6b8c9c;font-weight:700" id="chatRole"></div>
          <div id="typingIndicator"></div>
        </div>
      </div>
      <div class="contact-actions" id="contactActions"></div>
    </div>
    <div id="messagesArea" class="messages-area">
      <div style="text-align:center;padding:2rem">Select a contact</div>
    </div>
    <div class="reply-area" id="replyArea">
      <div class="input-group">
        <textarea id="messageInput" rows="1" placeholder="Type message... (Ctrl+Enter)"></textarea>
        <button id="attachMediaBtn" class="attach-btn"><span class="material-icons">attach_file</span></button>
        <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none">
        <button id="sendMessageBtn" class="send-btn">Send</button>
      </div>
      <div id="previewArea" class="preview-area"></div>
    </div>
  </div>
</div>

<button id="scrollBottomBtn" class="scroll-bottom-btn" type="button" title="Go to latest message"><span class="material-icons">keyboard_arrow_down</span></button>

<div id="imageViewer" class="image-viewer">
  <button class="image-viewer-close" id="imageViewerClose" type="button"><span class="material-icons">close</span></button>
  <img id="viewerImg" alt="Chat image preview">
</div>

<div id="deleteModal" class="modal">
  <div class="modal-content">
    <h3>Delete Message</h3>
    <p id="deleteMsgText" style="margin-top:10px;color:#475569"></p>
    <div id="bothOptionDiv">
      <button id="deleteBothBtn" style="background:#b91c1c;color:white;margin-top:10px">Delete for Both</button>
    </div>
    <div class="modal-buttons">
      <button id="deleteMeBtn" style="background:#e2e8f0">Delete for Me Only</button>
      <button id="deleteAllChatBtn" style="background:#c47a2e;color:white">Delete Entire Chat</button>
      <button id="cancelDeleteBtn" style="background:#ccc">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);

let state={org:null,me:null,contacts:[],current:null,messages:[],localEchoes:[],pendingMedia:null,pendingDeleteMsgId:null,searchTerm:'',messageChannel:null,typingChannel:null,typingTimer:null,refreshTimer:null,forceScrollBottom:false,lastMessageErrorAt:0,loadMessagesRunning:false,loadContactsRunning:false,lastContactsErrorAt:0};

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(msg,err=false){let old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function initials(name){return String(name||'?').split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
function formatTime(iso){const d=new Date(iso);const diff=Math.floor((Date.now()-d.getTime())/60000);if(diff<1)return'Just now';if(diff<60)return`${diff} min ago`;if(diff<1440)return`${Math.floor(diff/60)} hours ago`;return d.toLocaleDateString('en-IN')}
function getLogin(){let cur={};try{cur=JSON.parse(localStorage.getItem('inlist_employee_login_v2')||localStorage.getItem('currentEmployee')||'{}')}catch(e){}return{org_code:String(cur.org_code||cur.orgCode||localStorage.getItem('org_code')||localStorage.getItem('orgCode')||'HOSP001').toUpperCase(),emp_code:String(cur.emp_code||cur.empCode||localStorage.getItem('emp_code')||localStorage.getItem('empCode')||'EMP001').toUpperCase()}}
async function rpc(fn,args){
  const {data,error}=await sb.rpc(fn,args||{});
  if(error){
    console.error('RPC ERROR:',fn,args,error);
    throw error;
  }
  return data;
}
function isUuid(v){
  return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v||''));
}
function showSoftError(msg){
  const now=Date.now();
  if(now-state.lastMessageErrorAt>3500){
    state.lastMessageErrorAt=now;
    toast(msg,true);
  }
}
function isTemporarySupabaseError(e){
  const code=String(e?.code||'');
  const msg=String(e?.message||'').toLowerCase();
  return code==='57014' || code==='PGRST002' || msg.includes('schema cache') || msg.includes('statement timeout') || msg.includes('service unavailable');
}

function isMobile(){return window.matchMedia('(max-width:860px)').matches}
function openMobileChat(){if(isMobile())document.body.classList.add('mobile-chat-mode')}
function closeMobileChat(){document.body.classList.remove('mobile-chat-mode')}
function setTypingText(text){const el=$('typingIndicator');if(el)el.textContent=text||''}

function isNearMessagesBottom(){
  const box=$('messagesArea');
  if(!box)return true;
  return (box.scrollHeight - box.scrollTop - box.clientHeight) < 140;
}
function updateScrollBottomBtn(){
  const btn=$('scrollBottomBtn');
  if(!btn)return;
  btn.classList.toggle('show', !!state.current && !isNearMessagesBottom());
}
function scrollMessagesToBottom(smooth=false){
  const box=$('messagesArea');
  if(!box)return;
  if(smooth && box.scrollTo) box.scrollTo({top:box.scrollHeight,behavior:'smooth'});
  else box.scrollTop=box.scrollHeight;
  setTimeout(updateScrollBottomBtn,80);
}
function closeChatMenu(){const menu=$('chatMenu');if(menu)menu.classList.remove('open')}
function toggleChatMenu(){const menu=$('chatMenu');if(menu)menu.classList.toggle('open')}

function normText(v){return String(v||'').toLowerCase().replace(/[^a-z0-9]+/g,' ').trim()}
function profileText(c){
  return [
    c?.role_label,c?.role,c?.designation,c?.department,c?.employee_type,
    c?.full_name,c?.emp_code,c?.is_system_contact?'system':''
  ].map(normText).join(' ');
}
function isProtectedProfile(c){
  const t=profileText(c);
  return !!(c?.is_system_contact) ||
    /\b(admin|owner|developer|dev|company|support)\b/.test(t);
}
function isDeveloperProfile(c){
  const t=profileText(c);
  return /\b(developer|dev|support)\b/.test(t);
}
function contactPhone(c){return c?.mobile||c?.phone||c?.contact_mobile||c?.contact_phone||c?.whatsapp||''}
function contactEmail(c){return c?.email||c?.work_email||c?.contact_email||''}
function mediaSrc(m){return m?.media_url||m?.media_data||''}
function mediaDownloadName(m){
  const ext = m?.media_type==='image'?'jpg':m?.media_type==='video'?'mp4':m?.media_type==='audio'?'mp3':'file';
  return `chat-${m?.id||Date.now()}.${ext}`;
}
function openImageViewer(src){
  if(!src)return;
  $('viewerImg').src=src;
  $('imageViewer').classList.add('open');
}
function closeImageViewer(){
  $('imageViewer').classList.remove('open');
  $('viewerImg').src='';
}
function isProtectedMessage(m){
  // Developer/Admin/Owner/Company ke message par delete icon nahi dikhega.
  const rowText=[m?.sender_role,m?.sender_role_label,m?.role_label,m?.sender_designation,m?.sender_department,m?.sender_employee_type].map(normText).join(' ');
  const rowProtected=/\b(admin|owner|developer|dev|company|support)\b/.test(rowText);
  const sentByMe=String(m?.sender_employee_id)===String(state.me?.id);
  const currentProtected=!sentByMe && isProtectedProfile(state.current||{});
  return rowProtected || currentProtected;
}
function callContact(){
  const c=state.current;if(!c)return;
  const phone=contactPhone(c);
  if(!phone)return toast('Developer ka mobile/call number data me nahi mila',true);
  location.href='tel:'+String(phone).replace(/\s+/g,'');
}
function emailContact(){
  const c=state.current;if(!c)return;
  const email=contactEmail(c);
  if(!email)return toast('Developer ka email data me nahi mila',true);
  location.href='mailto:'+email;
}
async function setMyTyping(isTyping){
  if(!state.current?.conversation_id||!state.me?.id)return;
  try{
    await sb.from('chat_typing_status').upsert({
      conversation_id:state.current.conversation_id,
      employee_id:state.me.id,
      is_typing:!!isTyping,
      updated_at:new Date().toISOString()
    },{onConflict:'conversation_id,employee_id'});
  }catch(e){console.warn('typing status skipped:',e.message)}
}
function bindTypingInput(){
  const input=$('messageInput');
  if(!input)return;
  input.addEventListener('input',()=>{
    if(!state.current||state.current.status!=='accepted')return;
    setMyTyping(true);
    clearTimeout(state.typingTimer);
    state.typingTimer=setTimeout(()=>setMyTyping(false),1500);
  });
  input.addEventListener('blur',()=>setMyTyping(false));
}
function unsubscribeRealtime(){
  if(state.messageChannel){sb.removeChannel(state.messageChannel);state.messageChannel=null}
  if(state.typingChannel){sb.removeChannel(state.typingChannel);state.typingChannel=null}
  setTypingText('');
}
function subscribeRealtime(){
  if(!state.current?.conversation_id)return;
  unsubscribeRealtime();
  const convId=state.current.conversation_id;
  state.messageChannel=sb.channel('emp-chat-messages-'+convId)
    .on('postgres_changes',{event:'*',schema:'public',table:'chat_messages',filter:`conversation_id=eq.${convId}`},async()=>{
      if(state.current?.conversation_id===convId){
        await loadMessages(false).catch(()=>{});
        await loadContacts().catch(()=>{});
      }
    })
    .subscribe();
  state.typingChannel=sb.channel('emp-chat-typing-'+convId)
    .on('postgres_changes',{event:'*',schema:'public',table:'chat_typing_status',filter:`conversation_id=eq.${convId}`},payload=>{
      const row=payload.new||payload.old||{};
      if(String(row.conversation_id)!==String(convId))return;
      if(String(row.employee_id)===String(state.me.id))return;
      const fresh=row.updated_at && (Date.now()-new Date(row.updated_at).getTime()<5000);
      setTypingText(row.is_typing&&fresh?'Typing...':'');
    })
    .subscribe();
}


async function init(){
  const login=getLogin();
  const ctx=await rpc('chat_get_employee_context',{p_org_code:login.org_code,p_emp_code:login.emp_code});
  state.org=ctx.organization;state.me=ctx.employee;
  $('meBox').innerHTML=`Me: <strong>${esc(state.me.full_name)}</strong> (${esc(state.me.emp_code)})`;
  try{ await rpc('chat_touch_presence',{p_org_id:state.org.id,p_employee_id:state.me.id}); }catch(e){}
  await loadContacts();
}
async function loadContacts(){
  if(state.loadContactsRunning)return;
  if(!state.org?.id || !state.me?.id)return;
  state.loadContactsRunning=true;
  try{
  // Same employee chat tables: chat_conversations + chat_messages
  const contacts = await rpc('chat_get_my_contacts',{
    p_org_id: state.org.id,
    p_employee_id: state.me.id,
    p_search: state.searchTerm || null
  });

  let pending = [];
  try{
    pending = await rpc('chat_get_pending_requests',{
      p_org_id: state.org.id,
      p_employee_id: state.me.id
    });
  }catch(e){
    console.warn('pending requests fallback skipped:', e.message);
  }

  const map = new Map();

  [...(pending||[]), ...(contacts||[])].forEach(c => {
    // Same company/admin/developer duplicate ko employee_id se merge karo.
    // Search result without conversation stays separate only when no existing contact exists.
    const empKey = 'emp_' + c.employee_id;
    const convKey = c.conversation_id || empKey;

    if(map.has(empKey)){
      const old = map.get(empKey);
      // Prefer real accepted/system/pending conversation over search result.
      const oldScore = (old.is_system_contact?5:0) + (old.status==='accepted'?4:0) + (old.status==='pending'?3:0) + (old.conversation_id?2:0);
      const newScore = (c.is_system_contact?5:0) + (c.status==='accepted'?4:0) + (c.status==='pending'?3:0) + (c.conversation_id?2:0);
      if(newScore > oldScore) map.set(empKey, c);
    }else{
      map.set(empKey, c);
    }
  });

  state.contacts = [...map.values()];
  renderContacts();
  }catch(e){
    console.warn('loadContacts skipped/failed:',e);
    const now=Date.now();
    if(now-state.lastContactsErrorAt>8000){
      state.lastContactsErrorAt=now;
      if(isTemporarySupabaseError(e)) showSoftError('Supabase busy/schema cache reload ho raha hai. Thoda wait karo.');
      else showSoftError(e.message||'Contacts load error');
    }
  }finally{
    state.loadContactsRunning=false;
  }
}
function contactSortRank(c){
  if(c.is_system_contact || ['Admin','Developer','Company'].includes(c.role_label)) return 1;
  if(c.status==='pending' && c.request_to_employee_id===state.me.id) return 2;
  if(c.status==='accepted') return 3;
  if(c.status==='pending' && c.request_from_employee_id===state.me.id) return 4;
  if(c.needs_request) return 5;
  return 9;
}
function renderContacts(){
  const box=$('contactsList');
  const uniqueMap = new Map();
  (state.contacts||[]).forEach(c=>{
    const key = c.employee_id || c.conversation_id;
    if(!uniqueMap.has(key)) uniqueMap.set(key,c);
  });
  const list=[...uniqueMap.values()].sort((a,b)=>contactSortRank(a)-contactSortRank(b));
  if(!list.length){
    box.innerHTML='<div style="padding:2rem;text-align:center">No contacts found. Emp ID/name search karo.</div>';
    return;
  }
  let lastGroup='';
  box.innerHTML=list.map(c=>{
    let group = '';
    if(c.is_system_contact || ['Admin','Developer','Company'].includes(c.role_label)) group='Company / Admin / Developer';
    else if(c.status==='pending' && c.request_to_employee_id===state.me.id) group='Request Received';
    else if(c.status==='accepted') group='Approved Chats';
    else if(c.status==='pending' && c.request_from_employee_id===state.me.id) group='Request Sent';
    else if(c.needs_request) group='Search Result';
    else group='Other';

    const groupHtml = group !== lastGroup ? `<div style="padding:9px 14px;background:#f8fafc;border-bottom:1px solid #e2e8f0;font-size:.72rem;font-weight:900;color:#475569">${group}</div>` : '';
    lastGroup = group;

    const active=state.current?.conversation_id===c.conversation_id?'active':'';
    const blocked=c.is_blocked?'blocked':'';
    const pending=c.status==='pending'?'pending':'';
    const last=c.last_message_text||'No messages';
    const approvedDot = c.status==='accepted' ? '<span class="online-dot" title="Online/Approved"></span>' : '';
    const requestLabel =
      c.status==='pending' && c.request_to_employee_id===state.me.id ? 'Request Received' :
      c.status==='pending' && c.request_from_employee_id===state.me.id ? 'Request Sent / Pending' :
      c.needs_request ? 'Not Connected' :
      c.is_blocked ? 'Blocked' :
      c.status==='accepted' ? 'Approved / Online' : 'Active';

    return `${groupHtml}<div class="contact-item ${active} ${blocked} ${pending}" data-conv="${esc(c.conversation_id||'')}" data-emp="${esc(c.employee_id)}">
      <div class="contact-avatar">${esc(initials(c.full_name))}<span class="contact-dot ${c.online?'online':''}"></span></div>
      <div class="contact-info">
        <div class="contact-name">${esc(c.full_name)} ${approvedDot}<span class="section-chip">${esc(c.role_label||c.role||'Employee')}</span></div>
        <div class="contact-role">${esc(c.emp_code||'')} • ${esc(c.department||'-')} • ${esc(requestLabel)}</div>
        <div class="last-msg">${esc(last)}</div>
      </div>
      ${Number(c.unread_count||0)>0?`<div class="unread-badge">${Number(c.unread_count)}</div>`:''}
      ${c.needs_request?`<button class="mini-btn" data-action="request" data-emp="${esc(c.employee_id)}">Send Request</button>`:''}
      ${c.status==='pending'&&c.request_to_employee_id===state.me.id?`<button class="mini-btn" data-action="accept" data-conv="${esc(c.conversation_id)}">Accept</button><button class="mini-btn mini-danger" data-action="reject" data-conv="${esc(c.conversation_id)}">Reject</button>`:''}
      ${c.status==='pending'&&c.request_from_employee_id===state.me.id?`<span class="mini-btn" style="opacity:.7">Pending</span>`:''}
    </div>`;
  }).join('');
}

function wait(ms){return new Promise(resolve=>setTimeout(resolve,ms))}
async function waitForMessageLoadFree(maxMs=1800){
  const start=Date.now();
  while(state.loadMessagesRunning && Date.now()-start<maxMs){
    await wait(80);
  }
}
function makeLocalEcho(text,media){
  return {
    id:'local-'+Date.now()+'-'+Math.random().toString(16).slice(2),
    conversation_id:state.current?.conversation_id,
    sender_employee_id:state.me?.id,
    receiver_employee_id:null,
    message_text:text||null,
    media_type:media?.type||null,
    media_data:media?.data||null,
    media_url:null,
    deleted_for_both:false,
    created_at:new Date().toISOString(),
    _localEcho:true
  };
}
function normalizeMsgText(v){return String(v||'').trim()}
function getMessagesForRender(){
  const server=Array.isArray(state.messages)?state.messages:[];
  const now=Date.now();
  state.localEchoes=(state.localEchoes||[]).filter(e=>{
    if(String(e.conversation_id)!==String(state.current?.conversation_id))return false;
    const tooOld=now-new Date(e.created_at).getTime()>45000;
    const matched=server.some(m=>
      String(m.sender_employee_id)===String(e.sender_employee_id) &&
      normalizeMsgText(m.message_text)===normalizeMsgText(e.message_text) &&
      String(m.media_type||'')===String(e.media_type||'') &&
      Math.abs(new Date(m.created_at).getTime()-new Date(e.created_at).getTime())<45000
    );
    return !tooOld && !matched;
  });
  return [...server,...state.localEchoes]
    .filter(m=>String(m.conversation_id||state.current?.conversation_id)===String(state.current?.conversation_id))
    .sort((a,b)=>new Date(a.created_at)-new Date(b.created_at));
}


async function loadMessages(refreshContacts=true){
  if(state.loadMessagesRunning)return;
  const convId=state.current?.conversation_id;
  const empId=state.me?.id;
  if(!convId){
    $('messagesArea').innerHTML='<div style="text-align:center;padding:2rem">Send/accept request first.</div>';
    return;
  }
  if(!isUuid(convId) || !isUuid(empId)){
    console.error('Invalid chat_get_messages params:',{convId,empId,current:state.current,me:state.me});
    showSoftError('Chat id / employee id invalid hai. Login/session dobara check karo.');
    return;
  }

  state.loadMessagesRunning=true;
  try{
    state.messages=await rpc('chat_get_messages',{
      p_conversation_id:convId,
      p_employee_id:empId,
      p_limit:100
    });
  }catch(mainErr){
    console.warn('chat_get_messages RPC failed, trying direct fallback:',mainErr);

    try{
      const {data:rows,error:msgErr}=await sb
        .from('chat_messages')
        .select('id,conversation_id,sender_employee_id,receiver_employee_id,message_text,media_type,media_data,media_url,deleted_for_both,deleted_for_both_at,created_at')
        .eq('conversation_id',convId)
        .eq('deleted_for_both',false)
        .order('created_at',{ascending:false})
        .limit(100);

      if(msgErr) throw msgErr;

      let list=(rows||[]).reverse();

      // Delete-for-me records ko filter karo. Agar RLS allow na kare to ignore nahi, original messages dikha do.
      try{
        const ids=list.map(x=>x.id).filter(Boolean);
        if(ids.length){
          const {data:dels,error:delErr}=await sb
            .from('chat_message_deletions')
            .select('message_id')
            .eq('employee_id',empId)
            .in('message_id',ids);
          if(!delErr && dels?.length){
            const hidden=new Set(dels.map(d=>String(d.message_id)));
            list=list.filter(m=>!hidden.has(String(m.id)));
          }
        }
      }catch(e){console.warn('delete-for-me fallback filter skipped:',e);}

      state.messages=list;
      showSoftError('RPC 500 tha, direct fallback se messages load hue. Supabase RPC SQL fix karna zaruri hai.');
    }catch(fallbackErr){
      console.error('chat_get_messages fallback also failed:',fallbackErr);
      showSoftError((mainErr?.message||fallbackErr?.message||'Messages load error'));
      if(!$('messagesArea').innerHTML.trim() || $('messagesArea').innerText.includes('Select')){
        $('messagesArea').innerHTML='<div style="text-align:center;padding:2rem;color:#b91c1c;font-weight:900">Messages load nahi ho rahe. Supabase RPC chat_get_messages check karo.</div>';
      }
      state.loadMessagesRunning=false;
      return;
    }
  }

  renderMessages();
  if(refreshContacts) await loadContacts();
  state.loadMessagesRunning=false;
}
function renderMessages(){
  const box=$('messagesArea');
  const shouldStickToBottom = state.forceScrollBottom || isNearMessagesBottom();
  state.forceScrollBottom=false;
  const renderList=getMessagesForRender();
  if(!renderList.length){box.innerHTML='<div style="text-align:center;padding:2rem">No messages.</div>';updateScrollBottomBtn();return}
  box.innerHTML=renderList.map(m=>{
    const sent=String(m.sender_employee_id)===String(state.me.id);
    const src=mediaSrc(m);
    let content='';
    if(m.media_type==='image'){
      content+=`<img src="${esc(src)}" class="msg-media" data-open-img="${esc(src)}" alt="chat image">
        <div class="media-actions">
          <a class="download-media-btn" href="${esc(src)}" download="${esc(mediaDownloadName(m))}"><span class="material-icons" style="font-size:.9rem">download</span> Download</a>
        </div>`;
    }
    if(m.media_type==='video'){
      content+=`<video controls class="msg-media" src="${esc(src)}"></video>
        <div class="media-actions">
          <a class="download-media-btn" href="${esc(src)}" download="${esc(mediaDownloadName(m))}"><span class="material-icons" style="font-size:.9rem">download</span> Download Video</a>
        </div>`;
    }
    if(m.media_type==='audio'){
      content+=`<div class="audio-card"><audio controls preload="metadata" src="${esc(src)}"></audio></div>
        <div class="media-actions">
          <a class="download-media-btn" href="${esc(src)}" download="${esc(mediaDownloadName(m))}"><span class="material-icons" style="font-size:.9rem">download</span> Download Audio</a>
        </div>`;
    }
    if(m.message_text)content+=`<div>${esc(m.message_text)}</div>`;
    const hideDelete=m._localEcho || isProtectedMessage(m);
    return `<div class="message-wrapper" data-msg-id="${esc(m.id)}">
      <div class="message-bubble ${sent?'sent-msg':'received-msg'}"><div class="bubble">
        ${content || '<i>Media</i>'}
        <div class="msg-time">${formatTime(m.created_at)} ${m.deleted_for_both?' • deleted':''}</div>
      </div></div>
      ${hideDelete?'':`<div class="delete-msg-icon" data-del="${esc(m.id)}" title="Delete message"><span class="material-icons" style="font-size:1rem">delete_outline</span></div>`}
    </div>`;
  }).join('');
  if(shouldStickToBottom) scrollMessagesToBottom(false);
  else updateScrollBottomBtn();
}
function handleMediaSelect(e){
  const file=e.target.files[0];if(!file)return;
  const isImg=file.type.startsWith('image/');
  const isVid=file.type.startsWith('video/');
  const isAud=file.type.startsWith('audio/');
  if(!isImg&&!isVid&&!isAud)return toast('Only image/video/audio allowed',true);
  if(file.size>12*1024*1024)return toast('Max 12MB media allowed',true);
  const reader=new FileReader();
  reader.onload=ev=>{
    state.pendingMedia={type:isImg?'image':isVid?'video':'audio',data:ev.target.result,name:file.name};
    let preview='';
    if(state.pendingMedia.type==='image') preview=`<img src="${state.pendingMedia.data}">`;
    if(state.pendingMedia.type==='video') preview=`<video src="${state.pendingMedia.data}"></video>`;
    if(state.pendingMedia.type==='audio') preview=`<audio controls src="${state.pendingMedia.data}"></audio>`;
    $('previewArea').innerHTML=`<div class="preview-item">${preview}<div class="remove-preview" id="clearPreview">×</div></div>`;
    $('clearPreview').onclick=()=>{state.pendingMedia=null;$('previewArea').innerHTML=''};
  };
  reader.readAsDataURL(file);e.target.value='';
}
async function sendMessage(){
  if(!state.current||state.current.status!=='accepted'||state.current.is_blocked)return toast('Accept hone ke baad hi chat allowed hai',true);
  const input=$('messageInput');
  const preview=$('previewArea');
  const text=input.value.trim();
  const media=state.pendingMedia ? {...state.pendingMedia} : null;
  if(!text&&!media)return toast('Message/image/video/audio required',true);

  if($('sendMessageBtn')) $('sendMessageBtn').disabled=true;
  await setMyTyping(false);

  try{
    await rpc('chat_send_message',{
      p_conversation_id:state.current.conversation_id,
      p_sender_employee_id:state.me.id,
      p_message_text:text||null,
      p_media_type:media?.type||null,
      p_media_data:media?.data||null
    });

    // Long chat fix: message DB me save hote hi apne screen par local echo dikhao.
    // Agar RPC commit/read delay ho, to bhi sender ko apna sent message visible rahega.
    state.localEchoes.push(makeLocalEcho(text,media));
    state.pendingMedia=null;
    input.value='';
    if(preview) preview.innerHTML='';
    state.forceScrollBottom=true;
    renderMessages();

    // Supabase commit/read race avoid karne ke liye short delay ke baad server se refresh.
    await waitForMessageLoadFree();
    await wait(350);
    state.forceScrollBottom=true;
    await loadMessages(false);
    await loadContacts();
    toast('Message sent');
  }catch(e){
    toast(e.message||'Message send failed',true);
  }finally{
    if($('sendMessageBtn')) $('sendMessageBtn').disabled=false;
  }
}

async function sendRequest(empId){
  await rpc('chat_send_request',{p_org_id:state.org.id,p_from_employee_id:state.me.id,p_to_employee_id:empId});
  toast('Chat request sent');state.searchTerm='';$('searchContact').value='';await loadContacts();
}
async function acceptRequest(convId){
  await rpc('chat_accept_request',{p_conversation_id:convId,p_employee_id:state.me.id});
  toast('Request accepted / Approved');
  await loadContacts();
  const c=state.contacts.find(x=>x.conversation_id===convId);
  if(c) await selectContact(c);
}
async function rejectRequest(convId){
  const note = prompt('Reject reason optional:') || 'Rejected';
  await rpc('chat_reject_request',{p_conversation_id:convId,p_employee_id:state.me.id,p_note:note});
  toast('Request rejected');
  state.current=null;
  $('chatName').innerText='Select a contact';
  $('chatRole').innerText='';
  $('messagesArea').innerHTML='<div style="text-align:center;padding:2rem">Select a contact</div>';
  await loadContacts();
}
async function toggleBlock(){
  if(!state.current)return;
  if(isProtectedProfile(state.current)){
    toast('Admin / Owner / Developer / Company profile ko block nahi kar sakte.', true);
    return;
  }
  const blocked=!state.current.is_blocked;
  await rpc('chat_set_block',{p_conversation_id:state.current.conversation_id,p_employee_id:state.me.id,p_blocked:blocked});
  toast(blocked?'Chat blocked':'Chat unblocked');
  await loadContacts();
  const c=state.contacts.find(x=>x.conversation_id===state.current.conversation_id);if(c){state.current=c;updateChatHeader();await loadMessages();}
}
async function deleteEntireChat(){
  if(!state.current?.conversation_id || !state.me?.id){
    toast('Pehle chat select karo', true);
    return;
  }

  closeChatMenu();
  closeDeleteModal();

  // Mobile par native confirm kabhi-kabhi response nahi deta, isliye click hote hi toast dikhao.
  toast('Delete All button clicked');

  const ok = confirm('Apne side se poora chat delete karna hai? Supabase audit/developer restore ke liye data rahega.');
  if(!ok)return;

  const convId = state.current.conversation_id;
  const empId = state.me.id;

  try{
    await rpc('chat_delete_all_for_me',{
      p_conversation_id: convId,
      p_employee_id: empId
    });
  }catch(rpcErr){
    console.warn('chat_delete_all_for_me RPC failed, trying direct fallback:', rpcErr);

    const {data:rows,error:msgErr}=await sb
      .from('chat_messages')
      .select('id')
      .eq('conversation_id',convId)
      .eq('deleted_for_both',false)
      .limit(500);

    if(msgErr) throw msgErr;

    const ids=(rows||[]).map(r=>r.id).filter(Boolean);
    if(ids.length){
      const payload=ids.map(id=>({
        message_id:id,
        employee_id:empId,
        deleted_at:new Date().toISOString()
      }));

      const {error:insErr}=await sb
        .from('chat_message_deletions')
        .upsert(payload,{onConflict:'message_id,employee_id'});

      if(insErr) throw insErr;
    }
  }

  state.messages=[];
  $('messagesArea').innerHTML='<div style="text-align:center;padding:2rem">No messages.</div>';
  toast('Poora chat aapke side se delete ho gaya');
  state.forceScrollBottom=true;
  await loadMessages(false);
  await loadContacts();
}

function closeDeleteModal(){
  const modal=$('deleteModal');
  if(modal) modal.style.display='none';
  state.pendingDeleteMsgId=null;
}
function openDeleteModal(msgId){
  const msg=state.messages.find(m=>m.id===msgId);if(!msg)return;
  state.pendingDeleteMsgId=msgId;
  const sent=String(msg.sender_employee_id)===String(state.me.id);
  const canBoth=sent && (Date.now()-new Date(msg.created_at).getTime()<=5*60*1000);
  $('deleteMsgText').innerText=canBoth?'5 minute ke andar hai: dono side se delete kar sakte ho.':'5 minute ke baad: sirf apne side se delete hoga, developer restore/dekh sakta hai.';
  $('bothOptionDiv').style.display=canBoth?'block':'none';
  $('deleteModal').style.display='flex';
}
async function deleteMessage(forBoth){
  if(!state.pendingDeleteMsgId)return;
  const msg=state.messages.find(m=>String(m.id)===String(state.pendingDeleteMsgId));
  if(msg && isProtectedMessage(msg)){
    $('deleteModal').style.display='none';state.pendingDeleteMsgId=null;
    return toast('Developer/Admin/Company ka message delete nahi hoga.',true);
  }
  try{
    await rpc('chat_delete_message',{p_message_id:state.pendingDeleteMsgId,p_employee_id:state.me.id,p_delete_for_both:forBoth,p_delete_media:!!forBoth});
  }catch(e){
    // Agar old RPC me p_delete_media parameter nahi hai to purana call use karo.
    if(String(e.message||'').includes('p_delete_media') || String(e.message||'').includes('function')){
      await rpc('chat_delete_message',{p_message_id:state.pendingDeleteMsgId,p_employee_id:state.me.id,p_delete_for_both:forBoth});
    }else{
      throw e;
    }
  }
  $('deleteModal').style.display='none';state.pendingDeleteMsgId=null;
  toast(forBoth?'Message deleted for both':'Message deleted from your side');
  await loadMessages();
}

$('backBtn').onclick=()=>{
  if($('deleteModal') && $('deleteModal').style.display==='flex'){
    closeDeleteModal();
    return;
  }
  if(document.body.classList.contains('mobile-chat-mode')){closeMobileChat();return}
  history.length>1?history.back():location.href='emp.html';
};
if($('mobileChatBack')) $('mobileChatBack').onclick=()=>{
  if($('deleteModal') && $('deleteModal').style.display==='flex'){closeDeleteModal();return;}
  closeMobileChat();
};
window.addEventListener('resize',()=>{if(!isMobile())closeMobileChat()});
$('searchContact').oninput=e=>{state.searchTerm=e.target.value.trim();loadContacts().catch(er=>toast(er.message,true))};
$('searchBtn').onclick=()=>{state.searchTerm=$('searchContact').value.trim();loadContacts().catch(er=>toast(er.message,true))};
$('contactsList').onclick=e=>{
  const btn=e.target.closest('[data-action]');
  if(btn){
    e.stopPropagation();
    if(btn.dataset.action==='request')return sendRequest(btn.dataset.emp).catch(er=>toast(er.message,true));
    if(btn.dataset.action==='accept')return acceptRequest(btn.dataset.conv).catch(er=>toast(er.message,true));
    if(btn.dataset.action==='reject')return rejectRequest(btn.dataset.conv).catch(er=>toast(er.message,true));
  }
  const item=e.target.closest('.contact-item');if(!item)return;
  const c=state.contacts.find(x=>{
    const convMatch = String(x.conversation_id || '') === String(item.dataset.conv || '');
    const empMatch = String(x.employee_id) === String(item.dataset.emp);
    return item.dataset.conv ? convMatch : empMatch;
  });
  if(c){
    if(c.needs_request){
      toast('Pehle Send Request karo.', true);
      return;
    }
    selectContact(c).catch(er=>toast(er.message,true));
  }
};

if($('messagesArea')) $('messagesArea').addEventListener('scroll',updateScrollBottomBtn);
if($('scrollBottomBtn')) $('scrollBottomBtn').onclick=()=>scrollMessagesToBottom(true);
document.addEventListener('click',e=>{if(!e.target.closest('.chat-menu-wrap'))closeChatMenu();});
$('messagesArea').onclick=e=>{
  const img=e.target.closest('[data-open-img]');
  if(img){openImageViewer(img.dataset.openImg);return;}
  const d=e.target.closest('[data-del]');if(d)openDeleteModal(d.dataset.del)
};
if($('imageViewerClose')) $('imageViewerClose').onclick=e=>{e.stopPropagation();closeImageViewer();};
if($('imageViewer')) $('imageViewer').onclick=e=>{if(e.target.id==='imageViewer')closeImageViewer();};
$('deleteBothBtn').onclick=()=>deleteMessage(true).catch(e=>toast(e.message,true));
$('deleteMeBtn').onclick=()=>deleteMessage(false).catch(e=>toast(e.message,true));
$('deleteAllChatBtn').onclick=(e)=>{e.preventDefault();e.stopPropagation();closeDeleteModal();deleteEntireChat().catch(er=>toast(er.message||'Delete all failed',true));};
$('cancelDeleteBtn').onclick=(e)=>{e.preventDefault();e.stopPropagation();closeDeleteModal();};


// Dynamic menu safety: mobile par agar inline onclick bind na ho to bhi Delete All chalega.
document.addEventListener('click',(e)=>{
  const btn=e.target.closest('#clearChatBtnMenu');
  if(!btn)return;
  e.preventDefault();
  e.stopPropagation();
  deleteEntireChat().catch(er=>toast(er.message||'Delete all failed',true));
});

if($('deleteModal')){
  $('deleteModal').addEventListener('click',(e)=>{
    if(e.target.id==='deleteModal') closeDeleteModal();
  });
  $('deleteModal').addEventListener('touchstart',(e)=>{
    if(e.target.id==='deleteModal'){
      e.preventDefault();
      closeDeleteModal();
    }
  },{passive:false});
}

init().catch(e=>{toast(e.message,true);$('contactsList').innerHTML='<div style="padding:2rem;color:#b91c1c">'+esc(e.message)+'</div>'});
state.refreshTimer=setInterval(()=>{
  if(state.org&&state.me){
    rpc('chat_touch_presence',{
      p_org_id:state.org.id,
      p_employee_id:state.me.id
    }).catch(()=>{});
  }

  loadContacts().catch(()=>{});

  // Realtime active hai to har 2 second reload karna duplicate race create karta tha.
  // Fallback polling sirf tab chalega jab realtime channel available/subscribed na ho.
  if(state.current?.conversation_id && !state.messageChannel){
    loadMessages(false).catch(()=>{});
  }
},5000);
</script>
