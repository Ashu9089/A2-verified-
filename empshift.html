<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />

  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,Arial,sans-serif}
    body{min-height:100vh;background:linear-gradient(135deg,#eef5ff,#dbeafe);color:#0f172a}
    .top{position:sticky;top:0;z-index:20;background:linear-gradient(135deg,#0f3b35,#14532d);color:white;box-shadow:0 12px 28px rgba(15,23,42,.18)}
    .top-inner{max-width:1180px;margin:auto;padding:13px 16px;display:flex;align-items:center;justify-content:space-between;gap:12px}
    .back{border:0;background:rgba(255,255,255,.16);color:white;border-radius:999px;width:40px;height:40px;display:flex;align-items:center;justify-content:center;cursor:pointer}

    .cell small{font-size:9px;font-weight:900;margin-top:2px;line-height:1}.cell:hover{transform:scale(.96);filter:brightness(.96)}
    .empty{opacity:.25;cursor:default}.past-locked{opacity:.45!important;cursor:not-allowed!important;filter:grayscale(.35);box-shadow:none!important}.past-locked:hover{transform:none!important;filter:grayscale(.35)!important}.locked-text{color:#94a3b8;font-size:12px;font-weight:900}.today{box-shadow:0 0 0 2px white,0 0 0 4px #2563eb}.sunday{border-color:#dc2626}
    .morning{background:#065f46;color:#fff}.evening{background:#92400e;color:#fff}.night{background:#f97316;color:#fff}.general{background:#2563eb;color:#fff}.wo{background:#38bdf8;color:#fff}.absent,.leave{background:#9ca3af;color:#fff}.no-roster{background:#e2e8f0;color:#475569}
    .combo{background:linear-gradient(135deg,#065f46 0 50%,#92400e 50% 100%);color:#fff}.morning-night{background:linear-gradient(135deg,#065f46 0 50%,#f97316 50% 100%);color:#fff}.evening-night{background:linear-gradient(135deg,#92400e 0 50%,#f97316 50% 100%);color:#fff}
    .legend{display:flex;flex-wrap:wrap;justify-content:center;gap:10px;margin-top:15px;border-top:1px solid #e5e7eb;padding-top:13px;color:#475569;font-size:12px;font-weight:800}.dot{width:13px;height:13px;border-radius:999px;display:inline-block;margin-right:4px;vertical-align:-2px}.dcombo{background:linear-gradient(135deg,#065f46 0 50%,#92400e 50%)}.dgeneral{background:#2563eb}
    .hidden{display:none}.table-wrap{overflow:auto}table{width:100%;border-collapse:collapse;font-size:14px}th,td{padding:12px;border-bottom:1px solid #eef2f7;text-align:left}th{background:#f8fafc;color:#475569}.badge{padding:5px 11px;border-radius:999px;color:white;font-size:12px;font-weight:900;display:inline-block}.action-link{border:0;background:#0284c7;color:white;border-radius:999px;padding:6px 12px;font-weight:900;cursor:pointer;font-size:12px}.toast{position:fixed;left:18px;bottom:18px;background:#14532d;color:white;border-radius:999px;padding:12px 18px;z-index:50;font-weight:900}.toast.err{background:#991b1b}

    .detail-modal{display:none;position:fixed;inset:0;background:rgba(15,23,42,.55);z-index:80;align-items:center;justify-content:center;padding:16px}
    .detail-box{width:min(520px,100%);background:#fff;border-radius:26px;box-shadow:0 30px 80px rgba(15,23,42,.28);overflow:hidden}
    .detail-head{background:linear-gradient(135deg,#0f3b35,#14532d);color:#fff;padding:16px 18px;display:flex;justify-content:space-between;align-items:center;gap:12px}
    .detail-head b{font-size:18px}.detail-close{border:0;background:rgba(255,255,255,.18);color:#fff;border-radius:999px;width:34px;height:34px;cursor:pointer;font-size:20px}
    .detail-body{padding:18px}.detail-row{display:flex;justify-content:space-between;gap:12px;border-bottom:1px solid #eef2f7;padding:10px 0;color:#334155}.detail-row span:first-child{font-weight:900;color:#0f172a}.detail-actions{padding-top:16px;display:flex;justify-content:flex-end;gap:10px;flex-wrap:wrap}.disabled-note{color:#94a3b8;font-weight:900;font-size:13px}
    @media(max-width:640px){.cell{width:43px;height:43px;font-size:12px}.cell small{display:none}.calendar{gap:4px}.week{font-size:10px}th,td{padding:9px;font-size:12px}}
  </style>
</head>
<body>
<header class="top"><div class="top-inner"><button class="back" id="backBtn"><span class="material-icons">arrow_back</span></button><div class="emp-pill" id="empLabel">Loading employee...</div><button class="back" id="refreshBtn"><span class="material-icons">refresh</span></button></div></header>
<main class="wrap">

  <div class="controls">
    <div><select id="monthSelect"></select><select id="yearSelect"></select></div>
    <div><button class="btn light" id="currentBtn"><span class="material-icons">today</span>Current</button><button class="btn sky" id="toggleBtn"><span class="material-icons">view_list</span>List View</button></div>

      <span><i class="dot" style="background:#065f46"></i>Morning</span>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

let sb=null;

function createSb(orgId=''){
  const headers={};
  if(orgId) headers['x-org-id']=String(orgId);

  return window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY,{
    auth:{
      persistSession:false,
      autoRefreshToken:false,
      detectSessionInUrl:false
    },
    global:{headers}
  });
}

sb=createSb();

const state={
  orgCode:'',
  orgId:'',
  empCode:'',
  empId:'',
  org:null,
  emp:null,
  records:{},
  attendance:{},
  loading:false,
  isList:false
};

const $=id=>document.getElementById(id);

function toast(msg,err=false){
  const old=document.querySelector('.toast');
  if(old) old.remove();
  const d=document.createElement('div');
  d.className='toast'+(err?' err':'');
  d.textContent=msg;
  document.body.appendChild(d);
  setTimeout(()=>d.remove(),3500);
}

function esc(v){
  return String(v??'').replace(/[&<>"']/g,s=>({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    '"':'&quot;',
    "'":'&#039;'
  }[s]));
}

function fmtTime(v){
  if(!v) return '--';
  return String(v).slice(0,5);
}

function dateISO(y,m,d){
  return `${y}-${String(m+1).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
}

function daysInMonth(y,m){
  return new Date(y,m+1,0).getDate();
}

function dayName(dateStr){
  return ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'][new Date(dateStr+'T00:00:00').getDay()];
}

function todayLocalISO(){
  const n=new Date();
  return `${n.getFullYear()}-${String(n.getMonth()+1).padStart(2,'0')}-${String(n.getDate()).padStart(2,'0')}`;
}

function isPastDate(dateStr){
  return String(dateStr)<todayLocalISO();
}

function uuidLike(v){
  return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(String(v||''));
}

function sameDateKey(row){
  return row.roster_date || row.attendance_date || row.date || row.shift_date || '';
}

function readObj(key){
  try{
    return JSON.parse(localStorage.getItem(key)||'{}') || {};
  }catch(e){
    return {};
  }
}

function getLogin(){
  const qs=new URLSearchParams(location.search);
  const cur={
    ...readObj('inlist_employee_login_v2'),
    ...readObj('currentEmployee'),
    ...readObj('currentSession')
  };

  state.orgId=(
    qs.get('org_id') ||
    cur.org_id ||
    cur.orgId ||
    localStorage.getItem('org_id') ||
    localStorage.getItem('orgId') ||
    ''
  ).trim();

  state.orgCode=(
    qs.get('org_code') ||
    qs.get('org') ||
    cur.org_code ||
    cur.orgCode ||
    localStorage.getItem('org_code') ||
    localStorage.getItem('orgCode') ||
    localStorage.getItem('current_org_code') ||
    ''
  ).toUpperCase().trim();

  state.empId=(
    qs.get('emp_id') ||
    qs.get('employee_id') ||
    cur.emp_id ||
    cur.employee_id ||
    cur.empId ||
    localStorage.getItem('emp_id') ||
    localStorage.getItem('employee_id') ||
    localStorage.getItem('empId') ||
    ''
  ).trim();

  state.empCode=(
    qs.get('emp_code') ||
    qs.get('emp') ||
    cur.emp_code ||
    cur.empCode ||
    localStorage.getItem('emp_code') ||
    localStorage.getItem('empCode') ||
    localStorage.getItem('current_emp_code') ||
    ''
  ).toUpperCase().trim();

  if(state.orgId && uuidLike(state.orgId)){
    localStorage.setItem('org_id',state.orgId);
    sb=createSb(state.orgId);
  }

  if(state.orgCode) localStorage.setItem('org_code',state.orgCode);
  if(state.empCode) localStorage.setItem('emp_code',state.empCode);
  if(state.empId && uuidLike(state.empId)) localStorage.setItem('emp_id',state.empId);

  if(!state.orgCode && !uuidLike(state.orgId)){
    throw new Error('ORG_NOT_FOUND: URL me org_id ya org_code bhejo.');
  }

  if(!state.empCode && !uuidLike(state.empId)){
    throw new Error('EMPLOYEE_NOT_FOUND: URL me emp_id ya emp_code bhejo.');
  }
}

async function rpcRosterData(start,end){
  getLogin();

  // IMPORTANT: is RPC ko neeche diye SQL se create/update karo.
  // Ye org_id+emp_id aur org_code+emp_code dono accept karta hai, isliye dusre screen se aayi URL values work karengi.
  const args={
    p_org_id: uuidLike(state.orgId) ? state.orgId : null,
    p_org_code: state.orgCode || null,
    p_emp_id: uuidLike(state.empId) ? state.empId : null,
    p_emp_code: state.empCode || null,
    p_start_date: start,
    p_end_date: end
  };

  const {data,error}=await sb.rpc('app_employee_roster_screen_data',args);

  if(error){
    console.error('app_employee_roster_screen_data RPC error:',error,args);
    throw error;
  }

  const res=Array.isArray(data) ? (data[0]||{}) : (data||{});
  if(res.error) throw new Error(res.error);

  if(res.org?.id){
    state.orgId=res.org.id;
    localStorage.setItem('org_id',res.org.id);
    sb=createSb(res.org.id);
  }
  if(res.employee?.id){
    state.empId=res.employee.id;
    localStorage.setItem('emp_id',res.employee.id);
  }

  return res;
}

async function directRosterData(start,end){
  getLogin();

  if(uuidLike(state.orgId)){
    sb=createSb(state.orgId);
  }else{
    sb=createSb();
  }

  let org=null;

  if(uuidLike(state.orgId)){
    const q=await sb.from('organizations')
      .select('id,org_name,org_code,active')
      .eq('id',state.orgId)
      .maybeSingle();

    if(q.data) org=q.data;
  }

  if(!org && state.orgCode){
    const q=await sb.from('organizations')
      .select('id,org_name,org_code,active')
      .eq('org_code',state.orgCode)
      .maybeSingle();

    if(q.error) throw q.error;
    if(q.data) org=q.data;
  }

  if(!org) throw new Error('ORG_NOT_FOUND');

  state.org=org;
  state.orgId=org.id;
  state.orgCode=org.org_code || state.orgCode;

  localStorage.setItem('org_id',org.id);
  if(org.org_code) localStorage.setItem('org_code',org.org_code);

  sb=createSb(org.id);

  let empQuery=sb.from('employees')
    .select('id,org_id,branch_id,emp_code,full_name,email,mobile,active');

  if(uuidLike(state.empId)){
    empQuery=empQuery.eq('id',state.empId);
  }else{
    empQuery=empQuery.eq('org_id',org.id).eq('emp_code',state.empCode);
  }

  const {data:emp,error:ee}=await empQuery.maybeSingle();

  if(ee || !emp) throw new Error(ee?.message || 'EMPLOYEE_NOT_FOUND');
  if(emp.active===false) throw new Error('EMPLOYEE_INACTIVE');

  state.emp=emp;
  state.empId=emp.id;
  state.empCode=emp.emp_code || state.empCode;

  localStorage.setItem('emp_id',emp.id);
  if(emp.emp_code) localStorage.setItem('emp_code',emp.emp_code);

  const [{data:rost,error:re},{data:att,error:ae}]=await Promise.all([
    sb.from('rosters')
      .select('id,org_id,branch_id,employee_id,roster_date,shift_name,shift_start,shift_end,grace_minutes,active')
      .eq('org_id',org.id)
      .eq('employee_id',emp.id)
      .gte('roster_date',start)
      .lte('roster_date',end)
      .eq('active',true)
      .order('roster_date',{ascending:true}),

    sb.from('attendance')
      .select('attendance_date,status,punch_in,punch_out,worked_minutes,worked_hours,is_late,late_minutes')
      .eq('org_id',org.id)
      .eq('employee_id',emp.id)
      .gte('attendance_date',start)
      .lte('attendance_date',end)
  ]);

  if(re) throw re;
  if(ae) console.warn('attendance warning:',ae.message);

  return {
    org,
    employee:emp,
    rosters:rost || [],
    attendance:att || []
  };
}

async function fetchRosterData(start,end){
  // RLS ON me direct table select aksar block hota hai, isliye pehle SECURITY DEFINER RPC call hoga.
  try{
    return await rpcRosterData(start,end);
  }catch(rpcErr){
    console.warn('RPC failed, trying direct fallback. Agar RLS ON hai to SQL RPC zaroor run karo:',rpcErr);
    return await directRosterData(start,end);
  }
}

function applyPayload(res){
  state.org=res.org || res.organization || state.org;
  state.emp=res.employee || res.emp || state.emp;

  if(!state.org) throw new Error('ORG_NOT_FOUND');
  if(!state.emp) throw new Error('EMPLOYEE_NOT_FOUND');

  if(state.org.id){
    state.orgId=state.org.id;
    localStorage.setItem('org_id',state.org.id);
    sb=createSb(state.org.id);
  }

  $('empLabel').innerHTML=`🧑‍💼 ${esc(state.emp.full_name || state.emp.name || 'Employee')} (${esc(state.emp.emp_code || state.empCode || state.emp.id)})`;

  state.records={};
  state.attendance={};

  (res.attendance || res.attendances || []).forEach(a=>{
    const k=sameDateKey(a);
    if(k) state.attendance[k]=a.status;
  });

  (res.rosters || res.roster || []).forEach(r=>{
    const k=sameDateKey(r);
    if(k) state.records[k]=r;
  });
}

function normalizeShiftName(name){
  const s=String(name||'').toLowerCase().replace(/[_-]/g,' ');
  const hasM=s.includes('morning') || s.includes('morn') || s.includes('day');
  const hasE=s.includes('evening') || s.includes('eve');
  const hasN=s.includes('night') || s.includes('ningh') || s.includes('nite');
  const hasG=s.includes('general') || s==='gen' || s.includes('gen shift') || s.includes('g shift');
  const hasW=s==='wo' || s.includes('weekly') || s.includes('off') || s.includes('week off');
  const hasL=s.includes('leave');
  const hasA=s.includes('absent');

  if(hasL) return 'leave';
  if(hasA) return 'absent';
  if(hasW) return 'wo';

  if(hasM && hasE) return 'morning_evening';
  if(hasM && hasN) return 'morning_night';
  if(hasE && hasN) return 'evening_night';

  if(hasG) return 'general';

  if(hasN) return 'night';
  if(hasE) return 'evening';
  if(hasM) return 'morning';

  return s.trim() || 'no_roster';
}

function statusClass(kind){
  return {
    morning:'morning',
    evening:'evening',
    night:'night',
    general:'general',
    morning_evening:'combo',
    morning_night:'morning-night',
    evening_night:'evening-night',
    wo:'wo',
    absent:'absent',
    leave:'leave',
    no_roster:'no-roster'
  }[kind] || 'no-roster';
}

function shiftLabel(kind,raw){
  return {
    morning:'Morning',
    evening:'Evening',
    night:'Night',
    general:'General',
    morning_evening:'Morning + Evening',
    morning_night:'Morning + Night',
    evening_night:'Evening + Night',
    wo:'WO',
    absent:'Absent',
    leave:'Leave',
    no_roster:'No Roster'
  }[kind] || raw || 'Roster';
}

async function loadMonth(){
  if(state.loading) return;
  state.loading=true;

  try{
    getLogin();

    const y=Number($('yearSelect').value);
    const m=Number($('monthSelect').value);

    const start=dateISO(y,m,1);
    const end=dateISO(y,m,daysInMonth(y,m));

    const payload=await fetchRosterData(start,end);

    applyPayload(payload);
    renderAll();

  }catch(e){
    console.error(e);
    toast(e.message || 'Roster load failed',true);
    $('empLabel').textContent='Roster load failed';
    $('calendar').innerHTML=`<div style="grid-column:1/-1;padding:30px;color:#991b1b;font-weight:900;line-height:1.5">${esc(e.message || e)}</div>`;
  }finally{
    state.loading=false;
  }
}

function getDayKind(dateStr){
  const r=state.records[dateStr];
  const att=String(state.attendance[dateStr] || '').toLowerCase();

  if(att==='absent') return {kind:'absent',raw:'Absent',r};
  if(att==='leave') return {kind:'leave',raw:'Leave',r};

  if(!r){
    const wd=new Date(dateStr+'T00:00:00').getDay();
    return {
      kind:wd===0 ? 'wo' : 'no_roster',
      raw:wd===0 ? 'WO' : 'No Roster',
      r:null
    };
  }

  const kind=normalizeShiftName(r.shift_name || r.shift_type || r.status);
  return {
    kind,
    raw:r.shift_name || r.shift_type || r.status,
    r
  };
}

function renderCalendar(){
  const y=Number($('yearSelect').value);
  const m=Number($('monthSelect').value);
  const cal=$('calendar');

  cal.innerHTML='';

  const first=new Date(y,m,1).getDay();
  const dim=daysInMonth(y,m);
  const today=todayLocalISO();

  for(let i=0;i<first;i++){
    const e=document.createElement('div');
    e.className='cell empty';
    cal.appendChild(e);
  }

  for(let d=1;d<=dim;d++){
    const ds=dateISO(y,m,d);
    const info=getDayKind(ds);
    const wd=new Date(ds+'T00:00:00').getDay();

    const cell=document.createElement('div');
    cell.className=`cell ${statusClass(info.kind)}`;

    if(ds===today) cell.classList.add('today');
    if(wd===0) cell.classList.add('sunday');

    const time=info.r ? `${fmtTime(info.r.shift_start || info.r.start_time)}-${fmtTime(info.r.shift_end || info.r.end_time)}` : '';

    cell.innerHTML=`<span>${d}</span><small>${esc(shiftLabel(info.kind,info.raw)).split(' ')[0]}</small>`;
    cell.title=`${ds}\n${shiftLabel(info.kind,info.raw)}${time ? '\n'+time : ''}`;

    if(isPastDate(ds)){
      cell.classList.add('past-locked');
      cell.title+='\nPast date: shift detail only';
    }

    cell.onclick=()=>openRosterDetail(ds,info);
    cal.appendChild(cell);
  }
}

function renderList(){
  const y=Number($('yearSelect').value);
  const m=Number($('monthSelect').value);
  const body=$('listBody');

  body.innerHTML='';

  for(let d=1;d<=daysInMonth(y,m);d++){
    const ds=dateISO(y,m,d);
    const info=getDayKind(ds);
    const label=shiftLabel(info.kind,info.raw);
    const cls=statusClass(info.kind);

    const time=info.r ? `${fmtTime(info.r.shift_start || info.r.start_time)} - ${fmtTime(info.r.shift_end || info.r.end_time)}` : '--';

    const action=isPastDate(ds)
      ? `<button class="action-link" style="background:#64748b" onclick="openRosterDetail('${ds}', null)">View Shift</button>`
      : (['absent','leave'].includes(info.kind)
        ? `<button class="action-link" style="background:#64748b" onclick="openRosterDetail('${ds}', null)">View</button>`
        : `<button class="action-link" onclick="openRosterDetail('${ds}', null)">View / Change</button>`);

    body.insertAdjacentHTML('beforeend',`
      <tr>
        <td>${ds}</td>
        <td>${dayName(ds)}</td>
        <td><span class="badge ${cls}">${esc(label)}</span></td>
        <td>${esc(time)}</td>
        <td>${info.r?.active ? 'Active' : '--'}</td>
        <td>${action}</td>
      </tr>
    `);
  }
}

function renderStats(){
  let morning=0,evening=0,night=0,general=0,combo=0,off=0;

  const y=Number($('yearSelect').value);
  const m=Number($('monthSelect').value);

  for(let d=1;d<=daysInMonth(y,m);d++){
    const k=getDayKind(dateISO(y,m,d)).kind;

    if(k==='morning') morning++;
    else if(k==='evening') evening++;
    else if(k==='night') night++;
    else if(k==='general') general++;
    else if(['morning_evening','morning_night','evening_night'].includes(k)) combo++;
    else off++;
  }

  $('morningCount').textContent=morning;
  $('eveningCount').textContent=evening;
  $('nightCount').textContent=night;
  $('generalCount').textContent=general;
  $('comboCount').textContent=combo;
  $('offCount').textContent=off;
}

function renderAll(){
  renderStats();
  renderCalendar();
  renderList();
}

function openRosterDetail(dateStr,info){
  const data=info || getDayKind(dateStr);
  const label=shiftLabel(data.kind,data.raw);
  const cls=statusClass(data.kind);
  const isPast=isPastDate(dateStr);
  const wd=dayName(dateStr);

  const start=data.r ? fmtTime(data.r.shift_start || data.r.start_time) : '--';
  const end=data.r ? fmtTime(data.r.shift_end || data.r.end_time) : '--';
  const grace=data.r?.grace_minutes ?? '--';

  const note=isPast
    ? 'Past date hai, isliye sirf shift detail dekh sakte hain. Change button nahi rahega.'
    : (['absent','leave'].includes(data.kind)
      ? 'Absent/Leave status par shift change allowed nahi hai.'
      : 'Current ya future date hai, shift change request yahi se store hogi.');

  $('detailTitle').innerHTML=`${esc(dateStr)} • ${esc(wd)}`;

  $('detailContent').innerHTML=`
    <div class="detail-row"><span>Shift</span><b><span class="badge ${cls}">${esc(label)}</span></b></div>
    <div class="detail-row"><span>Start Time</span><b>${esc(start)}</b></div>
    <div class="detail-row"><span>End Time</span><b>${esc(end)}</b></div>
    <div class="detail-row"><span>Grace Minutes</span><b>${esc(grace)}</b></div>
    <div class="detail-row"><span>Status</span><b>${data.r?.active ? 'Active' : '--'}</b></div>
    <div style="margin-top:12px;color:#64748b;font-weight:800;font-size:13px;line-height:1.5">${esc(note)}</div>
  `;

  if(!isPast && !['absent','leave'].includes(data.kind) && data.r?.id){
    $('detailActions').innerHTML=`<button class="btn sky" onclick="openShiftChange('${dateStr}', null)"><span class="material-icons">swap_horiz</span>Change Shift</button>`;
  }else{
    $('detailActions').innerHTML=`<span class="disabled-note">Shift change unavailable</span>`;
  }

  $('detailModal').style.display='flex';
}

function closeRosterDetail(){
  $('detailModal').style.display='none';
}

function timeOrDefault(v,def){
  const s=String(v||'').trim();
  if(/^\d{1,2}:\d{2}$/.test(s)) return s;
  return def;
}

async function openShiftChange(dateStr,info){
  if(isPastDate(dateStr)){
    toast('Past date par shift change allowed nahi hai',true);
    return;
  }

  const data=info || getDayKind(dateStr);

  if(['absent','leave'].includes(data.kind)){
    toast('Absent/Leave par shift change allowed nahi hai',true);
    return;
  }

  if(!data.r?.id){
    toast('Is date ka roster nahi mila',true);
    return;
  }

  const defaultStart=fmtTime(data.r.shift_start || '09:00');
  const defaultEnd=fmtTime(data.r.shift_end || '18:00');

  const requestedStart=timeOrDefault(prompt('Requested shift start time likho (HH:MM)',defaultStart),defaultStart);
  const requestedEnd=timeOrDefault(prompt('Requested shift end time likho (HH:MM)',defaultEnd),defaultEnd);
  const reason=prompt('Reason likho','Shift change request');

  try{
    if(state.orgId) sb=createSb(state.orgId);

    const {data:res,error}=await sb.rpc('app_create_shift_change_request',{
      p_org_code:state.orgCode,
      p_emp_code:state.empCode,
      p_roster_date:dateStr,
      p_requested_shift_start:requestedStart,
      p_requested_shift_end:requestedEnd,
      p_reason:(reason || '').trim()
    });

    if(error) throw error;

    const out=Array.isArray(res) ? (res[0] || {}) : (res || {});
    if(out.error) throw new Error(out.error);

    toast('Shift change request store ho gayi');
    closeRosterDetail();

  }catch(e){
    console.error(e);
    toast('Store failed: '+(e.message || e),true);
  }
}

function populateSelectors(){
  const ms=$('monthSelect');
  const ys=$('yearSelect');
  const now=new Date();

  const names=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];

  ms.innerHTML='';
  ys.innerHTML='';

  names.forEach((n,i)=>{
    ms.insertAdjacentHTML('beforeend',`<option value="${i}">${n}</option>`);
  });

  for(let y=now.getFullYear()-2;y<=now.getFullYear()+2;y++){
    ys.insertAdjacentHTML('beforeend',`<option value="${y}">${y}</option>`);
  }

  ms.value=now.getMonth();
  ys.value=now.getFullYear();
}

function toggleView(){
  state.isList=!state.isList;

  $('calendarView').classList.toggle('hidden',state.isList);
  $('listView').classList.toggle('hidden',!state.isList);

  $('toggleBtn').innerHTML=state.isList
    ? '<span class="material-icons">calendar_month</span>Calendar View'
    : '<span class="material-icons">view_list</span>List View';
}

$('detailCloseBtn').onclick=closeRosterDetail;

$('detailModal').onclick=(e)=>{
  if(e.target===$('detailModal')) closeRosterDetail();
};

$('backBtn').onclick=()=>history.back();
$('refreshBtn').onclick=()=>loadMonth();

$('monthSelect').onchange=loadMonth;
$('yearSelect').onchange=loadMonth;

$('currentBtn').onclick=()=>{
  const n=new Date();
  $('monthSelect').value=n.getMonth();
  $('yearSelect').value=n.getFullYear();
  loadMonth();
};

$('toggleBtn').onclick=toggleView;

populateSelectors();
loadMonth();
</script>
</body>
</html>
