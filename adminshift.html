<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Inlist | Roster Management</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,Segoe UI,Roboto,sans-serif}
    body{background:radial-gradient(ellipse at 20% 30%,#0f2f2c,#051c1a);min-height:100vh;padding:1.5rem;color:#173b36}
    .roster-container{max-width:98%;margin:0 auto;background:rgba(255,255,255,.97);border-radius:2rem;box-shadow:0 30px 45px -12px rgba(0,0,0,.25);overflow:hidden}
    .header{background:linear-gradient(135deg,#1a5c54,#0e3d38);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;color:white}
    .header h1{font-size:1.35rem;display:flex;align-items:center;gap:8px}.header small{opacity:.85;display:block;margin-top:3px}
    .back-btn,.btn-primary,.btn-secondary{border:0;border-radius:40px;padding:8px 18px;font-weight:700;cursor:pointer}
    .back-btn{background:rgba(255,255,255,.15);color:white}.btn-primary{background:#1f6e68;color:#fff}.btn-secondary{background:#e2e8f0;color:#2c655e}.danger{background:#c0392b!important}.orange{background:#c47a2e!important}
    .content{padding:1.5rem}.top-controls,.status-panel{display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;margin-bottom:1rem;background:#f4faf8;padding:1rem;border-radius:1.2rem}
    .field{display:flex;flex-direction:column;gap:5px}.field label{font-size:.72rem;font-weight:800;color:#1e6b63;text-transform:uppercase}input,select{padding:8px 12px;border-radius:2rem;border:1.5px solid #dcebe7;background:white;outline:none;min-height:36px}
    .mode-group{display:flex;gap:.5rem;background:#e2e8f0;padding:4px;border-radius:3rem}.mode-btn{padding:7px 18px;border-radius:2rem;cursor:pointer;font-weight:800;color:#2c655e}.mode-btn.active{background:#1f6e68;color:white}
    .search-row{margin-bottom:1rem;display:flex;gap:1rem;align-items:center;flex-wrap:wrap}.search-row input{min-width:280px;flex:1}
    .staff-table-wrapper{overflow:auto;margin-top:1rem;max-height:65vh;border-radius:1rem;border:1px solid #e8f1ee}.staff-table{width:100%;border-collapse:collapse;background:white;font-size:.78rem}.staff-table th,.staff-table td{padding:9px 7px;border-bottom:1px solid #eef4f2;vertical-align:middle;white-space:nowrap}.staff-table th{background:#eef6f4;color:#1e5a4c;position:sticky;top:0;z-index:2}.staff-table tr:hover{background:#fbfffd}
    .shift-select,.ward-input,.remarks-input,.time-input{font-size:.72rem;width:125px;padding:6px 8px}.time-input{width:90px}.remarks-input{width:140px}.emp-muted{font-size:.72rem;color:#668}
    .action-buttons{display:flex;gap:1rem;margin-top:1.2rem;justify-content:flex-end;flex-wrap:wrap}.pill{display:inline-flex;gap:6px;align-items:center;padding:6px 12px;border-radius:99px;background:#e7f5f2;color:#1b5b54;font-size:.76rem;font-weight:800}.warn{background:#fff3cd;color:#806000}.err{background:#fdecea;color:#b42318}.ok{background:#e9f8ef;color:#166534}
    .toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:white;padding:10px 16px;border-radius:40px;font-size:.82rem;z-index:1000;box-shadow:0 10px 30px rgba(0,0,0,.25)}.toast.error{background:#b42318}.hidden{display:none!important}
    @media(max-width:800px){body{padding:.6rem}.content{padding:1rem}.header{padding:1rem}.search-row input{min-width:100%}}
  </style>
</head>
<body>
<div class="roster-container">
  <div class="header">
    <div><h1><i class="fas fa-calendar-check"></i> Roster Management</h1><small id="actorInfo">Loading session...</small></div>
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
  </div>
  <div class="content">
    <div class="status-panel" id="statusPanel"><span class="pill warn"><i class="fas fa-info-circle"></i> HR/Admin/permission employee can make roster, but own roster is hidden.</span></div>
    <div class="top-controls">
      <div class="field"><label>Department</label><select id="departmentSelect"><option value="">All Departments</option></select></div>
      <div class="mode-group"><div class="mode-btn active" data-mode="daily">📆 Daily</div><div class="mode-btn" data-mode="weekly">📅 Weekly</div></div>
      <div class="field" id="dailyDateGroup"><label>Date</label><input type="date" id="dailyDate"></div>
      <div class="field hidden" id="weeklyDateGroup"><label>Week Start</label><input type="date" id="weekStart"></div>
      <div class="field"><label>Rows</label><select id="limitSelect"><option>100</option><option selected>200</option><option>500</option></select></div>
      <button id="loadDataBtn" class="btn-primary"><i class="fas fa-sync-alt"></i> Load</button>
      <button id="saveDataBtn" class="btn-primary orange"><i class="fas fa-save"></i> Save All</button>
    </div>
    <div class="search-row"><input type="text" id="searchInput" placeholder="🔍 Search employee code, name or department"><button id="searchBtn" class="btn-secondary">Search</button><button id="clearBtn" class="btn-secondary">Clear</button></div>
    <div class="staff-table-wrapper"><table class="staff-table"><thead id="tableHeader"></thead><tbody id="staffTableBody"></tbody></table></div>
    <div class="action-buttons"><button id="prevBtn" class="btn-secondary">Prev</button><button id="nextBtn" class="btn-secondary">Next</button><button id="exportExcelBtn" class="btn-secondary"><i class="fas fa-file-excel"></i> Excel</button><button id="exportPdfBtn" class="btn-primary"><i class="fas fa-file-pdf"></i> PDF</button></div>
  </div>
</div>
<script>
  const SUPABASE_URL = 'https://tovpcbzztvkiwamimrxt.supabase.co';
  const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';
  const db = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY, { auth: { persistSession: false } });

  const shiftOptions = [
    {name:'Morning', start:'08:00', end:'20:00'},
    {name:'Evening', start:'14:00', end:'22:00'},
    {name:'Night', start:'20:00', end:'08:00'},
    {name:'General', start:'09:00', end:'18:00'},
    {name:'Morning+Evening', start:'08:00', end:'22:00'},
    {name:'Evening+Night', start:'14:00', end:'08:00'},
    {name:'Night+Morning', start:'20:00', end:'14:00'},
    {name:'Off', start:'00:00', end:'00:00'}
  ];
  let session = {}, ctx = null, employees = [], rosters = [], departments = [], mode = 'daily', offset = 0;

  function safeJson(v){try{return JSON.parse(v||'{}')}catch(e){return {}}}
  function first(...vals){return vals.find(v=>v!==undefined && v!==null && String(v).trim()!=='') || ''}
  function uuidOrNull(v){v=String(v||'').trim(); return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(v)?v:null}
  function getSession(){
    const keys = ['currentSession','inlist_current_session','inlistSession','adminSession','employeeSession','empSession','userSession','session','loginSession'];
    for(const k of keys){
      const obj=safeJson(localStorage.getItem(k));
      if(obj && typeof obj==='object' && Object.keys(obj).length){ obj.__sessionKey=k; return obj; }
    }
    return {};
  }
  function orgCode(){return first(session.orgCode, session.org_code, session.companyCode, session.company_code, session.organization_code, session.org?.org_code, session.organization?.org_code, session.company?.org_code)}
  function orgId(){return uuidOrNull(first(session.orgId, session.org_id, session.organizationId, session.organization_id, session.companyId, session.company_id, session.org?.id, session.organization?.id))}
  function adminUserId(){
    const role=String(first(session.role,session.userRole,session.type,session.user_type)).toLowerCase();
    const id=uuidOrNull(first(session.adminUserId, session.admin_user_id, session.orgUserId, session.org_user_id, session.user_id, session.userId, session.id));
    return ['owner','admin','hr','manager','developer','org_user'].includes(role) ? id : (session.adminUserId||session.admin_user_id? id : null);
  }
  function empCode(){return first(session.empCode, session.emp_code, session.employeeCode, session.employee_code, session.employee?.emp_code)}
  function email(){return first(session.email, session.userEmail, session.user_email, session.employee?.email)}
  function mobile(){return first(session.mobile, session.phone, session.userPhone, session.user_phone, session.employee?.mobile)}
  function today(){return new Date().toISOString().slice(0,10)}
  function weekStart(d){const x=new Date(d);const day=x.getDay()||7;x.setDate(x.getDate()-day+1);return x.toISOString().slice(0,10)}
  function datesOfWeek(s){const a=[];const d=new Date(s);for(let i=0;i<7;i++){const x=new Date(d);x.setDate(d.getDate()+i);a.push(x.toISOString().slice(0,10));}return a}
  function showToast(msg, err=false){const t=document.createElement('div');t.className='toast'+(err?' error':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}
  function esc(v){return String(v??'').replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]))}

  async function rpc(name, params){const {data,error}=await db.rpc(name, params); if(error){console.error(name,error); throw new Error(error.message || error.details || error.code)} return data;}
  function userType(){return String(first(session.role,session.userRole,session.type,session.user_type, session.loginType, session.login_type)).toLowerCase() || (adminUserId()?'admin':'employee')}
  function paramsBase(){return {p_org_code:orgCode()||null, p_org_id:orgId(), p_admin_user_id:adminUserId(), p_emp_code:empCode()||null, p_email:email()||null, p_mobile:mobile()||null, p_user_type:userType()};}
  function currentRange(){if(mode==='daily'){const d=document.getElementById('dailyDate').value;return [d,d]} const s=document.getElementById('weekStart').value; const ds=datesOfWeek(s); return [ds[0], ds[6]];}

  async function loadData(reset=true){
    if(reset) offset=0;
    // orgCode missing ho to bhi adminUserId/orgId se SQL org resolve karega.
    if(!orgCode() && !orgId() && !adminUserId()){showToast('LOGIN_CONTEXT_NOT_FOUND: session me orgCode/orgId/adminUserId nahi mila.', true);return;}
    const [from,to]=currentRange(); if(!from||!to){showToast('Date select karo', true);return;}
    const data=await rpc('get_roster_screen_data', {...paramsBase(), p_from_date:from, p_to_date:to, p_department:document.getElementById('departmentSelect').value||null, p_search:document.getElementById('searchInput').value.trim()||null, p_limit:Number(document.getElementById('limitSelect').value), p_offset:offset});
    ctx=data.context; employees=data.employees||[]; rosters=data.rosters||[]; departments=data.departments||[];
    renderDeptOptions(); renderActor(); renderTable();
  }
  function renderDeptOptions(){const sel=document.getElementById('departmentSelect'); const old=sel.value; sel.innerHTML='<option value="">All Departments</option>'+departments.map(d=>`<option value="${esc(d)}">${esc(d)}</option>`).join(''); sel.value=old;}
  function renderActor(){const role=ctx?.role||'unknown'; const emp=ctx?.employee; document.getElementById('actorInfo').textContent=`Role: ${role}${emp?.emp_code?' | Own employee hidden: '+emp.emp_code:''}`;}
  function getRoster(employeeId, date){return rosters.find(r=>r.employee_id===employeeId && r.roster_date===date) || null;}
  function shiftObj(name){return shiftOptions.find(s=>s.name===name)||shiftOptions[0]}
  function shiftSelect(value){return `<select class="shift-select">${shiftOptions.map(s=>`<option value="${s.name}" ${s.name===(value||'Morning')?'selected':''}>${s.name}</option>`).join('')}</select>`}

  function renderTable(){
    if(mode==='daily') renderDaily(); else renderWeekly();
  }
  function renderDaily(){
    const date=document.getElementById('dailyDate').value;
    document.getElementById('tableHeader').innerHTML='<tr><th>Emp Code</th><th>Name</th><th>Department</th><th>Shift</th><th>Start</th><th>End</th><th>Ward / Location</th><th>Remarks</th></tr>';
    document.getElementById('staffTableBody').innerHTML=employees.map(e=>{const r=getRoster(e.id,date); const so=shiftObj(r?.shift_name); return `<tr data-emp-id="${e.id}" data-date="${date}"><td><b>${esc(e.emp_code)}</b></td><td>${esc(e.full_name)}<div class="emp-muted">${esc(e.designation||'')}</div></td><td>${esc(e.department||'')}</td><td>${shiftSelect(r?.shift_name)}</td><td><input class="time-input start" type="time" value="${esc((r?.shift_start||so.start).slice(0,5))}"></td><td><input class="time-input end" type="time" value="${esc((r?.shift_end||so.end).slice(0,5))}"></td><td><input class="ward-input" value="${esc(r?.ward_location||'')}"></td><td><input class="remarks-input" value="${esc(r?.remarks||'')}"></td></tr>`}).join('') || '<tr><td colspan="8">No employee found. Own employee row is hidden by rule.</td></tr>';
    bindShiftDefaults();
  }
  function renderWeekly(){
    const days=datesOfWeek(document.getElementById('weekStart').value);
    document.getElementById('tableHeader').innerHTML='<tr><th>Emp Code</th><th>Name</th><th>Department</th>'+days.map(d=>`<th>${d}<br>Shift / Ward</th>`).join('')+'</tr>';
    document.getElementById('staffTableBody').innerHTML=employees.map(e=>`<tr data-emp-id="${e.id}"><td><b>${esc(e.emp_code)}</b></td><td>${esc(e.full_name)}<div class="emp-muted">${esc(e.designation||'')}</div></td><td>${esc(e.department||'')}</td>${days.map(d=>{const r=getRoster(e.id,d); return `<td data-date="${d}">${shiftSelect(r?.shift_name)}<br><input class="time-input start" type="time" value="${esc((r?.shift_start||shiftObj(r?.shift_name).start).slice(0,5))}"> <input class="time-input end" type="time" value="${esc((r?.shift_end||shiftObj(r?.shift_name).end).slice(0,5))}"><br><input class="ward-input" placeholder="Ward" value="${esc(r?.ward_location||'')}"><br><input class="remarks-input" placeholder="Remarks" value="${esc(r?.remarks||'')}"></td>`}).join('')}</tr>`).join('') || `<tr><td colspan="${3+days.length}">No employee found. Own employee row is hidden by rule.</td></tr>`;
    bindShiftDefaults();
  }
  function bindShiftDefaults(){document.querySelectorAll('.shift-select').forEach(sel=>sel.onchange=()=>{const so=shiftObj(sel.value); const box=sel.closest('td').parentElement?.dataset?.date?sel.closest('tr'):sel.closest('td'); const parent=mode==='daily'?sel.closest('tr'):sel.closest('td'); parent.querySelector('.start').value=so.start; parent.querySelector('.end').value=so.end;});}

  function collectItems(){
    const items=[];
    if(mode==='daily'){
      document.querySelectorAll('#staffTableBody tr[data-emp-id]').forEach(tr=>items.push({employee_id:tr.dataset.empId, roster_date:tr.dataset.date, shift_name:tr.querySelector('.shift-select').value, shift_start:tr.querySelector('.start').value, shift_end:tr.querySelector('.end').value, ward_location:tr.querySelector('.ward-input').value, remarks:tr.querySelector('.remarks-input').value, grace_minutes:10, half_day_after_minutes:240, minimum_full_day_minutes:480}));
    } else {
      document.querySelectorAll('#staffTableBody tr[data-emp-id]').forEach(tr=>tr.querySelectorAll('td[data-date]').forEach(td=>items.push({employee_id:tr.dataset.empId, roster_date:td.dataset.date, shift_name:td.querySelector('.shift-select').value, shift_start:td.querySelector('.start').value, shift_end:td.querySelector('.end').value, ward_location:td.querySelector('.ward-input').value, remarks:td.querySelector('.remarks-input').value, grace_minutes:10, half_day_after_minutes:240, minimum_full_day_minutes:480})));
    }
    return items;
  }
  async function saveAll(){const items=collectItems(); if(!items.length){showToast('Save ke liye data nahi hai', true);return;} const data=await rpc('save_roster_data', {...paramsBase(), p_items:items}); showToast(`Saved ${data.saved_count || items.length} roster rows`); await loadData(false);}

  function exportExcel(){const rows=collectItems().map(i=>{const e=employees.find(x=>x.id===i.employee_id)||{}; return {'Emp Code':e.emp_code,'Name':e.full_name,'Department':e.department,'Date':i.roster_date,'Shift':i.shift_name,'Start':i.shift_start,'End':i.shift_end,'Ward':i.ward_location,'Remarks':i.remarks}}); const ws=XLSX.utils.json_to_sheet(rows); const wb=XLSX.utils.book_new(); XLSX.utils.book_append_sheet(wb,ws,'Roster'); XLSX.writeFile(wb,'roster.xlsx');}
  async function exportPdf(){const el=document.querySelector('.staff-table-wrapper'); const canvas=await html2canvas(el,{scale:1.5}); const img=canvas.toDataURL('image/png'); const {jsPDF}=window.jspdf; const pdf=new jsPDF('l','mm','a4'); const w=287; const h=canvas.height*w/canvas.width; pdf.text('Roster Report',10,10); pdf.addImage(img,'PNG',5,15,w,Math.min(h,185)); pdf.save('roster.pdf');}

  document.getElementById('backBtn').onclick=()=>history.back();
  document.getElementById('loadDataBtn').onclick=()=>loadData(true).catch(e=>showToast(e.message,true));
  document.getElementById('saveDataBtn').onclick=()=>saveAll().catch(e=>showToast(e.message,true));
  document.getElementById('searchBtn').onclick=()=>loadData(true).catch(e=>showToast(e.message,true));
  document.getElementById('clearBtn').onclick=()=>{document.getElementById('searchInput').value='';loadData(true).catch(e=>showToast(e.message,true));};
  document.getElementById('prevBtn').onclick=()=>{offset=Math.max(0,offset-Number(document.getElementById('limitSelect').value));loadData(false).catch(e=>showToast(e.message,true));};
  document.getElementById('nextBtn').onclick=()=>{offset+=Number(document.getElementById('limitSelect').value);loadData(false).catch(e=>showToast(e.message,true));};
  document.getElementById('exportExcelBtn').onclick=exportExcel; document.getElementById('exportPdfBtn').onclick=()=>exportPdf().catch(e=>showToast(e.message,true));
  document.querySelectorAll('.mode-btn').forEach(b=>b.onclick=()=>{document.querySelectorAll('.mode-btn').forEach(x=>x.classList.remove('active'));b.classList.add('active');mode=b.dataset.mode;document.getElementById('dailyDateGroup').classList.toggle('hidden',mode!=='daily');document.getElementById('weeklyDateGroup').classList.toggle('hidden',mode!=='weekly');renderTable();});

  (async function init(){session=getSession(); console.log('Roster session resolved', session); document.getElementById('dailyDate').value=today(); document.getElementById('weekStart').value=weekStart(today()); await loadData(true);})().catch(e=>showToast(e.message,true));
</script>
</body>
</html>
