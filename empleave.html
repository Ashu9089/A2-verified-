<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Inlist | Employee Leave Request</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif}
    body{min-height:100vh;background:linear-gradient(145deg,#e9eff7,#d9e2ef);padding:24px;display:flex;justify-content:center;align-items:flex-start;color:#1f2937}
    .leave-card{width:100%;max-width:980px;background:#fff;border-radius:30px;box-shadow:0 22px 45px -18px rgba(15,23,42,.35);overflow:hidden}
    .title-bar{display:flex;justify-content:space-between;align-items:center;gap:14px;background:#172033;color:#fff;padding:18px 24px;flex-wrap:wrap}
    .back-arrow{border:0;background:rgba(255,255,255,.12);color:#fff;padding:10px 16px;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer}
    .emp-details-right{background:#0b1220;border:1px solid rgba(255,255,255,.12);padding:10px 16px;border-radius:999px;font-size:13px;line-height:1.4}
    .emp-details-right strong{color:#fde68a}.emp-details-right span{opacity:.65;margin:0 5px}
    .notice{margin:18px 24px 0;padding:12px 16px;border-radius:18px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:700;display:none}
    .form-container{padding:24px}.row-2cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}.input-group{margin-bottom:18px;display:flex;flex-direction:column;gap:8px}
    label{font-weight:800;color:#243044;font-size:14px}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px 14px;font-size:15px;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.13)}textarea{resize:vertical;min-height:90px}
    .days-badge{display:inline-flex;width:max-content;background:#eef2ff;color:#1e3a8a;border-radius:999px;padding:9px 14px;font-weight:800}
    .priority-group{display:flex;gap:12px;flex-wrap:wrap}.priority-option{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;padding:9px 14px;border-radius:999px}.priority-option input{width:auto;accent-color:#2563eb}
    .upload-area{border:1px dashed #94a3b8;background:#f8fafc;border-radius:18px;padding:14px}.search-section{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:24px;padding:18px;margin-top:8px}
    .suggestions-list{background:#fff;border-radius:16px;max-height:220px;overflow:auto;margin-top:8px;border:1px solid #e2e8f0}.suggestion-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid #edf2f7}.suggestion-item:hover{background:#e0f2fe}
    .handover-detail{margin-top:12px;background:#ecfeff;border-left:5px solid #0891b2;border-radius:16px;padding:12px 14px;font-size:14px}
    .submit-btn{width:100%;border:0;border-radius:999px;background:#1e4663;color:#fff;padding:15px 18px;font-size:16px;font-weight:900;cursor:pointer;margin-top:18px}.submit-btn:disabled{opacity:.55;cursor:not-allowed}.submit-btn:hover:not(:disabled){background:#0f3550}
    .panel{background:#f8fafc;border-top:1px solid #e2e8f0;padding:24px}.panel-title{font-weight:900;font-size:20px;color:#16324a;margin-bottom:14px}.list{display:flex;flex-direction:column;gap:12px}
    .history-item{background:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 2px 8px rgba(15,23,42,.06);border-left:6px solid #38bdf8;font-size:14px;line-height:1.65}
    .history-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:900}
    .pending,.handover_pending{background:#fef3c7;color:#92400e}.admin_pending{background:#dbeafe;color:#1e40af}.handover_rejected,.rejected{background:#fee2e2;color:#991b1b}.approved{background:#dcfce7;color:#166534}.cancelled{background:#e5e7eb;color:#374151}
    .cancel-btn,.pdf-btn,.ok-btn,.reject-btn{border:0;border-radius:999px;padding:8px 13px;font-weight:900;cursor:pointer;margin-top:8px;margin-right:8px}.cancel-btn,.reject-btn{background:#fee2e2;color:#991b1b}.pdf-btn{background:#1e4663;color:#fff}.ok-btn{background:#dcfce7;color:#166534}
    .toast{position:fixed;left:20px;bottom:20px;padding:13px 18px;border-radius:999px;color:#fff;background:#166534;font-weight:800;box-shadow:0 10px 25px rgba(0,0,0,.18);z-index:99}.toast.err{background:#991b1b}
    .small-muted{color:#64748b;font-size:12px}.loading{padding:16px;background:#fff;border-radius:16px;text-align:center;color:#64748b}.hidden{display:none!important}
    @media(max-width:720px){body{padding:12px}.row-2cols{grid-template-columns:1fr}.title-bar{align-items:stretch}.emp-details-right{text-align:center}.form-container,.panel{padding:18px}.notice{margin:14px 18px 0}}
  </style>
</head>
<body>
  <div class="leave-card">
    <div class="title-bar">
      <button class="back-arrow" id="backArrowBtn">← Back</button>
      <div class="emp-details-right" id="empHeaderInfo">Loading employee...</div>
    </div>

    <div class="notice" id="featureNotice">Leave Management feature is not enabled for this employee.</div>

    <form class="form-container" id="leaveForm">
      <div class="input-group"><label>📋 Leave Type</label><select id="leaveType" required><option value="CL">Casual Leave (CL)</option><option value="PL">Privilege Leave (PL)</option><option value="SL">Sick Leave (SL)</option><option value="LOP">Loss of Pay (LOP)</option></select></div>
      <div class="row-2cols"><div class="input-group"><label>📅 From Date</label><input type="date" id="fromDate" required></div><div class="input-group"><label>📅 To Date</label><input type="date" id="toDate" required></div></div>
      <div class="input-group"><div class="days-badge" id="daysCountDisplay">📆 Total days: 0</div></div>
      <div class="input-group"><label>⚡ Leave Priority</label><div class="priority-group"><label class="priority-option"><input type="radio" name="priority" value="Normal" checked> Normal</label><label class="priority-option"><input type="radio" name="priority" value="Emergency"> Emergency</label></div></div>
      <div class="input-group"><label>📝 Reason for Leave</label><textarea id="reasonText" placeholder="Leave ka reason likhiye..." required></textarea></div>
      <div class="input-group upload-area"><label>📎 Upload Document optional</label><input type="file" id="docUpload" accept=".pdf,.jpg,.jpeg,.png,.docx"><div class="small-muted">Storage bucket: leave-documents</div></div>
      <div class="search-section"><label>🔍 Handover Employee Search</label><input type="text" id="handoverSearchInput" placeholder="Name / Emp Code type karein..." autocomplete="off"><div id="suggestionsContainer" class="suggestions-list"></div><div id="selectedHandoverDetail" class="handover-detail hidden"></div></div>
      <button class="submit-btn" id="submitLeaveBtn" type="submit">📨 Apply Leave & Send to Handover</button>
    </form>

    <div class="panel" id="handoverPanel">
      <div class="panel-title">🤝 Handover Approval Requests</div>
      <div id="handoverList" class="list"><div class="loading">Loading handover requests...</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Previous Leave Requests</div>
      <div id="leaveHistoryList" class="list"><div class="loading">Loading leave history...</div></div>
    </div>
  </div>

  <script src="./empleave.js"></script>
</body>
</html>
