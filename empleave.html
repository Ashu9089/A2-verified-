<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Inlist | Employee Leave Request</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:'Segoe UI',Roboto,Arial,sans-serif}
    body{min-height:100vh;background:linear-gradient(145deg,#e9eff7,#d9e2ef);padding:24px;display:flex;justify-content:center;align-items:flex-start;color:#1f2937}
    .leave-card{width:100%;max-width:980px;background:#fff;border-radius:30px;box-shadow:0 22px 45px -18px rgba(15,23,42,.35);overflow:hidden}
    .title-bar{display:flex;justify-content:space-between;align-items:center;gap:14px;background:#172033;color:#fff;padding:18px 24px;flex-wrap:wrap}
    .back-arrow{border:0;background:rgba(255,255,255,.12);color:#fff;padding:10px 16px;border-radius:999px;font-size:15px;font-weight:700;cursor:pointer}
    .emp-details-right{background:#0b1220;border:1px solid rgba(255,255,255,.12);padding:10px 16px;border-radius:999px;font-size:13px;line-height:1.4}
    .emp-details-right strong{color:#fde68a}.emp-details-right span{opacity:.65;margin:0 5px}
    .notice{margin:18px 24px 0;padding:12px 16px;border-radius:18px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:700;display:none}
    .balance-box{margin:18px 24px 0;background:#f8fafc;border:1px solid #e2e8f0;border-radius:24px;padding:16px}
    .balance-head{display:flex;align-items:center;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px}
    .balance-head b{font-size:18px;color:#16324a}.balance-refresh{border:0;border-radius:999px;background:#e0f2fe;color:#075985;padding:8px 13px;font-weight:900;cursor:pointer}
    .balance-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:10px}
    @media(min-width:760px){.balance-grid{grid-template-columns:repeat(5,1fr)}}
    .bal-card{background:#fff;border:1px solid #e2e8f0;border-radius:18px;padding:12px;box-shadow:0 2px 8px rgba(15,23,42,.04)}
    .bal-card strong{display:block;font-size:22px;color:#166534}.bal-card span{display:block;font-size:12px;font-weight:900;color:#334155;text-transform:uppercase}.bal-card small{display:block;margin-top:5px;color:#64748b;font-weight:700;line-height:1.4}
    .balance-warning{margin-top:10px;border-radius:14px;padding:10px 12px;background:#fff7ed;border:1px solid #fed7aa;color:#9a3412;font-weight:800;font-size:13px;display:none}
    .balance-warning.err{background:#fee2e2;border-color:#fecaca;color:#991b1b}
    .form-container{padding:24px}.row-2cols{display:grid;grid-template-columns:1fr 1fr;gap:18px}.input-group{margin-bottom:18px;display:flex;flex-direction:column;gap:8px}
    label{font-weight:800;color:#243044;font-size:14px}input,select,textarea{width:100%;border:1px solid #cbd5e1;border-radius:16px;padding:12px 14px;font-size:15px;outline:none;background:#fff}
    input:focus,select:focus,textarea:focus{border-color:#2563eb;box-shadow:0 0 0 4px rgba(37,99,235,.13)}textarea{resize:vertical;min-height:90px}
    .days-badge{display:inline-flex;width:max-content;background:#eef2ff;color:#1e3a8a;border-radius:999px;padding:9px 14px;font-weight:800}
    .priority-group{display:flex;gap:12px;flex-wrap:wrap}.priority-option{display:flex;align-items:center;gap:8px;background:#f8fafc;border:1px solid #e2e8f0;padding:9px 14px;border-radius:999px}.priority-option input{width:auto;accent-color:#2563eb}
    .upload-area{border:1px dashed #94a3b8;background:#f8fafc;border-radius:18px;padding:14px}.search-section{background:#f1f5f9;border:1px solid #e2e8f0;border-radius:24px;padding:18px;margin-top:8px}
    .suggestions-list{background:#fff;border-radius:16px;max-height:220px;overflow:auto;margin-top:8px;border:1px solid #e2e8f0}.suggestion-item{padding:11px 14px;cursor:pointer;border-bottom:1px solid #edf2f7}.suggestion-item:hover{background:#e0f2fe}
    .handover-detail{margin-top:12px;background:#ecfeff;border-left:5px solid #0891b2;border-radius:16px;padding:12px 14px;font-size:14px}
    .submit-btn{width:100%;border:0;border-radius:999px;background:#1e4663;color:#fff;padding:15px 18px;font-size:16px;font-weight:900;cursor:pointer;margin-top:18px}.submit-btn:disabled{opacity:.55;cursor:not-allowed}.submit-btn:hover:not(:disabled){background:#0f3550}
    .panel{background:#f8fafc;border-top:1px solid #e2e8f0;padding:24px}.panel-title{font-weight:900;font-size:20px;color:#16324a;margin-bottom:14px}.list{display:flex;flex-direction:column;gap:12px}
    .history-item{background:#fff;border-radius:18px;padding:15px 16px;box-shadow:0 2px 8px rgba(15,23,42,.06);border-left:6px solid #38bdf8;font-size:14px;line-height:1.65}
    .history-top{display:flex;justify-content:space-between;gap:10px;flex-wrap:wrap}.status{padding:4px 10px;border-radius:999px;font-size:12px;font-weight:900}
    .pending,.handover_pending{background:#fef3c7;color:#92400e}.admin_pending{background:#dbeafe;color:#1e40af}.handover_rejected,.rejected{background:#fee2e2;color:#991b1b}.approved{background:#dcfce7;color:#166534}.cancelled{background:#e5e7eb;color:#374151}
    .cancel-btn,.pdf-btn,.ok-btn,.reject-btn{border:0;border-radius:999px;padding:8px 13px;font-weight:900;cursor:pointer;margin-top:8px;margin-right:8px}.cancel-btn,.reject-btn{background:#fee2e2;color:#991b1b}.pdf-btn{background:#1e4663;color:#fff}.ok-btn{background:#dcfce7;color:#166534}
    .toast{position:fixed;left:20px;bottom:20px;padding:13px 18px;border-radius:999px;color:#fff;background:#166534;font-weight:800;box-shadow:0 10px 25px rgba(0,0,0,.18);z-index:99}.toast.err{background:#991b1b}
    .small-muted{color:#64748b;font-size:12px}.loading{padding:16px;background:#fff;border-radius:16px;text-align:center;color:#64748b}.hidden{display:none!important}
    @media(max-width:720px){body{padding:12px}.row-2cols{grid-template-columns:1fr}.title-bar{align-items:stretch}.emp-details-right{text-align:center}.form-container,.panel{padding:18px}.notice{margin:14px 18px 0}.balance-box{margin:14px 18px 0}}
  </style>
</head>
<body>
  <div class="leave-card">
    <div class="title-bar">
      <button class="back-arrow" id="backArrowBtn">← Back</button>
      <div class="emp-details-right" id="empHeaderInfo">Loading employee...</div>
    </div>

    <div class="notice" id="featureNotice">Leave Management feature is not enabled for this employee.</div>

    <section class="balance-box" id="leaveBalanceBox">
      <div class="balance-head">
        <b>💼 Leave Balance</b>
        <button class="balance-refresh" type="button" id="refreshLeaveBalanceBtn">Refresh</button>
      </div>
      <div class="balance-grid" id="leaveBalanceGrid">
        <div class="bal-card"><strong>--</strong><span>Loading</span><small>Please wait</small></div>
      </div>
      <div class="balance-warning" id="leaveBalanceWarning"></div>
    </section>

    <form class="form-container" id="leaveForm">
      <div class="input-group"><label>📋 Leave Type</label><select id="leaveType" required><option value="CL">Casual Leave (CL)</option><option value="PL">Privilege Leave (PL)</option><option value="SL">Sick Leave (SL)</option><option value="LOP">Loss of Pay (LOP)</option></select></div>
      <div class="row-2cols"><div class="input-group"><label>📅 From Date</label><input type="date" id="fromDate" required></div><div class="input-group"><label>📅 To Date</label><input type="date" id="toDate" required></div></div>
      <div class="input-group"><div class="days-badge" id="daysCountDisplay">📆 Total days: 0</div></div>
      <div class="input-group"><label>⚡ Leave Priority</label><div class="priority-group"><label class="priority-option"><input type="radio" name="priority" value="Normal" checked> Normal</label><label class="priority-option"><input type="radio" name="priority" value="Emergency"> Emergency</label></div></div>
      <div class="input-group"><label>📝 Reason for Leave</label><textarea id="reasonText" placeholder="Leave ka reason likhiye..." required></textarea></div>
      <div class="input-group upload-area"><label>📎 Upload Document optional</label><input type="file" id="docUpload" accept=".pdf,.jpg,.jpeg,.png,.docx"><div class="small-muted">Storage bucket: leave-documents</div></div>
      <div class="search-section"><label>🔍 Handover Employee Search</label><input type="text" id="handoverSearchInput" placeholder="Name / Emp Code type karein..." autocomplete="off"><div id="suggestionsContainer" class="suggestions-list"></div><div id="selectedHandoverDetail" class="handover-detail hidden"></div></div>
      <button class="submit-btn" id="submitLeaveBtn" type="submit">📨 Apply Leave & Send to Handover</button>
    </form>

    <div class="panel" id="handoverPanel">
      <div class="panel-title">🤝 Handover Approval Requests</div>
      <div id="handoverList" class="list"><div class="loading">Loading handover requests...</div></div>
    </div>

    <div class="panel">
      <div class="panel-title">📋 Previous Leave Requests</div>
      <div id="leaveHistoryList" class="list"><div class="loading">Loading leave history...</div></div>
    </div>
  </div>

  <script src="./empleave.js"></script>
  <script>
  (function(){
    'use strict';
    const SUPABASE_URL = 'https://tovpcbzztvkiwamimrxt.supabase.co';
    const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';
    const sb2 = window.inlistSb || window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
    window.inlistSb = sb2;
    const $ = id => document.getElementById(id);
    const state = { orgId:'', empId:'', year:new Date().getFullYear(), balances:{} };
    function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[s]))}
    function getParam(k){return new URLSearchParams(location.search).get(k)||''}
    function first(){for(let i=0;i<arguments.length;i++){let v=arguments[i]; if(v!==null&&v!==undefined&&String(v).trim()!=='') return String(v).trim()} return ''}
    function normType(v){v=String(v||'').toLowerCase(); if(v==='cl')return'cl'; if(v==='pl')return'pl'; if(v==='lop')return'unpaid_leave'; if(v==='sl')return'sl'; if(v==='paid leave')return'paid_leave'; if(v==='unpaid leave')return'unpaid_leave'; if(v==='c-off'||v==='c_off'||v==='coff')return'coff'; return v}
    function label(t){return {cl:'CL',pl:'PL',sl:'SL',paid_leave:'Paid Leave',unpaid_leave:'Unpaid Leave',coff:'C-Off'}[t]||t.toUpperCase()}
    function totalDays(){
      const f=$('fromDate')?.value, t=$('toDate')?.value;
      if(!f || !t) return 0;
      const a=new Date(f+'T00:00:00'), b=new Date(t+'T00:00:00');
      if(Number.isNaN(a.getTime())||Number.isNaN(b.getTime())||b<a) return 0;
      return Math.round((b-a)/86400000)+1;
    }
    function balanceRows(data){
      const rows = data?.balances || data || [];
      const map = {};
      (Array.isArray(rows)?rows:[]).forEach(r=>{
        const k=normType(r.leave_type);
        map[k]={
          remaining:Number(r.remaining||r.balance||0),
          used:Number(r.used||0),
          pending:Number(r.pending||0),
          credited:Number(r.credited||r.total_credit||0),
          opening:Number(r.opening_balance||0)
        };
      });
      state.balances = map;
    }
    function renderBalances(){
      const grid=$('leaveBalanceGrid'); if(!grid)return;
      const order=['cl','pl','sl','paid_leave','unpaid_leave','coff'];
      grid.innerHTML=order.map(k=>{
        const b=state.balances[k]||{};
        const rem=Number(b.remaining||0), used=Number(b.used||0), pending=Number(b.pending||0), total=Number(b.opening||0)+Number(b.credited||0);
        return `<div class="bal-card"><strong>${rem.toFixed(1)}</strong><span>${esc(label(k))} Left</span><small>Total ${total.toFixed(1)} • Used ${used.toFixed(1)} • Pending ${pending.toFixed(1)}</small></div>`;
      }).join('');
      updateLeaveDropdownLabels();
      checkSelectedBalance();
    }
    function updateLeaveDropdownLabels(){
      const sel=$('leaveType'); if(!sel)return;
      [...sel.options].forEach(o=>{
        const k=normType(o.value);
        const b=state.balances[k];
        const rem=b?Number(b.remaining||0).toFixed(1):'0.0';
        if(k==='cl') o.textContent=`Casual Leave (CL) - Left ${rem}`;
        else if(k==='pl') o.textContent=`Privilege Leave (PL) - Left ${rem}`;
        else if(k==='sl') o.textContent=`Sick Leave (SL) - Left ${rem}`;
        else if(k==='unpaid_leave') o.textContent='Loss of Pay / Unpaid Leave';
        else o.textContent=o.textContent;
      });
    }
    function checkSelectedBalance(){
      const warn=$('leaveBalanceWarning'), sel=$('leaveType'); if(!warn||!sel)return;
      const k=normType(sel.value), days=totalDays();
      if(k==='unpaid_leave' || k==='lop'){
        warn.style.display='block'; warn.className='balance-warning'; warn.textContent='LOP / Unpaid Leave balance se deduct nahi hota.'; return;
      }
      const b=state.balances[k];
      if(!b){ warn.style.display='block'; warn.className='balance-warning err'; warn.textContent=`${label(k)} balance nahi mila. Admin se credit add karwaiye.`; return; }
      const rem=Number(b.remaining||0);
      warn.style.display='block';
      if(days>0 && rem<days){ warn.className='balance-warning err'; warn.textContent=`${label(k)} balance kam hai. Available ${rem.toFixed(1)} day(s), request ${days} day(s).`; }
      else { warn.className='balance-warning'; warn.textContent=`${label(k)} available ${rem.toFixed(1)} day(s). Request ${days||0} day(s).`; }
    }
    async function resolveIds(){
      state.orgId=first(getParam('org_id'),getParam('orgId'),localStorage.getItem('org_id'),localStorage.getItem('current_org_id'));
      state.empId=first(getParam('emp_id'),getParam('employee_id'),localStorage.getItem('emp_id'),localStorage.getItem('employee_id'),localStorage.getItem('current_emp_id'));
      const orgCode=first(getParam('org_code'),getParam('orgCode'),localStorage.getItem('org_code'),localStorage.getItem('orgCode'));
      const empCode=first(getParam('emp_code'),getParam('empCode'),localStorage.getItem('emp_code'),localStorage.getItem('empCode'));
      if(state.orgId && state.empId) return true;
      try{
        let q=sb2.from('organizations').select('id,org_code').limit(1);
        q=state.orgId?q.eq('id',state.orgId):q.eq('org_code',orgCode);
        const org=await q.maybeSingle(); if(org.data) state.orgId=org.data.id;
        if(state.orgId && !state.empId){
          let e=sb2.from('employees').select('id,emp_code').eq('org_id',state.orgId).limit(1);
          if(empCode) e=e.eq('emp_code',empCode);
          const er=await e.maybeSingle(); if(er.data) state.empId=er.data.id;
        }
      }catch(e){console.warn(e)}
      return !!(state.orgId && state.empId);
    }
    async function loadBalances(){
      const grid=$('leaveBalanceGrid'); if(grid)grid.innerHTML='<div class="bal-card"><strong>...</strong><span>Loading</span><small>Please wait</small></div>';
      const ok=await resolveIds();
      if(!ok){ if(grid)grid.innerHTML='<div class="bal-card"><strong>!</strong><span>Missing</span><small>org_id / emp_id nahi mila</small></div>'; return; }
      const r=await sb2.rpc('app_get_employee_leave_balances',{p_org_id:state.orgId,p_employee_id:state.empId,p_year:state.year});
      if(r.error){ if(grid)grid.innerHTML=`<div class="bal-card"><strong>!</strong><span>RPC Error</span><small>${esc(r.error.message)}</small></div>`; return; }
      balanceRows(r.data); renderBalances();
    }
    setTimeout(loadBalances,700);
    $('refreshLeaveBalanceBtn')?.addEventListener('click',loadBalances);
    $('leaveType')?.addEventListener('change',checkSelectedBalance);
    $('fromDate')?.addEventListener('change',checkSelectedBalance);
    $('toDate')?.addEventListener('change',checkSelectedBalance);
    document.addEventListener('leave:submitted',loadBalances);
  })();
  </script>
</body>
</html>
