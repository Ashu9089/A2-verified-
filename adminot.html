<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Overtime Management | Admin Approval</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body{background:radial-gradient(ellipse at 20% 30%,#0f2f2c,#051c1a);min-height:100vh;padding:1rem}
    .admin-container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,.96);border-radius:2rem;box-shadow:0 30px 50px rgba(0,0,0,.25);overflow:hidden}
    .top-bar{background:#0a2c2f;padding:.7rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;color:#fff}
    .org-info{background:#174d47;padding:4px 14px;border-radius:40px;font-size:.8rem}
    .header{background:linear-gradient(135deg,#1a5c54,#0e3d38);padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;color:#fff}
    .header h1{font-size:1.3rem;display:flex;align-items:center;gap:8px}
    .back-btn{background:rgba(255,255,255,.15);color:#fff;border:0;padding:7px 16px;border-radius:40px;cursor:pointer;font-weight:700}
    .filters{padding:1rem 1.5rem;background:#f4faf8;border-bottom:1px solid #e0efeb;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:130px}
    .filter-group label{font-size:.7rem;font-weight:800;color:#1e6b63;text-transform:uppercase}
    select,input{padding:8px 14px;border-radius:2rem;border:1px solid #cfe0db;background:#fff;font-size:.8rem;outline:none}
    .btn-sm{background:#1f6e68;color:#fff;border:0;padding:8px 18px;border-radius:2rem;font-weight:700;cursor:pointer}
    .btn-secondary{background:#e2e8f0;color:#2c655e;border:0;padding:8px 18px;border-radius:2rem;cursor:pointer;font-weight:700}
    .stats-row{display:flex;flex-wrap:wrap;gap:1rem;padding:1rem 1.5rem;background:#fff;border-bottom:1px solid #eef4f2}
    .stat-card{background:#fefcf7;border-radius:1rem;padding:.6rem 1rem;text-align:center;flex:1;min-width:100px}
    .stat-number{font-size:1.6rem;font-weight:900;color:#1e5a4c}.stat-label{font-size:.7rem;color:#5b8a82;font-weight:700}
    .bulk-bar{padding:.6rem 1.5rem;background:#fef8e7;display:flex;flex-wrap:wrap;gap:.8rem;align-items:center;justify-content:space-between}
    .bulk-actions{display:flex;gap:.8rem;flex-wrap:wrap}
    .cards-list{display:flex;flex-direction:column;gap:1rem;padding:1.5rem}
    .ot-card{background:#fff;border-radius:1.2rem;border:1px solid #e0efeb;padding:1rem;transition:.2s;position:relative}
    .ot-card:hover{box-shadow:0 4px 12px rgba(0,0,0,.06)}
    .card-header{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:.5rem;margin-bottom:.8rem;padding-bottom:.5rem;border-bottom:1px solid #eef4f2}
    .emp-info h3{font-size:1rem;font-weight:800;color:#1e5a4c}.emp-details{font-size:.72rem;color:#6b8c9c;margin-top:3px}
    .status-badge{padding:5px 13px;border-radius:2rem;font-size:.7rem;font-weight:800}
    .status-pending{background:#fff3e0;color:#c47a2e}.status-approved{background:#e0f2e9;color:#1e6f3f}.status-rejected{background:#ffe6e5;color:#b91c1c}.status-cancelled{background:#e5e7eb;color:#475569}
    .card-body{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:.8rem}
    .info-row{flex:1;min-width:150px;font-size:.82rem;line-height:1.5}.full-width{flex-basis:100%}
    .info-label{font-weight:800;color:#2c655e}.hours-highlight{font-weight:900;color:#1e5a4c}
    .reason{background:#f4faf8;padding:7px 11px;border-radius:1rem;margin-top:6px;white-space:pre-wrap}
    .entries{background:#f8fafc;border:1px solid #edf2f7;border-radius:1rem;padding:8px 10px;margin-top:8px;font-size:.78rem}
    .entries table{width:100%;border-collapse:collapse}.entries th,.entries td{padding:6px;border-bottom:1px solid #e5e7eb;text-align:left}.entries tr:last-child td{border-bottom:0}
    .card-actions{display:flex;justify-content:flex-end;gap:.8rem;margin-top:.5rem;padding-top:.5rem;border-top:1px solid #eef4f2;flex-wrap:wrap}
    .action-btn{border:0;padding:7px 17px;border-radius:2rem;font-weight:800;cursor:pointer;font-size:.76rem}
    .approve-btn{background:#e0f2e9;color:#1e6f3f}.reject-btn{background:#ffe6e5;color:#b91c1c}.disabled-btn{background:#eef2f5;color:#8aa5a0;cursor:not-allowed}
    .select-checkbox{position:absolute;top:12px;right:12px;transform:scale(1.1);cursor:pointer}
    .pagination{display:flex;justify-content:center;gap:6px;padding:1rem;flex-wrap:wrap}.page-btn{background:#eef2f5;border:0;padding:6px 13px;border-radius:2rem;cursor:pointer;font-size:.75rem;font-weight:800}.page-btn.active{background:#1f6e68;color:#fff}
    .modal{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);justify-content:center;align-items:center;z-index:2000;padding:18px}
    .modal-content{background:#fff;max-width:480px;width:90%;border-radius:1.5rem;padding:1.5rem}.modal-header{font-size:1.2rem;font-weight:900;color:#1e5a4c;margin-bottom:1rem}
    .modal textarea{width:100%;padding:9px 13px;border-radius:1rem;border:1px solid #cfe0db;margin:8px 0;outline:none}
    .toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:#fff;padding:8px 16px;border-radius:40px;font-size:.78rem;z-index:3000;box-shadow:0 8px 22px rgba(0,0,0,.18)}
    .loading{padding:2rem;text-align:center;color:#2c655e;font-weight:900}
    @media(max-width:700px){body{padding:.5rem}.cards-list{padding:1rem}.filters{flex-direction:column;align-items:stretch}.filter-group{width:100%}.bulk-bar{align-items:flex-start}.bulk-actions{width:100%}.btn-sm,.btn-secondary{width:100%}.card-actions{justify-content:stretch}.action-btn{flex:1}}
  </style>
</head>

<body>
<div class="admin-container">
  <div class="top-bar">
    <div><i class="fas fa-user-shield"></i> Admin: <strong id="adminName">--</strong></div>
    <div class="org-info"><i class="fas fa-building"></i> <span id="orgName">--</span> | <span id="orgCode">--</span></div>
  </div>

  <div class="header">
    <h1><i class="fas fa-clock"></i> Overtime Management — Admin Approval</h1>
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Status</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="pending">Pending</option>
        <option value="approved">Approved</option>
        <option value="rejected">Rejected</option>
        <option value="cancelled">Cancelled</option>
      </select>
    </div>
    <div class="filter-group"><label>Department</label><select id="deptFilter"><option value="all">All Departments</option></select></div>
    <div class="filter-group"><label>Search</label><input type="text" id="searchInput" placeholder="Emp Name / ID / Mobile"></div>
    <div class="filter-group"><label>From</label><input type="date" id="fromDateFilter"></div>
    <div class="filter-group"><label>To</label><input type="date" id="toDateFilter"></div>
    <button id="applyFilter" class="btn-sm">Apply</button>
    <button id="resetFilter" class="btn-secondary">Reset</button>
    <button id="refreshBtn" class="btn-secondary">Refresh</button>
    <button id="exportExcel" class="btn-secondary">📎 Export Excel</button>
  </div>

  <div class="stats-row" id="statsRow"></div>

  <div class="bulk-bar">
    <div><i class="fas fa-check-square"></i> <span id="selectedCount">0</span> selected</div>
    <div class="bulk-actions">
      <button id="bulkApprove" class="btn-sm" style="background:#1f6e68;">✅ Approve Selected</button>
      <button id="bulkReject" class="btn-sm" style="background:#b91c1c;">❌ Reject Selected</button>
    </div>
  </div>

  <div id="cardsList" class="cards-list"></div>
  <div class="pagination" id="pagination"></div>
</div>

<div id="rejectModal" class="modal">
  <div class="modal-content">
    <div class="modal-header">Reject Overtime Request</div>
    <label>Reason for rejection *</label>
    <textarea id="rejectRemark" rows="3" placeholder="Enter remarks..."></textarea>
    <div style="display:flex;gap:10px;justify-content:flex-end;margin-top:1rem;">
      <button id="modalCancel" class="btn-secondary">Cancel</button>
      <button id="modalConfirm" class="btn-sm" style="background:#b91c1c;">Confirm Reject</button>
    </div>
  </div>
</div>

<script>
/* =========================================================
   SUPABASE CONFIG
========================================================= */
const SUPABASE_URL = "https://tovpcbzztvkiwamimrxt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let allOvertime = [];
let allEmployees = [];
let sessionCache = null;
let currentStatus = "all";
let currentDept = "all";
let currentSearch = "";
let currentFrom = "";
let currentTo = "";
let selectedRequests = new Set();
let currentPage = 1;
const itemsPerPage = 10;

/* =========================================================
   HELPERS
========================================================= */
function safeText(value, fallback="-"){
  if(value === null || value === undefined || value === "") return fallback;
  return String(value).replaceAll("&","&amp;").replaceAll("<","&lt;").replaceAll(">","&gt;").replaceAll('"',"&quot;").replaceAll("'","&#039;");
}
function isUuid(v){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v||""))}
function fmtDate(v){if(!v)return "-";const d=new Date(String(v).includes("T")?v:v+"T00:00:00");return Number.isNaN(d.getTime())?safeText(v):d.toLocaleDateString("en-IN")}
function fmtDateTime(v){if(!v)return "-";const d=new Date(v);return Number.isNaN(d.getTime())?safeText(v):d.toLocaleString("en-IN")}
function fmtHours(mins, hoursFallback){
  const m = Number(mins || 0);
  if(m > 0) return (m / 60).toFixed(2);
  const h = Number(hoursFallback || 0);
  return h.toFixed(2);
}
function showToast(msg, err=false){
  const old=document.querySelector(".toast"); if(old) old.remove();
  const toast=document.createElement("div");
  toast.className="toast"; toast.style.background=err?"#b91c1c":"#1a5e58"; toast.innerText=msg;
  document.body.appendChild(toast); setTimeout(()=>toast.remove(),3000);
}
function showLoading(msg="Loading overtime requests..."){
  document.getElementById("cardsList").innerHTML=`<div class="loading"><i class="fas fa-spinner fa-spin"></i> ${safeText(msg)}</div>`;
}
function getQueryParam(name){try{return new URLSearchParams(window.location.search).get(name)||""}catch(e){return ""}}
function scanLocalStorageForOrgCode(){
  const keys=["orgCode","org_code","companyCode","company_code","organizationCode","current_org_code"];
  for(const k of keys){const v=localStorage.getItem(k); if(v && v!=="undefined" && v!=="null") return v.replaceAll('"',"").trim()}
  for(let i=0;i<localStorage.length;i++){
    const raw=localStorage.getItem(localStorage.key(i))||"";
    const match=raw.match(/\b[A-Z]{2,10}\d{3,6}\b/);
    if(match) return match[0];
  }
  return "";
}
function readLocalData(){
  let session={}, personal={}, orgSign=[];
  try{session=JSON.parse(localStorage.getItem("currentSession")||"{}")}catch(e){}
  try{personal=JSON.parse(localStorage.getItem("personalData")||"{}")}catch(e){}
  try{orgSign=JSON.parse(localStorage.getItem("orgSignData")||"[]")}catch(e){}
  const firstOrg=Array.isArray(orgSign)&&orgSign.length?orgSign[0]:{};
  return {session,personal,firstOrg};
}
function getBasicSessionData(){
  const {session,personal,firstOrg}=readLocalData();
  return {
    rawUserId:getQueryParam("adminId")||getQueryParam("userId")||session.userId||session.adminId||session.orgUserId||session.org_user_id||session.id||personal.id||null,
    email:getQueryParam("email")||session.email||personal.email||session.userEmail||session.adminEmail||"",
    phone:session.phone||personal.phone||session.mobile||personal.mobile||session.adminPhone||"",
    orgId:getQueryParam("orgId")||getQueryParam("org_id")||session.orgId||session.org_id||session.companyId||firstOrg.id||firstOrg.org_id||null,
    orgCode:getQueryParam("orgCode")||getQueryParam("org_code")||session.orgCode||session.org_code||session.companyCode||session.company_code||firstOrg.orgCode||firstOrg.org_code||scanLocalStorageForOrgCode()||"",
    orgName:session.orgName||session.org_name||firstOrg.orgName||firstOrg.org_name||"OrgConnect",
    adminName:personal.fullName||personal.full_name||session.fullName||session.full_name||session.name||session.userId||"Admin",
    role:session.role||personal.role||"admin"
  };
}

/* =========================================================
   SESSION / ORG / ADMIN RESOLVE
========================================================= */
async function resolveOrgAndAdmin(){
  if(sessionCache) return sessionCache;
  const s=getBasicSessionData();
  let org=null, admin=null, warning="";

  if(s.orgId && isUuid(s.orgId)){
    const {data}=await supabaseClient.from("organizations").select("*").eq("id",s.orgId).eq("active",true).maybeSingle();
    org=data||null;
  }
  if(!org && s.orgCode){
    const {data}=await supabaseClient.from("organizations").select("*").eq("org_code",s.orgCode).eq("active",true).maybeSingle();
    org=data||null;
  }
  if(!org){
    const {data,error}=await supabaseClient.from("organizations").select("*").eq("active",true).order("created_at",{ascending:true}).limit(1).maybeSingle();
    org=data||null;
    if(org) warning=`currentSession me orgCode/orgId nahi mila, fallback org use hua: ${org.org_code}`;
    if(error) console.warn("Fallback org query error:", error);
  }
  if(!org) throw new Error("ORG_NOT_FOUND: active organization nahi mila.");

  if(s.rawUserId && isUuid(s.rawUserId)){
    const {data}=await supabaseClient.from("org_users").select("id,org_id,branch_id,full_name,email,phone,role,active").eq("id",s.rawUserId).eq("org_id",org.id).eq("active",true).maybeSingle();
    admin=data||null;
  }
  if(!admin && s.email){
    const {data}=await supabaseClient.from("org_users").select("id,org_id,branch_id,full_name,email,phone,role,active").eq("org_id",org.id).eq("email",s.email).eq("active",true).maybeSingle();
    admin=data||null;
  }
  if(!admin && s.phone){
    const {data}=await supabaseClient.from("org_users").select("id,org_id,branch_id,full_name,email,phone,role,active").eq("org_id",org.id).eq("phone",s.phone).eq("active",true).maybeSingle();
    admin=data||null;
  }
  if(!admin){
    const {data}=await supabaseClient.from("org_users")
      .select("id,org_id,branch_id,full_name,email,phone,role,active")
      .eq("org_id",org.id).eq("active",true)
      .in("role",["owner","admin","hr","manager","developer"])
      .order("created_at",{ascending:true}).limit(1).maybeSingle();
    admin=data||null;
  }

  sessionCache={
    orgId:org.id, orgCode:org.org_code, orgName:org.org_name,
    adminId:admin?admin.id:null,
    adminName:admin?admin.full_name:s.adminName,
    adminRole:admin?admin.role:s.role,
    adminResolved:!!admin,
    warning
  };
  if(warning) console.warn(warning);
  if(!admin) console.warn("Admin org_users me resolve nahi hua. Direct update fallback use hoga.");
  return sessionCache;
}
async function loadAdminInfo(){
  const basic=getBasicSessionData();
  document.getElementById("adminName").innerText=basic.adminName||"Admin";
  document.getElementById("orgName").innerText=basic.orgName||"OrgConnect";
  document.getElementById("orgCode").innerText=basic.orgCode||"--";
  try{
    const s=await resolveOrgAndAdmin();
    document.getElementById("adminName").innerText=s.adminName||"Admin";
    document.getElementById("orgName").innerText=s.orgName||"OrgConnect";
    document.getElementById("orgCode").innerText=s.orgCode||"--";
  }catch(e){
    console.warn("Admin info resolve warning:", e.message);
    showToast(e.message, true);
  }
}

/* =========================================================
   DATA LOAD
========================================================= */
async function loadEmployees(){
  const s=await resolveOrgAndAdmin();
  const {data,error}=await supabaseClient
    .from("employees")
    .select("id,org_id,branch_id,emp_code,full_name,department,designation,email,mobile,active")
    .eq("org_id",s.orgId).eq("active",true).order("full_name",{ascending:true});
  if(error){console.error("loadEmployees error:",error);showToast(error.message||"Employee load failed",true);return}
  allEmployees=data||[];
  populateDepartmentFilter();
}
function mapOvertimeRow(row){
  const emp=row.employees || {};
  const details = row.details || row.entries || row.request_details || null;
  const mins = Number(row.overtime_minutes || row.total_overtime_minutes || 0);
  const hours = mins > 0 ? mins / 60 : Number(row.overtime_hours || row.total_hours || row.hours || 0);
  return {
    id: row.id,
    orgId: row.org_id,
    branchId: row.branch_id || emp.branch_id || null,
    employeeId: row.employee_id,
    empId: row.emp_code || emp.emp_code || "-",
    empName: row.employee_name || emp.full_name || "-",
    dept: row.department || emp.department || "-",
    designation: row.designation || emp.designation || "-",
    email: row.email || emp.email || "-",
    mobile: row.mobile || emp.mobile || "-",
    attendanceId: row.attendance_id || null,
    date: row.overtime_date || row.request_date || row.attendance_date || row.created_at,
    overtimeMinutes: mins || Math.round(hours * 60),
    hours: hours,
    reason: row.reason || row.employee_note || "-",
    status: String(row.status || "pending").toLowerCase(),
    appliedOn: row.created_at,
    approvedBy: row.approved_by || row.approved_by_name || null,
    approvedAt: row.approved_at || null,
    rejectRemark: row.admin_note || row.reject_remark || "",
    attachmentUrl: row.attachment_url || "",
    attachmentName: row.attachment_name || "",
    details
  };
}
async function loadOvertimeRequests(){
  showLoading();
  const s=await resolveOrgAndAdmin();
  let rows=[];

  // RPC optional: agar SQL me function available ho to use karega.
  if(s.adminId){
    const {data,error}=await supabaseClient.rpc("admin_get_overtime_requests",{
      p_admin_user_id:s.adminId,
      p_status: currentStatus === "all" ? null : currentStatus,
      p_limit: 1000
    });
    if(!error && Array.isArray(data)){
      rows=data;
      allOvertime=rows.map(mapOvertimeRow);
      selectedRequests.clear();
      updateStatsAndList();
      return;
    }
    if(error) console.warn("admin_get_overtime_requests RPC not used:", error.message || error);
  }

  // Direct table fallback.
  let query=supabaseClient
    .from("overtime_requests")
    .select("*, employees:employee_id(full_name, emp_code, department, designation, email, mobile, branch_id)")
    .eq("org_id",s.orgId)
    .order("created_at",{ascending:false})
    .limit(1000);

  if(currentStatus !== "all") query=query.eq("status", currentStatus);

  const {data,error}=await query;
  if(error){
    console.error("overtime_requests error:",error);
    showToast(error.message || "Overtime load failed", true);
    allOvertime=[];
    updateStatsAndList();
    return;
  }
  allOvertime=(data||[]).map(mapOvertimeRow);
  selectedRequests.clear();
  updateStatsAndList();
}
function populateDepartmentFilter(){
  const depts=[...new Set(allEmployees.map(e=>e.department).filter(Boolean))];
  const select=document.getElementById("deptFilter");
  const prev=select.value||"all";
  select.innerHTML='<option value="all">All Departments</option>';
  depts.forEach(d=>select.innerHTML+=`<option value="${safeText(d)}">${safeText(d)}</option>`);
  if([...select.options].some(o=>o.value===prev)) select.value=prev;
}

/* =========================================================
   FILTER + RENDER
========================================================= */
function getFilteredOvertime(){
  let filtered=[...allOvertime];
  if(currentDept !== "all") filtered=filtered.filter(ot=>ot.dept===currentDept);
  if(currentSearch){
    const s=currentSearch.toLowerCase().trim();
    filtered=filtered.filter(ot =>
      String(ot.empName||"").toLowerCase().includes(s) ||
      String(ot.empId||"").toLowerCase().includes(s) ||
      String(ot.mobile||"").toLowerCase().includes(s) ||
      String(ot.email||"").toLowerCase().includes(s)
    );
  }
  if(currentFrom) filtered=filtered.filter(ot=>String(ot.date||ot.appliedOn||"").slice(0,10) >= currentFrom);
  if(currentTo) filtered=filtered.filter(ot=>String(ot.date||ot.appliedOn||"").slice(0,10) <= currentTo);
  return filtered;
}
function updateStatsAndList(){
  const filtered=getFilteredOvertime();
  const pending=filtered.filter(ot=>ot.status==="pending").length;
  const approved=filtered.filter(ot=>ot.status==="approved").length;
  const rejected=filtered.filter(ot=>ot.status==="rejected").length;
  const cancelled=filtered.filter(ot=>ot.status==="cancelled").length;
  const totalHours=filtered.reduce((sum,ot)=>sum+Number(ot.hours||0),0);
  document.getElementById("statsRow").innerHTML=`
    <div class="stat-card"><div class="stat-number">${filtered.length}</div><div class="stat-label">Total Requests</div></div>
    <div class="stat-card"><div class="stat-number">${pending}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-number">${approved}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card"><div class="stat-number">${rejected}</div><div class="stat-label">Rejected</div></div>
    <div class="stat-card"><div class="stat-number">${cancelled}</div><div class="stat-label">Cancelled</div></div>
    <div class="stat-card"><div class="stat-number">${totalHours.toFixed(1)}</div><div class="stat-label">Total OT Hrs</div></div>
  `;
  renderCards(filtered);
  renderPagination(filtered.length);
  document.getElementById("selectedCount").innerText=selectedRequests.size;
}
function statusClass(status){
  const s=String(status||"pending").toLowerCase();
  if(s==="approved") return "status-approved";
  if(s==="rejected") return "status-rejected";
  if(s==="cancelled") return "status-cancelled";
  return "status-pending";
}
function statusText(status){
  const s=String(status||"pending").toLowerCase();
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function renderDetails(details){
  if(!details) return "";
  let entries=[];
  if(Array.isArray(details)) entries=details;
  else if(Array.isArray(details.entries)) entries=details.entries;
  else if(Array.isArray(details.items)) entries=details.items;
  if(!entries.length) return "";
  return `
    <div class="entries">
      <table>
        <thead><tr><th>Date</th><th>Shift</th><th>Punch Out</th><th>Extra</th></tr></thead>
        <tbody>
          ${entries.map(e=>`
            <tr>
              <td>${safeText(e.date || e.overtime_date || "-")}</td>
              <td>${safeText(e.shiftStart || e.shift_start || "-")} - ${safeText(e.shiftEnd || e.shift_end || "-")}</td>
              <td>${safeText(e.actualOut || e.actual_out || e.punch_out || "-")}</td>
              <td>${safeText(e.extraHours || e.extra_hours || e.hours || "0")} hrs</td>
            </tr>
          `).join("")}
        </tbody>
      </table>
    </div>
  `;
}
function renderCards(filtered){
  const start=(currentPage-1)*itemsPerPage;
  const pageItems=filtered.slice(start,start+itemsPerPage);
  const container=document.getElementById("cardsList");
  if(!pageItems.length){
    container.innerHTML='<div class="loading">No overtime requests found</div>';
    return;
  }
  container.innerHTML=pageItems.map(ot=>{
    const isPending=ot.status==="pending";
    const checked=selectedRequests.has(ot.id)?"checked":"";
    return `
      <div class="ot-card">
        ${isPending ? `<input type="checkbox" class="select-checkbox" data-id="${safeText(ot.id)}" ${checked}>` : ""}
        <div class="card-header">
          <div class="emp-info">
            <h3>${safeText(ot.empName)} (${safeText(ot.empId)})</h3>
            <div class="emp-details">${safeText(ot.dept)} • ${safeText(ot.designation)} • Applied: ${fmtDate(ot.appliedOn)}</div>
          </div>
          <div><span class="status-badge ${statusClass(ot.status)}">${statusText(ot.status)}</span></div>
        </div>

        <div class="card-body">
          <div class="info-row"><span class="info-label">OT Date:</span> ${fmtDate(ot.date)}</div>
          <div class="info-row"><span class="info-label">Hours Requested:</span> <span class="hours-highlight">${Number(ot.hours||0).toFixed(2)} hrs</span></div>
          <div class="info-row"><span class="info-label">Minutes:</span> ${Number(ot.overtimeMinutes||0)}</div>
          <div class="info-row"><span class="info-label">Mobile:</span> ${safeText(ot.mobile)}</div>
          <div class="info-row full-width"><span class="info-label">Reason:</span><div class="reason">${safeText(ot.reason)}</div></div>
          ${ot.attachmentUrl ? `<div class="info-row full-width"><span class="info-label">Attachment:</span> <a href="${safeText(ot.attachmentUrl)}" target="_blank">${safeText(ot.attachmentName || "Open File")}</a></div>` : ""}
          ${renderDetails(ot.details)}
          ${ot.rejectRemark ? `<div class="info-row full-width"><span class="info-label">Admin Remark:</span><div class="reason" style="background:#ffe6e5;">${safeText(ot.rejectRemark)}</div></div>` : ""}
          ${ot.approvedAt ? `<div class="info-row full-width"><span class="info-label">Approved At:</span> ${fmtDateTime(ot.approvedAt)}</div>` : ""}
        </div>

        <div class="card-actions">
          ${isPending ? `
            <button class="action-btn approve-btn" data-id="${safeText(ot.id)}"><i class="fas fa-check-circle"></i> Approve</button>
            <button class="action-btn reject-btn" data-id="${safeText(ot.id)}"><i class="fas fa-times-circle"></i> Reject</button>
          ` : `<button class="action-btn disabled-btn" disabled>No actions available</button>`}
        </div>
      </div>
    `;
  }).join("");

  document.querySelectorAll(".approve-btn").forEach(btn=>btn.addEventListener("click",()=>updateOTStatus(btn.dataset.id,"approved",null)));
  document.querySelectorAll(".reject-btn").forEach(btn=>btn.addEventListener("click",()=>openRejectModal(btn.dataset.id)));
  document.querySelectorAll(".select-checkbox").forEach(cb=>cb.addEventListener("change",(e)=>{
    const id=e.target.dataset.id;
    if(e.target.checked) selectedRequests.add(id); else selectedRequests.delete(id);
    document.getElementById("selectedCount").innerText=selectedRequests.size;
  }));
}
function renderPagination(totalItems){
  const totalPages=Math.ceil(totalItems/itemsPerPage);
  const container=document.getElementById("pagination");
  if(totalPages<=1){container.innerHTML="";return}
  let html="";
  const start=Math.max(1,currentPage-2), end=Math.min(totalPages,currentPage+2);
  if(currentPage>1) html+=`<button class="page-btn" data-page="${currentPage-1}">‹ Prev</button>`;
  if(start>1) html+=`<button class="page-btn" data-page="1">1</button><span>...</span>`;
  for(let i=start;i<=end;i++) html+=`<button class="page-btn ${i===currentPage?"active":""}" data-page="${i}">${i}</button>`;
  if(end<totalPages) html+=`<span>...</span><button class="page-btn" data-page="${totalPages}">${totalPages}</button>`;
  if(currentPage<totalPages) html+=`<button class="page-btn" data-page="${currentPage+1}">Next ›</button>`;
  container.innerHTML=html;
  document.querySelectorAll(".page-btn").forEach(btn=>btn.addEventListener("click",()=>{currentPage=parseInt(btn.dataset.page,10);updateStatsAndList()}));
}

/* =========================================================
   APPROVE / REJECT
========================================================= */
async function updateOTStatus(otId,newStatus,remark){
  const ot=allOvertime.find(o=>o.id===otId);
  if(!ot){showToast("Request not found",true);return}
  if(ot.status!=="pending"){showToast(`Request already ${ot.status}`,true);return}
  const s=await resolveOrgAndAdmin();

  // Optional RPC first.
  if(s.adminId){
    const {data,error}=await supabaseClient.rpc("admin_update_overtime_status",{
      p_admin_user_id:s.adminId,
      p_overtime_id:otId,
      p_status:newStatus,
      p_admin_note:remark
    });
    if(!error){
      showToast(`Overtime request ${newStatus}`);
      await loadOvertimeRequests();
      return;
    }
    console.warn("admin_update_overtime_status RPC not used:", error.message || error);
  }

  // Direct fallback.
  const patch={
    status:newStatus,
    approved_by:newStatus==="approved" ? s.adminId : null,
    approved_at:newStatus==="approved" ? new Date().toISOString() : null
  };

  // Try common columns. If admin_note/updated_at not available, fallback below.
  patch.admin_note = remark || null;
  patch.updated_at = new Date().toISOString();

  let res=await supabaseClient.from("overtime_requests")
    .update(patch)
    .eq("id",otId)
    .eq("org_id",s.orgId)
    .eq("status","pending")
    .select("*")
    .maybeSingle();

  if(res.error){
    const msg=String(res.error.message||"").toLowerCase();
    if(msg.includes("admin_note") || msg.includes("updated_at") || msg.includes("column")){
      const {admin_note,updated_at,...cleanPatch}=patch;
      res=await supabaseClient.from("overtime_requests")
        .update(cleanPatch)
        .eq("id",otId)
        .eq("org_id",s.orgId)
        .eq("status","pending")
        .select("*")
        .maybeSingle();
    }
  }

  if(res.error){console.error("update overtime error:",res.error);showToast(res.error.message||"Update failed",true);return}
  if(!res.data){showToast("Request pending status me nahi mila",true);return}

  // Employee notification best effort.
  try{
    await supabaseClient.from("notifications").insert({
      org_id:s.orgId,
      employee_id:ot.employeeId,
      title:newStatus==="approved" ? "Overtime approved" : "Overtime rejected",
      message:newStatus==="approved" ? `Your overtime request of ${Number(ot.hours||0).toFixed(2)} hrs is approved.` : `Your overtime request is rejected. ${remark || ""}`,
      notification_type:"overtime"
    });
  }catch(e){console.warn("notification skipped",e)}

  showToast(`Overtime request ${newStatus}`);
  await loadOvertimeRequests();
}

let pendingRejectId=null;
function openRejectModal(otId){
  pendingRejectId=otId;
  document.getElementById("rejectRemark").value="";
  document.getElementById("rejectModal").style.display="flex";
}
function closeModal(){
  document.getElementById("rejectModal").style.display="none";
  pendingRejectId=null;
}
async function confirmReject(){
  const remark=document.getElementById("rejectRemark").value.trim();
  if(!remark){showToast("Please provide a rejection reason",true);return}
  if(pendingRejectId){
    await updateOTStatus(pendingRejectId,"rejected",remark);
    closeModal();
  }
}
async function bulkAction(status){
  if(selectedRequests.size===0){showToast("No pending request selected",true);return}
  let remark=null;
  if(status==="rejected"){
    remark=prompt("Enter rejection reason for all selected requests:","Not approved by admin");
    if(!remark) return;
  }
  const ids=[...selectedRequests];
  for(const id of ids){
    await updateOTStatus(id,status,remark);
  }
  selectedRequests.clear();
  document.getElementById("selectedCount").innerText=0;
  await loadOvertimeRequests();
  showToast(`Bulk ${status} completed`);
}

/* =========================================================
   EXPORT / FILTERS
========================================================= */
function exportToExcel(){
  const filtered=getFilteredOvertime();
  if(!filtered.length){showToast("No data to export",true);return}
  const sheetData=[["Request ID","Employee","Emp ID","Dept","OT Date","Hours","Minutes","Reason","Status","Admin Remark","Applied On","Approved At"]];
  filtered.forEach(ot=>{
    sheetData.push([ot.id,ot.empName,ot.empId,ot.dept,String(ot.date||"").slice(0,10),Number(ot.hours||0).toFixed(2),Number(ot.overtimeMinutes||0),ot.reason,ot.status,ot.rejectRemark||"",fmtDateTime(ot.appliedOn),fmtDateTime(ot.approvedAt)]);
  });
  const ws=XLSX.utils.aoa_to_sheet(sheetData);
  const wb=XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb,ws,"Overtime_Requests");
  XLSX.writeFile(wb,`Overtime_Requests_${new Date().toISOString().slice(0,10)}.xlsx`);
  showToast("Excel exported");
}
async function applyFilters(){
  currentStatus=document.getElementById("statusFilter").value;
  currentDept=document.getElementById("deptFilter").value;
  currentSearch=document.getElementById("searchInput").value;
  currentFrom=document.getElementById("fromDateFilter").value;
  currentTo=document.getElementById("toDateFilter").value;
  currentPage=1;
  selectedRequests.clear();
  await loadOvertimeRequests();
}
async function resetFilters(){
  document.getElementById("statusFilter").value="all";
  document.getElementById("deptFilter").value="all";
  document.getElementById("searchInput").value="";
  document.getElementById("fromDateFilter").value="";
  document.getElementById("toDateFilter").value="";
  currentStatus="all"; currentDept="all"; currentSearch=""; currentFrom=""; currentTo="";
  currentPage=1; selectedRequests.clear();
  await loadOvertimeRequests();
}

/* =========================================================
   INIT
========================================================= */
document.getElementById("applyFilter").addEventListener("click",applyFilters);
document.getElementById("resetFilter").addEventListener("click",resetFilters);
document.getElementById("refreshBtn").addEventListener("click",loadOvertimeRequests);
document.getElementById("exportExcel").addEventListener("click",exportToExcel);
document.getElementById("bulkApprove").addEventListener("click",()=>bulkAction("approved"));
document.getElementById("bulkReject").addEventListener("click",()=>bulkAction("rejected"));
document.getElementById("backBtn").addEventListener("click",()=>{ window.location.href = "admin.html"; });
document.getElementById("modalCancel").addEventListener("click",closeModal);
document.getElementById("modalConfirm").addEventListener("click",confirmReject);
window.addEventListener("click",(e)=>{if(e.target===document.getElementById("rejectModal")) closeModal()});

(async function init(){
  try{
    await loadAdminInfo();
    await loadEmployees();
    await loadOvertimeRequests();
  }catch(e){
    console.error("initialize error:",e);
    showToast(e.message || "Screen initialize failed", true);
    document.getElementById("cardsList").innerHTML=`<div class="loading">${safeText(e.message || "Screen initialize failed")}</div>`;
  }
})();
</script>
