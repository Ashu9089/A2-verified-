<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Holiday Calendar | Admin Panel</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: 'Inter', system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
    }

    body {
      background: radial-gradient(ellipse at 20% 30%, #0f2f2c, #051c1a);
      min-height: 100vh;
      padding: 1rem;
    }

    .container {
      max-width: 1300px;
      margin: 0 auto;
      background: rgba(255, 255, 255, 0.96);
      backdrop-filter: blur(2px);
      border-radius: 2rem;
      box-shadow: 0 30px 50px rgba(0, 0, 0, 0.25);
      overflow: hidden;
    }

    .top-bar {
      background: #0a2c2f;
      padding: 0.7rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      color: white;
    }
    .org-info { background: #174d47; padding: 4px 14px; border-radius: 40px; font-size: 0.8rem; }

    .header {
      background: linear-gradient(135deg, #1a5c54, #0e3d38);
      padding: 0.8rem 1.5rem;
      display: flex;
      justify-content: space-between;
      align-items: center;
      flex-wrap: wrap;
      gap: 0.8rem;
      color: white;
    }
    .header h1 { font-size: 1.3rem; display: flex; align-items: center; gap: 8px; }
    .back-btn {
      background: rgba(255,255,255,0.15);
      border: none;
      padding: 5px 14px;
      border-radius: 40px;
      cursor: pointer;
    }

    /* Admin Form */
    .admin-form {
      padding: 1.5rem;
      background: #f4faf8;
      border-bottom: 1px solid #e0efeb;
      display: flex;
      flex-wrap: wrap;
      gap: 1rem;
      align-items: flex-end;
    }
    .form-group {
      display: flex;
      flex-direction: column;
      gap: 5px;
      flex: 1;
      min-width: 140px;
    }
    .form-group label {
      font-size: 0.7rem;
      font-weight: 700;
      color: #1e6b63;
      text-transform: uppercase;
    }
    input, select {
      padding: 8px 14px;
      border-radius: 2rem;
      border: 1px solid #cfe0db;
      background: white;
      font-size: 0.8rem;
      outline: none;
    }
    .btn-sm {
      background: #1f6e68;
      color: white;
      border: none;
      padding: 8px 20px;
      border-radius: 2rem;
      font-weight: 600;
      cursor: pointer;
    }
    .btn-secondary {
      background: #e2e8f0;
      color: #2c655e;
      border: none;
      padding: 8px 20px;
      border-radius: 2rem;
      cursor: pointer;
    }

    /* Holiday List Table */
    .table-wrapper {
      overflow-x: auto;
      padding: 1rem 1.5rem;
    }
    .holiday-table {
      width: 100%;
      border-collapse: collapse;
      background: white;
      border-radius: 1rem;
      overflow: hidden;
    }
    .holiday-table th, .holiday-table td {
      padding: 12px 8px;
      text-align: left;
      border-bottom: 1px solid #eef4f2;
    }
    .holiday-table th {
      background: #eef6f4;
      color: #1e5a4c;
      font-weight: 700;
    }
    .action-icons i {
      margin: 0 4px;
      cursor: pointer;
      color: #1f6e68;
    }
    .action-icons i.fa-trash-alt {
      color: #b91c1c;
    }

    /* Employee Preview */
    .preview-section {
      margin: 0 1.5rem 1.5rem;
      background: #fefcf7;
      border-radius: 1.2rem;
      border: 1px solid #e0efeb;
      padding: 1rem;
    }
    .preview-title {
      font-size: 1rem;
      font-weight: 700;
      color: #1e5a4c;
      margin-bottom: 0.8rem;
    }
    .preview-list {
      display: flex;
      flex-wrap: wrap;
      gap: 0.8rem;
    }
    .holiday-card {
      background: white;
      border-radius: 1rem;
      padding: 0.6rem 1rem;
      border: 1px solid #e0efeb;
      min-width: 180px;
    }
    .holiday-date {
      font-weight: 700;
      color: #1e5a4c;
    }
    .holiday-name {
      font-size: 0.9rem;
    }
    .toast {
      position: fixed;
      bottom: 20px;
      left: 20px;
      background: #1a5e58;
      color: white;
      padding: 6px 14px;
      border-radius: 40px;
      font-size: 0.75rem;
      z-index: 3000;
      animation: fadeOut 3s forwards;
    }
    @keyframes fadeOut { 0% { opacity: 1; } 70% { opacity: 1; } 100% { opacity: 0; visibility: hidden; } }
  </style>
</head>
<body>
<div class="container">
  <div class="top-bar">
    <div><i class="fas fa-user-shield"></i> Admin: <strong id="adminName">--</strong></div>
    <div class="org-info"><i class="fas fa-building"></i> <span id="orgName">--</span> | <span id="orgCode">--</span></div>
  </div>
  <div class="header">
    <h1><i class="fas fa-calendar-alt"></i> Holiday Calendar Manager</h1>
    <button class="back-btn" id="backBtn"><i class="fas fa-arrow-left"></i> Back</button>
  </div>

  <!-- Add/Edit Holiday Form -->
  <div class="admin-form">
    <div class="form-group">
      <label>Holiday Name</label>
      <input type="text" id="holidayName" placeholder="e.g., Diwali, Republic Day">
    </div>
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="holidayDate">
    </div>
    <div class="form-group">
      <label>Type</label>
      <select id="holidayType">
        <option value="Optional">Optional / Restricted</option>
        <option value="Paid">Paid Holiday</option>
        <option value="Festival">Festival</option>
      </select>
    </div>
    <div class="form-group">
      <label>Description (Optional)</label>
      <input type="text" id="holidayDesc" placeholder="e.g., National festival">
    </div>
    <button id="addHolidayBtn" class="btn-sm"><i class="fas fa-plus"></i> Add Holiday</button>
    <button id="updateHolidayBtn" class="btn-sm" style="display:none; background:#c47a2e;"><i class="fas fa-save"></i> Update</button>
    <button id="cancelEditBtn" class="btn-secondary" style="display:none;">Cancel</button>
  </div>

  <!-- Holiday List Table -->
  <div class="table-wrapper">
    <table class="holiday-table">
      <thead>
        <tr><th>Date</th><th>Holiday Name</th><th>Type</th><th>Description</th><th>Actions</th></tr>
      </thead>
      <tbody id="holidayTableBody"></tbody>
    </table>
  </div>

  <!-- Employee Preview (How employees see) -->
  <div class="preview-section">
    <div class="preview-title"><i class="fas fa-eye"></i> Employee View (Upcoming Holidays)</div>
    <div id="previewList" class="preview-list"></div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

<script>
const SUPABASE_URL = "https://tovpcbzztvkiwamimrxt.supabase.co";
const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE";
const supabaseClient = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let holidays = [];
let editId = null;
let CURRENT_ORG_ID = null;
let CURRENT_ORG_CODE = null;

function qs(id) {
  return document.getElementById(id);
}

function getParam(name) {
  return new URLSearchParams(window.location.search).get(name);
}

function safeJson(key) {
  try {
    return JSON.parse(localStorage.getItem(key) || "{}");
  } catch (e) {
    return {};
  }
}

async function loadAdminInfo() {
  const session = safeJson("currentSession");

  CURRENT_ORG_ID =
    getParam("org_id") ||
    session.orgId ||
    session.org_id ||
    null;

  CURRENT_ORG_CODE =
    getParam("org_code") ||
    session.orgCode ||
    session.org_code ||
    null;

  const adminName =
    session.fullName ||
    session.full_name ||
    session.name ||
    getParam("emp_code") ||
    "Admin";

  let orgName =
    session.orgName ||
    session.org_name ||
    "Organization";

  if (!CURRENT_ORG_ID && CURRENT_ORG_CODE) {
    const res = await supabaseClient
      .from("organizations")
      .select("id, org_name, org_code")
      .eq("org_code", CURRENT_ORG_CODE)
      .maybeSingle();

    if (!res.error && res.data) {
      CURRENT_ORG_ID = res.data.id;
      CURRENT_ORG_CODE = res.data.org_code;
      orgName = res.data.org_name || orgName;
    }
  }

  qs("adminName").innerText = adminName;
  qs("orgName").innerText = orgName;
  qs("orgCode").innerText = CURRENT_ORG_CODE || "--";

  if (!CURRENT_ORG_ID) {
    showToast("ORG_NOT_FOUND: URL ya session me org_id nahi mila", true);
    return false;
  }

  return true;
}

async function loadHolidays() {
  if (!CURRENT_ORG_ID) return;

  const res = await supabaseClient
    .from("org_holidays")
    .select("id, org_id, org_code, holiday_name, holiday_date, holiday_type, description, active, created_at")
    .eq("org_id", CURRENT_ORG_ID)
    .eq("active", true)
    .order("holiday_date", { ascending: true });

  if (res.error) {
    console.error("loadHolidays error:", res.error);
    showToast("Holiday load error: " + res.error.message, true);
    return;
  }

  holidays = res.data || [];
  renderHolidayTable();
  renderPreview();
}

function renderHolidayTable() {
  const tbody = qs("holidayTableBody");

  if (!holidays.length) {
    tbody.innerHTML = '<tr><td colspan="5" style="text-align:center;">No holidays added.</td></tr>';
    return;
  }

  let html = "";

  holidays.forEach(function(hol) {
    html += "<tr>";
    html += "<td>" + formatDate(hol.holiday_date) + "</td>";
    html += "<td>" + escapeHtml(hol.holiday_name) + "</td>";
    html += "<td>" + escapeHtml(hol.holiday_type || "-") + "</td>";
    html += "<td>" + escapeHtml(hol.description || "-") + "</td>";
    html += '<td class="action-icons">';
    html += '<i class="fas fa-edit" onclick="editHoliday(\'' + hol.id + '\')"></i>';
    html += '<i class="fas fa-trash-alt" onclick="deleteHoliday(\'' + hol.id + '\')"></i>';
    html += "</td>";
    html += "</tr>";
  });

  tbody.innerHTML = html;
}

function renderPreview() {
  const today = new Date().toISOString().slice(0, 10);
  const container = qs("previewList");

  const upcoming = holidays.filter(function(h) {
    return h.holiday_date >= today;
  }).slice(0, 12);

  if (!upcoming.length) {
    container.innerHTML = "<p>No upcoming holidays</p>";
    return;
  }

  let html = "";

  upcoming.forEach(function(hol) {
    html += '<div class="holiday-card">';
    html += '<div class="holiday-date">' + formatDate(hol.holiday_date) + "</div>";
    html += '<div class="holiday-name"><strong>' + escapeHtml(hol.holiday_name) + "</strong></div>";
    html += '<div style="font-size:0.7rem; color:#6b8c9c;">' + escapeHtml(hol.holiday_type || "") + "</div>";
    if (hol.description) {
      html += '<div style="font-size:0.7rem;">' + escapeHtml(hol.description) + "</div>";
    }
    html += "</div>";
  });

  container.innerHTML = html;
}

async function addHoliday() {
  const name = qs("holidayName").value.trim();
  const date = qs("holidayDate").value;
  const type = qs("holidayType").value;
  const desc = qs("holidayDesc").value.trim();

  if (!name || !date) {
    showToast("Holiday name and date required", true);
    return;
  }

  if (!CURRENT_ORG_ID) {
    showToast("ORG_NOT_FOUND", true);
    return;
  }

  const duplicate = holidays.find(function(h) {
    return h.holiday_date === date &&
      String(h.holiday_name).toLowerCase() === name.toLowerCase();
  });

  if (duplicate) {
    showToast("Ye holiday already added hai", true);
    return;
  }

  const res = await supabaseClient
    .from("org_holidays")
    .insert({
      org_id: CURRENT_ORG_ID,
      org_code: CURRENT_ORG_CODE,
      holiday_name: name,
      holiday_date: date,
      holiday_type: type,
      description: desc,
      active: true
    });

  if (res.error) {
    console.error("addHoliday error:", res.error);
    showToast("Holiday add error: " + res.error.message, true);
    return;
  }

  clearForm();
  await loadHolidays();
  showToast("Holiday added");
}

function editHoliday(id) {
  const hol = holidays.find(function(h) {
    return h.id === id;
  });

  if (!hol) return;

  qs("holidayName").value = hol.holiday_name || "";
  qs("holidayDate").value = hol.holiday_date || "";
  qs("holidayType").value = hol.holiday_type || "Optional";
  qs("holidayDesc").value = hol.description || "";

  editId = id;

  qs("addHolidayBtn").style.display = "none";
  qs("updateHolidayBtn").style.display = "block";
  qs("cancelEditBtn").style.display = "block";
}

async function updateHoliday() {
  if (!editId) return;

  const name = qs("holidayName").value.trim();
  const date = qs("holidayDate").value;
  const type = qs("holidayType").value;
  const desc = qs("holidayDesc").value.trim();

  if (!name || !date) {
    showToast("Holiday name and date required", true);
    return;
  }

  const res = await supabaseClient
    .from("org_holidays")
    .update({
      holiday_name: name,
      holiday_date: date,
      holiday_type: type,
      description: desc
    })
    .eq("id", editId)
    .eq("org_id", CURRENT_ORG_ID);

  if (res.error) {
    console.error("updateHoliday error:", res.error);
    showToast("Holiday update error: " + res.error.message, true);
    return;
  }

  clearForm();
  await loadHolidays();
  showToast("Holiday updated");
}

async function deleteHoliday(id) {
  if (!confirm("Delete this holiday?")) return;

  const res = await supabaseClient
    .from("org_holidays")
    .update({ active: false })
    .eq("id", id)
    .eq("org_id", CURRENT_ORG_ID);

  if (res.error) {
    console.error("deleteHoliday error:", res.error);
    showToast("Holiday delete error: " + res.error.message, true);
    return;
  }

  await loadHolidays();
  showToast("Holiday deleted");
}

function clearForm() {
  qs("holidayName").value = "";
  qs("holidayDate").value = "";
  qs("holidayType").value = "Optional";
  qs("holidayDesc").value = "";

  editId = null;

  qs("addHolidayBtn").style.display = "block";
  qs("updateHolidayBtn").style.display = "none";
  qs("cancelEditBtn").style.display = "none";
}

function formatDate(dateStr) {
  if (!dateStr) return "-";
  const d = new Date(dateStr + "T00:00:00");
  return d.toLocaleDateString("en-IN", {
    day: "2-digit",
    month: "short",
    year: "numeric"
  });
}

function escapeHtml(str) {
  if (!str) return "";
  return String(str).replace(/[&<>"]/g, function(m) {
    return {
      "&": "&amp;",
      "<": "&lt;",
      ">": "&gt;",
      '"': "&quot;"
    }[m];
  });
}

function showToast(msg, err) {
  const old = document.querySelector(".toast");
  if (old) old.remove();

  const toast = document.createElement("div");
  toast.className = "toast";
  toast.style.background = err ? "#b91c1c" : "#1a5e58";
  toast.innerText = msg;
  document.body.appendChild(toast);

  setTimeout(function() {
    toast.remove();
  }, 3000);
}

qs("addHolidayBtn").addEventListener("click", addHoliday);
qs("updateHolidayBtn").addEventListener("click", updateHoliday);
qs("cancelEditBtn").addEventListener("click", clearForm);

qs("backBtn").addEventListener("click", function() {
  location.href = "admin.html";
});

window.editHoliday = editHoliday;
window.deleteHoliday = deleteHoliday;

(async function() {
  const ok = await loadAdminInfo();
  if (ok) await loadHolidays();
})();
</script>
</body>
</html>
