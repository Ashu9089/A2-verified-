<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Employee Shift Swap | Supabase</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body{background:linear-gradient(135deg,#10172b 0%,#1a253f 100%);min-height:100vh;padding:32px 20px;display:flex;justify-content:center;align-items:center}
    .swap-card{max-width:1050px;width:100%;background:#fff;border-radius:2rem;box-shadow:0 25px 45px -12px rgba(0,0,0,.35);overflow:hidden}
    .swap-header{background:#0f172a;padding:1rem 1.8rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .back-btn{background:rgba(255,255,255,.1);padding:8px 20px;border-radius:40px;color:#fff;font-weight:700;cursor:pointer;font-size:.9rem;border:0}
    .emp-badge{background:#1e293b;padding:8px 24px;border-radius:60px;color:#e2e8f0;font-size:.9rem;font-weight:600}.emp-badge strong{color:#facc15}
    .form-content{padding:28px 32px 24px}.field-group{margin-bottom:20px;display:flex;flex-direction:column;gap:8px}.row-two{display:flex;gap:24px;flex-wrap:wrap}.row-two .field-group{flex:1;min-width:230px}
    label{font-weight:800;color:#0f2b3d;font-size:.85rem;letter-spacing:.2px}input,select,textarea{border:1px solid #cbd5e1;border-radius:1.25rem;padding:12px 18px;font-size:.9rem;background:#fff;outline:none;width:100%}
    input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18)}
    .shift-badge{background:#eff6ff;padding:10px 16px;border-radius:28px;font-weight:800;color:#1e3a8a;width:fit-content;line-height:1.5}
    .partner-search-area{background:#f8fafc;border-radius:1.5rem;padding:1.2rem 1.5rem;margin:12px 0 8px;border:1px solid #e2edf7}
    .suggest-box{background:#fff;border-radius:1.25rem;margin-top:8px;max-height:220px;overflow-y:auto;box-shadow:0 5px 14px rgba(0,0,0,.05);border:1px solid #e0e7ef}
    .suggest-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #edf2f7;transition:.1s}.suggest-item:hover{background:#eef4ff}
    .selected-partner-card{background:#eef2ff;border-left:5px solid #3b82f6;border-radius:1.2rem;padding:12px 18px;margin-top:12px;font-size:.9rem;line-height:1.5}
    .warning-card{background:#fff7ed;border-left:5px solid #f97316;border-radius:1.2rem;padding:12px 18px;margin-top:12px;color:#9a3412;font-weight:800;display:none}
    .success-card{background:#ecfdf5;border-left:5px solid #22c55e;border-radius:1.2rem;padding:12px 18px;margin-top:12px;color:#166534;font-weight:800;display:none}
    .submit-swap{background:#1e3a8a;color:#fff;border:0;border-radius:3rem;padding:14px;font-weight:900;font-size:1rem;width:100%;cursor:pointer;transition:.2s;margin-top:18px}.submit-swap:hover{background:#0f2b6d;transform:scale(.99)}.submit-swap:disabled{opacity:.55;cursor:not-allowed}
    .history-section{background:#f1f5f9;border-radius:1.5rem;margin:0 32px 32px;padding:1.2rem 1.5rem}.history-title{font-weight:900;font-size:1.2rem;color:#0f172a;margin-bottom:16px}
    .swap-history-list{display:flex;flex-direction:column;gap:12px}.history-item{background:#fff;border-radius:1.2rem;padding:14px 18px;border-left:5px solid #f59e0b;box-shadow:0 1px 3px rgba(0,0,0,.05);line-height:1.55}
    .badge{background:#eef2ff;padding:3px 12px;border-radius:40px;font-size:.72rem;font-weight:900}.pending{background:#fef3c7;color:#92400e}.approved{background:#dcfce7;color:#166534}.rejected{background:#fee2e2;color:#991b1b}
    .toast-msg{position:fixed;bottom:20px;left:20px;background:#0f3b2c;color:#fff;padding:12px 24px;border-radius:40px;font-weight:700;z-index:1200}
    .workflow{background:#ecfeff;border:1px solid #a5f3fc;padding:12px 16px;border-radius:14px;margin-top:12px;color:#155e75;font-size:14px;font-weight:700;line-height:1.5}
    @media(max-width:700px){.form-content{padding:20px}.swap-header{flex-direction:column;align-items:flex-start}.history-section{margin:0 20px 20px}}
  </style>
</head>
<body>
<div class="swap-card">
  <div class="swap-header">
    <button class="back-btn" id="backArrowShift">← Back to Dashboard</button>
    <div class="emp-badge" id="currentEmpShiftInfo">Loading employee...</div>
  </div>

  <div class="form-content">
    <div class="field-group">
      <label>🕒 My Current Shift</label>
      <div class="shift-badge" id="myCurrentShift">Loading current roster...</div>
    </div>

    <div class="row-two">
      <div class="field-group">
        <label>📅 Swap Date</label>
        <input type="date" id="swapDate">
      </div>
      <div class="field-group">
        <label>🔄 Requested Shift I Want</label>
        <select id="desiredShift">
          <option value="">First select date / partner</option>
        </select>
      </div>
    </div>

    <div class="partner-search-area">
      <label>👥 Search Employee For Shift Swap (Name / Employee ID)</label>
      <input type="text" id="partnerSearch" placeholder="Type name or emp id..." autocomplete="off">
      <div id="partnerSuggestions" class="suggest-box"></div>
      <div id="selectedPartnerCard" class="selected-partner-card" style="display:none"></div>
      <div id="availabilityWarning" class="warning-card"></div>
      <div id="availabilitySuccess" class="success-card"></div>
    </div>

    <div class="field-group">
      <label>📝 Reason For Shift Swap</label>
      <textarea rows="3" id="swapReason" placeholder="Reason likho..."></textarea>
    </div>

    <div class="workflow">
      Flow: Aap request bhejoge → selected employee approve karega → admin approve karega → dono employees ka roster auto swap hoga.
    </div>

    <button class="submit-swap" id="submitSwapBtn">↻ Submit Shift Swap Request</button>
  </div>

  <div class="history-section">
    <div class="history-title">📋 Recent Shift Swap Requests</div>
    <div id="swapHistoryList" class="swap-history-list"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

function sbFetch(path,opts={}){
  return fetch(SUPABASE_URL+path,{...opts,headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json',Prefer:'return=representation',...(opts.headers||{})}})
  .then(async r=>{const t=await r.text();let d=null;try{d=t?JSON.parse(t):null}catch{d=t}if(!r.ok)throw new Error(d?.message||d?.details||t||r.statusText);return d;});
}
function sbRpc(fn,args){return sbFetch('/rest/v1/rpc/'+fn,{method:'POST',body:JSON.stringify(args||{})});}
const $=id=>document.getElementById(id);
let state={org:null,emp:null,myRoster:null,partner:null,partnerRoster:null,partnerAvailable:false,history:[]};

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(msg,err=false){let o=document.querySelector('.toast-msg');if(o)o.remove();const d=document.createElement('div');d.className='toast-msg';d.style.background=err?'#9f1239':'#0f3b2c';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),3200)}
function todayISO(){const d=new Date();return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function fmtTime(v){return v?String(v).slice(0,5):'--'}
function fmtDate(v){if(!v)return'--';return new Date(v+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function getLogin(){let cur={};try{cur=JSON.parse(localStorage.getItem('inlist_employee_login_v2')||localStorage.getItem('currentEmployee')||'{}')}catch(e){};return{org_code:String(cur.org_code||cur.orgCode||localStorage.getItem('org_code')||localStorage.getItem('orgCode')||'HOSP001').toUpperCase(),emp_code:String(cur.emp_code||cur.empCode||localStorage.getItem('emp_code')||localStorage.getItem('empCode')||'EMP001').toUpperCase()}}
function saveLogin(){localStorage.setItem('currentEmployee',JSON.stringify({org_code:state.org?.org_code,org_id:state.org?.id,emp_code:state.emp?.emp_code,employee_id:state.emp?.id,full_name:state.emp?.full_name,email:state.emp?.email,mobile:state.emp?.mobile}))}

async function init(){
  const login=getLogin();
  $('swapDate').min=todayISO();
  $('swapDate').value=new URLSearchParams(location.search).get('date') || todayISO();

  const orgs=await sbFetch(`/rest/v1/organizations?org_code=eq.${encodeURIComponent(login.org_code)}&active=eq.true&select=*`);
  if(!orgs[0]) throw new Error('ORG_NOT_FOUND');
  state.org=orgs[0];

  const emps=await sbFetch(`/rest/v1/employees?org_id=eq.${state.org.id}&emp_code=eq.${encodeURIComponent(login.emp_code)}&active=eq.true&select=*`);
  if(!emps[0]) throw new Error('EMPLOYEE_NOT_FOUND');
  state.emp=emps[0]; saveLogin();

  $('currentEmpShiftInfo').innerHTML=`<strong>${esc(state.emp.full_name)}</strong> | ID: ${esc(state.emp.emp_code)} | Dept: ${esc(state.emp.department||'-')}`;

  await loadMyRoster();
  await loadHistory();
}
async function loadMyRoster(){
  const date=$('swapDate').value;
  state.myRoster=null; state.partner=null; state.partnerRoster=null; state.partnerAvailable=false;
  $('selectedPartnerCard').style.display='none'; $('availabilityWarning').style.display='none'; $('availabilitySuccess').style.display='none'; $('partnerSearch').value=''; $('partnerSuggestions').innerHTML='';
  const rows=await sbFetch(`/rest/v1/rosters?org_id=eq.${state.org.id}&employee_id=eq.${state.emp.id}&roster_date=eq.${date}&active=eq.true&select=*`);
  state.myRoster=rows[0]||null;
  if(!state.myRoster){
    $('myCurrentShift').innerHTML=`${fmtDate(date)}: No roster found.`;
    $('desiredShift').innerHTML='<option value="">No roster found</option>';
    $('submitSwapBtn').disabled=true;
    return;
  }
  $('submitSwapBtn').disabled=false;
  $('myCurrentShift').innerHTML=`${esc(state.myRoster.shift_name||'Shift')} (${fmtTime(state.myRoster.shift_start)} - ${fmtTime(state.myRoster.shift_end)}) • ${fmtDate(date)}`;
  $('desiredShift').innerHTML='<option value="">Search partner first</option>';
}
async function searchEmployees(q){
  q=String(q||'').trim();
  if(q.length<1){$('partnerSuggestions').innerHTML='';return;}
  const rows=await sbRpc('app_search_shift_swap_partners',{p_org_id:state.org.id,p_self_employee_id:state.emp.id,p_query:q,p_swap_date:$('swapDate').value});
  renderSuggestions(rows||[]);
}
function renderSuggestions(rows){
  if(!rows.length){$('partnerSuggestions').innerHTML='<div class="suggest-item">No employee found</div>';return;}
  $('partnerSuggestions').innerHTML=rows.map(emp=>`
    <div class="suggest-item" data-id="${emp.employee_id}">
      👤 ${esc(emp.full_name)} (${esc(emp.emp_code)}) — ${esc(emp.department||'-')}
      <br><small>Shift: ${esc(emp.shift_name||'No roster')} (${fmtTime(emp.shift_start)}-${fmtTime(emp.shift_end)})</small>
    </div>`).join('');
  document.querySelectorAll('.suggest-item[data-id]').forEach(el=>el.onclick=()=>selectPartner(el.dataset.id));
}
async function selectPartner(employeeId){
  const date=$('swapDate').value;
  const data=await sbRpc('app_get_shift_swap_partner_status',{p_org_id:state.org.id,p_self_employee_id:state.emp.id,p_partner_employee_id:employeeId,p_swap_date:date});
  state.partner=data.partner;
  state.partnerRoster=data.partner_roster;
  state.partnerAvailable=!!data.available;

  $('partnerSuggestions').innerHTML='';
  $('partnerSearch').value=`${state.partner.full_name} (${state.partner.emp_code})`;
  $('selectedPartnerCard').style.display='block';
  $('selectedPartnerCard').innerHTML=`✅ <strong>Selected:</strong> ${esc(state.partner.full_name)} (${esc(state.partner.emp_code)})<br>
    Dept: ${esc(state.partner.department||'-')}<br>
    Current Shift: ${esc(state.partnerRoster?.shift_name||'No roster')} (${fmtTime(state.partnerRoster?.shift_start)} - ${fmtTime(state.partnerRoster?.shift_end)})`;

  if(!data.available){
    $('availabilitySuccess').style.display='none';
    $('availabilityWarning').style.display='block';
    $('availabilityWarning').textContent=data.message || 'Employee available nahi hai.';
    $('desiredShift').innerHTML='<option value="">Employee not available</option>';
    $('submitSwapBtn').disabled=true;
    return;
  }

  $('availabilityWarning').style.display='none';
  $('availabilitySuccess').style.display='block';
  $('availabilitySuccess').textContent='Employee available hai. Request bhej sakte ho.';
  $('submitSwapBtn').disabled=false;
  $('desiredShift').innerHTML=`<option value="${esc(state.partnerRoster.id)}">${esc(state.partnerRoster.shift_name||'Partner Shift')} (${fmtTime(state.partnerRoster.shift_start)} - ${fmtTime(state.partnerRoster.shift_end)})</option>`;
}
async function submitSwap(e){
  e.preventDefault();
  if(!state.myRoster) return toast('Aapka current roster nahi mila.',true);
  if(!state.partner || !state.partnerRoster) return toast('Swap partner select karo.',true);
  if(!state.partnerAvailable) return toast('Employee available nahi hai.',true);
  const reason=$('swapReason').value.trim();
  if(!reason) return toast('Reason likho.',true);

  const payload={
    p_org_id:state.org.id,
    p_requester_employee_id:state.emp.id,
    p_partner_employee_id:state.partner.id,
    p_swap_date:$('swapDate').value,
    p_requester_roster_id:state.myRoster.id,
    p_partner_roster_id:state.partnerRoster.id,
    p_reason:reason
  };
  const res=await sbRpc('app_create_shift_swap_request',payload);
  toast(`Request ${state.partner.full_name} ko bhej di gayi.`);
  $('swapReason').value='';
  await loadHistory();
}
async function loadHistory(){
  const rows=await sbRpc('app_get_my_shift_swap_history',{p_org_id:state.org.id,p_employee_id:state.emp.id,p_limit:10});
  state.history=rows||[];
  renderHistory();
}
function renderHistory(){
  const box=$('swapHistoryList');
  if(!state.history.length){box.innerHTML='<div style="padding:12px;background:#fff;border-radius:1rem">No shift swap requests found.</div>';return;}
  box.innerHTML=state.history.map(r=>{
    const status=String(r.status||'pending');
    const cls=status.includes('approved')?'approved':status.includes('reject')?'rejected':'pending';
    return `<div class="history-item">
      <div><strong>📅 ${fmtDate(r.swap_date)}</strong> | <span class="badge ${cls}">${esc(status)}</span></div>
      <div>From: ${esc(r.requester_name)} (${esc(r.requester_emp_code)}) → Partner: ${esc(r.partner_name)} (${esc(r.partner_emp_code)})</div>
      <div>Requester Shift: ${esc(r.requester_shift_name||'-')} | Partner Shift: ${esc(r.partner_shift_name||'-')}</div>
      <div>Reason: ${esc((r.reason||'').slice(0,90))}</div>
    </div>`;
  }).join('');
}

$('backArrowShift').onclick=()=>history.back();
$('swapDate').onchange=()=>loadMyRoster().catch(e=>toast(e.message,true));
$('partnerSearch').oninput=()=>searchEmployees($('partnerSearch').value).catch(e=>toast(e.message,true));
$('submitSwapBtn').onclick=submitSwap;
init().catch(e=>toast(e.message,true));
</script>
</body>
</html>
