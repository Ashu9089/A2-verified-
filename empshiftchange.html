<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Employee Shift Swap | Supabase</title>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body{background:linear-gradient(135deg,#10172b 0%,#1a253f 100%);min-height:100vh;padding:32px 20px;display:flex;justify-content:center;align-items:center}
    .swap-card{max-width:1050px;width:100%;background:#fff;border-radius:2rem;box-shadow:0 25px 45px -12px rgba(0,0,0,.35);overflow:hidden}
    .swap-header{background:#0f172a;padding:1rem 1.8rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}
    .back-btn{background:rgba(255,255,255,.1);padding:8px 20px;border-radius:40px;color:#fff;font-weight:700;cursor:pointer;font-size:.9rem;border:0}
    .emp-badge{background:#1e293b;padding:8px 24px;border-radius:60px;color:#e2e8f0;font-size:.9rem;font-weight:600}.emp-badge strong{color:#facc15}
    .form-content{padding:28px 32px 24px}.field-group{margin-bottom:20px;display:flex;flex-direction:column;gap:8px}.row-two{display:flex;gap:24px;flex-wrap:wrap}.row-two .field-group{flex:1;min-width:230px}
    label{font-weight:800;color:#0f2b3d;font-size:.85rem;letter-spacing:.2px}input,select,textarea{border:1px solid #cbd5e1;border-radius:1.25rem;padding:12px 18px;font-size:.9rem;background:#fff;outline:none;width:100%}
    input:focus,select:focus,textarea:focus{border-color:#3b82f6;box-shadow:0 0 0 3px rgba(59,130,246,.18)}
    .shift-badge{background:#eff6ff;padding:10px 16px;border-radius:28px;font-weight:800;color:#1e3a8a;width:fit-content;line-height:1.5}
    .partner-search-area{background:#f8fafc;border-radius:1.5rem;padding:1.2rem 1.5rem;margin:12px 0 8px;border:1px solid #e2edf7}
    .suggest-box{background:#fff;border-radius:1.25rem;margin-top:8px;max-height:220px;overflow-y:auto;box-shadow:0 5px 14px rgba(0,0,0,.05);border:1px solid #e0e7ef}
    .suggest-item{padding:12px 16px;cursor:pointer;border-bottom:1px solid #edf2f7;transition:.1s}.suggest-item:hover{background:#eef4ff}
    .selected-partner-card{background:#eef2ff;border-left:5px solid #3b82f6;border-radius:1.2rem;padding:12px 18px;margin-top:12px;font-size:.9rem;line-height:1.5}
    .warning-card{background:#fff7ed;border-left:5px solid #f97316;border-radius:1.2rem;padding:12px 18px;margin-top:12px;color:#9a3412;font-weight:800;display:none;white-space:pre-line}
    .success-card{background:#ecfdf5;border-left:5px solid #22c55e;border-radius:1.2rem;padding:12px 18px;margin-top:12px;color:#166534;font-weight:800;display:none}
    .submit-swap{background:#1e3a8a;color:#fff;border:0;border-radius:3rem;padding:14px;font-weight:900;font-size:1rem;width:100%;cursor:pointer;transition:.2s;margin-top:18px}.submit-swap:hover{background:#0f2b6d;transform:scale(.99)}.submit-swap:disabled{opacity:.55;cursor:not-allowed}
    .history-section{background:#f1f5f9;border-radius:1.5rem;margin:0 32px 32px;padding:1.2rem 1.5rem}.history-title{font-weight:900;font-size:1.2rem;color:#0f172a;margin-bottom:16px}
    .swap-history-list{display:flex;flex-direction:column;gap:12px}.history-item{background:#fff;border-radius:1.2rem;padding:14px 18px;border-left:5px solid #f59e0b;box-shadow:0 1px 3px rgba(0,0,0,.05);line-height:1.55}
    .badge{background:#eef2ff;padding:3px 12px;border-radius:40px;font-size:.72rem;font-weight:900}.pending{background:#fef3c7;color:#92400e}.approved{background:#dcfce7;color:#166534}.rejected{background:#fee2e2;color:#991b1b}
    .toast-msg{position:fixed;bottom:20px;left:20px;background:#0f3b2c;color:#fff;padding:12px 24px;border-radius:40px;font-weight:700;z-index:1200;max-width:calc(100vw - 40px);white-space:pre-line}
    .workflow{background:#ecfeff;border:1px solid #a5f3fc;padding:12px 16px;border-radius:14px;margin-top:12px;color:#155e75;font-size:14px;font-weight:700;line-height:1.5}
    .locked{background:#fee2e2;border:1px solid #fecaca;color:#991b1b;border-radius:14px;padding:12px 16px;font-weight:900;margin-bottom:16px;display:none;white-space:pre-line}
    @media(max-width:700px){body{padding:18px 10px}.form-content{padding:20px}.swap-header{flex-direction:column;align-items:flex-start}.history-section{margin:0 20px 20px}}
  </style>
</head>
<body>
<div class="swap-card">
  <div class="swap-header">
    <button class="back-btn" id="backArrowShift">← Back</button>
    <div class="emp-badge" id="currentEmpShiftInfo">Loading employee...</div>
  </div>

  <div class="form-content">
    <div class="locked" id="pageLockMsg"></div>

    <div class="field-group">
      <label>🕒 My Current Shift</label>
      <div class="shift-badge" id="myCurrentShift">Loading current roster...</div>
    </div>

    <div class="row-two">
      <div class="field-group">
        <label>📅 Swap Date</label>
        <input type="date" id="swapDate">
      </div>
      <div class="field-group">
        <label>🔄 Requested Shift I Want</label>
        <select id="desiredShift">
          <option value="">First select date / partner</option>
        </select>
      </div>
    </div>

    <div class="partner-search-area">
      <label>👥 Search Employee For Shift Swap (Name / Employee ID)</label>
      <input type="text" id="partnerSearch" placeholder="Type name or emp id..." autocomplete="off">
      <div id="partnerSuggestions" class="suggest-box"></div>
      <div id="selectedPartnerCard" class="selected-partner-card" style="display:none"></div>
      <div id="availabilityWarning" class="warning-card"></div>
      <div id="availabilitySuccess" class="success-card"></div>
    </div>

    <div class="field-group">
      <label>📝 Reason For Shift Swap</label>
      <textarea rows="3" id="swapReason" placeholder="Reason likho..."></textarea>
    </div>

    <div class="workflow">
      Flow: Aap request bhejoge → selected employee approve karega → admin approve karega → dono employees ka roster auto swap hoga.
    </div>

    <button class="submit-swap" id="submitSwapBtn">↻ Submit Shift Swap Request</button>
  </div>

  <div class="history-section">
    <div class="history-title">📋 Recent Shift Swap Requests</div>
    <div id="swapHistoryList" class="swap-history-list"></div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

const $=id=>document.getElementById(id);
let state={
  org:null,
  emp:null,
  login:{},
  myRoster:null,
  attendance:null,
  partner:null,
  partnerRoster:null,
  partnerAvailable:false,
  history:[],
  dateLocked:false
};

function uuidLike(v){return /^[0-9a-f]{8}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{4}-[0-9a-f]{12}$/i.test(String(v||''));}
function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(msg,err=false){let o=document.querySelector('.toast-msg');if(o)o.remove();const d=document.createElement('div');d.className='toast-msg';d.style.background=err?'#9f1239':'#0f3b2c';d.textContent=msg;document.body.appendChild(d);setTimeout(()=>d.remove(),4200)}
function fmtTime(v){return v?String(v).slice(0,5):'--'}
function fmtDate(v){if(!v)return'--';return new Date(v+'T00:00:00').toLocaleDateString('en-IN',{day:'numeric',month:'short',year:'numeric'})}
function localISO(d){return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`}
function todayISO(){return localISO(new Date())}
function tomorrowISO(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+1);return localISO(d)}
function max7ISO(){const d=new Date();d.setHours(0,0,0,0);d.setDate(d.getDate()+7);return localISO(d)}
function getReturnPage(){return new URLSearchParams(location.search).get('return_page') || 'emproster.html'}

function setDisabled(disabled,msg=''){
  ['partnerSearch','swapReason','submitSwapBtn','desiredShift'].forEach(id=>{if($(id)) $(id).disabled=!!disabled});
  const box=$('pageLockMsg');
  if(msg){box.style.display='block';box.textContent=msg;}else{box.style.display='none';box.textContent='';}
}

function safeJson(key){try{return JSON.parse(localStorage.getItem(key)||'{}')||{}}catch(e){return {}}}

function getLogin(){
  const qs=new URLSearchParams(location.search);
  const cur={
    ...safeJson('inlist_employee_login_v2'),
    ...safeJson('currentEmployee'),
    ...safeJson('currentSession')
  };

  const login={
    org_id:(qs.get('org_id') || cur.org_id || cur.orgId || localStorage.getItem('org_id') || localStorage.getItem('orgId') || '').trim(),
    org_code:(qs.get('org_code') || qs.get('org') || cur.org_code || cur.orgCode || localStorage.getItem('org_code') || localStorage.getItem('orgCode') || localStorage.getItem('current_org_code') || '').toUpperCase().trim(),
    emp_id:(qs.get('emp_id') || qs.get('employee_id') || cur.emp_id || cur.employee_id || cur.empId || localStorage.getItem('emp_id') || localStorage.getItem('employee_id') || localStorage.getItem('empId') || '').trim(),
    emp_code:(qs.get('emp_code') || qs.get('emp') || cur.emp_code || cur.empCode || localStorage.getItem('emp_code') || localStorage.getItem('empCode') || localStorage.getItem('current_emp_code') || '').toUpperCase().trim(),
    date:(qs.get('date') || '').trim()
  };

  if(login.org_id) localStorage.setItem('org_id',login.org_id);
  if(login.org_code) localStorage.setItem('org_code',login.org_code);
  if(login.emp_id) localStorage.setItem('emp_id',login.emp_id);
  if(login.emp_code) localStorage.setItem('emp_code',login.emp_code);
  return login;
}

function saveLogin(){
  localStorage.setItem('currentEmployee',JSON.stringify({
    org_id:state.org?.id || state.login.org_id,
    org_code:state.org?.org_code || state.login.org_code,
    emp_id:state.emp?.id || state.login.emp_id,
    employee_id:state.emp?.id || state.login.emp_id,
    emp_code:state.emp?.emp_code || state.login.emp_code,
    full_name:state.emp?.full_name || '',
    email:state.emp?.email || '',
    mobile:state.emp?.mobile || ''
  }));
}

function restHeaders(extra={}){
  const h={
    apikey:SUPABASE_ANON_KEY,
    Authorization:'Bearer '+SUPABASE_ANON_KEY,
    'Content-Type':'application/json',
    Prefer:'return=representation',
    ...extra
  };
  if(state.login?.org_id) h['x-org-id']=state.login.org_id;
  if(state.login?.org_code) h['x-org-code']=state.login.org_code;
  return h;
}

async function sbFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:restHeaders(opts.headers||{})});
  const t=await r.text();
  let d=null;
  try{d=t?JSON.parse(t):null}catch{d=t}
  if(!r.ok){
    console.error('SUPABASE REST ERROR:',path,d);
    throw new Error(d?.message||d?.details||t||r.statusText);
  }
  return d;
}
function sbRpc(fn,args){return sbFetch('/rest/v1/rpc/'+fn,{method:'POST',body:JSON.stringify(args||{})});}

async function maybeRpc(fn,args){
  try{return await sbRpc(fn,args)}catch(e){console.warn(fn+' failed:',e.message);return null}
}

function validateDate(dateStr){
  const min=tomorrowISO();
  const max=max7ISO();
  if(!dateStr) return {ok:false,msg:'Date select karo.'};
  if(dateStr<min) return {ok:false,msg:`Aaj/past date par shift swap allowed nahi hai. Minimum date: ${min}`};
  if(dateStr>max) return {ok:false,msg:`Shift swap sirf next 7 days tak allowed hai. Maximum date: ${max}`};
  return {ok:true,msg:''};
}

function setupDateInput(){
  const input=$('swapDate');
  const min=tomorrowISO();
  const max=max7ISO();
  input.min=min;
  input.max=max;

  let selected=state.login.date || min;
  if(selected<min) selected=min;
  if(selected>max) selected=max;
  input.value=selected;
}

async function resolveOrgEmp(){
  const login=state.login;

  if(!uuidLike(login.org_id) && !login.org_code){
    throw new Error('ORG_NOT_FOUND: URL/localStorage me org_id ya org_code nahi mila.');
  }
  if(!uuidLike(login.emp_id) && !login.emp_code){
    throw new Error('EMPLOYEE_NOT_FOUND: URL/localStorage me emp_id ya emp_code nahi mila.');
  }

  // Important fix: organization table lookup RLS ki wajah se fail ho sakta hai.
  // Agar URL me org_id hai to usi ko trusted app context maan kar continue karenge.
  state.org={id:login.org_id || null, org_code:login.org_code || ''};

  // Employee lookup pehle direct table se try hoga, fail/no row hone par URL data se minimal employee object banega.
  let emp=null;
  try{
    let rows=[];
    if(uuidLike(login.emp_id)){
      rows=await sbFetch(`/rest/v1/employees?id=eq.${encodeURIComponent(login.emp_id)}&select=id,org_id,emp_code,full_name,email,mobile,department,designation,active`);
    }
    if(!rows?.length && login.org_id && login.emp_code){
      rows=await sbFetch(`/rest/v1/employees?org_id=eq.${encodeURIComponent(login.org_id)}&emp_code=eq.${encodeURIComponent(login.emp_code)}&select=id,org_id,emp_code,full_name,email,mobile,department,designation,active`);
    }
    emp=rows?.[0]||null;
  }catch(e){
    console.warn('Employee direct lookup failed, using URL fallback:',e.message);
  }

  if(!emp){
    emp={
      id:login.emp_id,
      org_id:login.org_id,
      emp_code:login.emp_code,
      full_name:login.emp_code || 'Employee',
      department:'',
      designation:'',
      active:true
    };
  }

  if(emp.active===false) throw new Error('EMPLOYEE_INACTIVE');

  state.emp=emp;
  if(emp.id) state.login.emp_id=emp.id;
  if(emp.emp_code) state.login.emp_code=emp.emp_code;
  if(emp.org_id && !state.login.org_id) state.login.org_id=emp.org_id;
  if(!state.org.id && state.login.org_id) state.org.id=state.login.org_id;

  saveLogin();
}

async function init(){
  state.login=getLogin();
  setupDateInput();
  await resolveOrgEmp();

  $('currentEmpShiftInfo').innerHTML=`<strong>${esc(state.emp.full_name||'Employee')}</strong> | ID: ${esc(state.emp.emp_code||state.login.emp_code||'-')} | Dept: ${esc(state.emp.department||'-')}`;

  await loadMyRoster();
  await loadHistory();
}

async function checkPunchIn(date){
  state.attendance=null;
  try{
    const rows=await sbFetch(`/rest/v1/attendance?org_id=eq.${encodeURIComponent(state.org.id)}&employee_id=eq.${encodeURIComponent(state.emp.id)}&attendance_date=eq.${encodeURIComponent(date)}&select=id,punch_in,punch_out,status,attendance_date&limit=1`);
    state.attendance=rows?.[0]||null;
    return !!(state.attendance && state.attendance.punch_in);
  }catch(e){
    console.warn('Attendance check failed:',e.message);
    // Fail-safe: agar attendance readable nahi hai to RPC se check try karo.
    const out=await maybeRpc('app_shift_swap_attendance_status',{
      p_org_id:state.org.id,
      p_employee_id:state.emp.id,
      p_attendance_date:date
    });
    if(out){
      const row=Array.isArray(out)?out[0]:out;
      state.attendance=row||null;
      return !!(row?.punch_in || row?.has_punch_in || row?.punched_in);
    }
    return false;
  }
}

async function loadMyRoster(){
  const date=$('swapDate').value;
  const valid=validateDate(date);

  state.myRoster=null;
  state.partner=null;
  state.partnerRoster=null;
  state.partnerAvailable=false;
  $('selectedPartnerCard').style.display='none';
  $('availabilityWarning').style.display='none';
  $('availabilitySuccess').style.display='none';
  $('partnerSearch').value='';
  $('partnerSuggestions').innerHTML='';
  $('desiredShift').innerHTML='<option value="">Search partner first</option>';

  if(!valid.ok){
    $('myCurrentShift').innerHTML=`${fmtDate(date)}: ${esc(valid.msg)}`;
    setDisabled(true,valid.msg);
    return;
  }

  setDisabled(false,'');

  const punched=await checkPunchIn(date);
  if(punched){
    $('myCurrentShift').innerHTML=`${fmtDate(date)}: Punch In ho chuka hai. Shift swap allowed nahi hai.`;
    setDisabled(true,'Punch In ho chuka hai. Is date par shift change/swap allowed nahi hai.');
    return;
  }

  let rows=[];
  try{
    rows=await sbFetch(`/rest/v1/rosters?org_id=eq.${encodeURIComponent(state.org.id)}&employee_id=eq.${encodeURIComponent(state.emp.id)}&roster_date=eq.${encodeURIComponent(date)}&active=eq.true&select=*`);
  }catch(e){
    console.warn('Roster direct lookup failed:',e.message);
    const rpc=await maybeRpc('app_get_employee_roster_for_date',{
      p_org_id:state.org.id,
      p_employee_id:state.emp.id,
      p_roster_date:date
    });
    rows=Array.isArray(rpc)?rpc:(rpc?[rpc]:[]);
  }

  state.myRoster=rows?.[0]||null;

  if(!state.myRoster){
    $('myCurrentShift').innerHTML=`${fmtDate(date)}: No roster found.`;
    $('desiredShift').innerHTML='<option value="">No roster found</option>';
    setDisabled(true,'Is date ka roster nahi mila. Roster ke bina shift swap request nahi bhej sakte.');
    return;
  }

  $('submitSwapBtn').disabled=false;
  $('myCurrentShift').innerHTML=`${esc(state.myRoster.shift_name||'Shift')} (${fmtTime(state.myRoster.shift_start)} - ${fmtTime(state.myRoster.shift_end)}) • ${fmtDate(date)}`;
}

async function searchEmployees(q){
  q=String(q||'').trim();
  if(q.length<1){$('partnerSuggestions').innerHTML='';return;}

  if(!state.myRoster){return toast('Pehle valid roster date select karo.',true)}

  const rows=await sbRpc('app_search_shift_swap_partners',{
    p_org_id:state.org.id,
    p_self_employee_id:state.emp.id,
    p_query:q,
    p_swap_date:$('swapDate').value
  });
  renderSuggestions(rows||[]);
}

function renderSuggestions(rows){
  if(!rows.length){$('partnerSuggestions').innerHTML='<div class="suggest-item">No employee found</div>';return;}
  $('partnerSuggestions').innerHTML=rows.map(emp=>`
    <div class="suggest-item" data-id="${esc(emp.employee_id || emp.id)}">
      👤 ${esc(emp.full_name)} (${esc(emp.emp_code)}) — ${esc(emp.department||'-')}
      <br><small>Shift: ${esc(emp.shift_name||'No roster')} (${fmtTime(emp.shift_start)}-${fmtTime(emp.shift_end)})</small>
    </div>`).join('');
  document.querySelectorAll('.suggest-item[data-id]').forEach(el=>el.onclick=()=>selectPartner(el.dataset.id));
}

async function selectPartner(employeeId){
  const date=$('swapDate').value;
  const valid=validateDate(date);
  if(!valid.ok) return toast(valid.msg,true);

  const data=await sbRpc('app_get_shift_swap_partner_status',{
    p_org_id:state.org.id,
    p_self_employee_id:state.emp.id,
    p_partner_employee_id:employeeId,
    p_swap_date:date
  });

  state.partner=data.partner;
  state.partnerRoster=data.partner_roster;
  state.partnerAvailable=!!data.available;

  $('partnerSuggestions').innerHTML='';
  $('partnerSearch').value=`${state.partner.full_name} (${state.partner.emp_code})`;
  $('selectedPartnerCard').style.display='block';
  $('selectedPartnerCard').innerHTML=`✅ <strong>Selected:</strong> ${esc(state.partner.full_name)} (${esc(state.partner.emp_code)})<br>
    Dept: ${esc(state.partner.department||'-')}<br>
    Current Shift: ${esc(state.partnerRoster?.shift_name||'No roster')} (${fmtTime(state.partnerRoster?.shift_start)} - ${fmtTime(state.partnerRoster?.shift_end)})`;

  if(!data.available){
    $('availabilitySuccess').style.display='none';
    $('availabilityWarning').style.display='block';
    $('availabilityWarning').textContent=data.message || 'Employee available nahi hai.';
    $('desiredShift').innerHTML='<option value="">Employee not available</option>';
    $('submitSwapBtn').disabled=true;
    return;
  }

  $('availabilityWarning').style.display='none';
  $('availabilitySuccess').style.display='block';
  $('availabilitySuccess').textContent='Employee available hai. Request bhej sakte ho.';
  $('submitSwapBtn').disabled=false;
  $('desiredShift').innerHTML=`<option value="${esc(state.partnerRoster.id)}">${esc(state.partnerRoster.shift_name||'Partner Shift')} (${fmtTime(state.partnerRoster.shift_start)} - ${fmtTime(state.partnerRoster.shift_end)})</option>`;
}

async function submitSwap(e){
  e.preventDefault();
  const date=$('swapDate').value;
  const valid=validateDate(date);
  if(!valid.ok) return toast(valid.msg,true);

  const punched=await checkPunchIn(date);
  if(punched) return toast('Punch In ho chuka hai. Shift swap allowed nahi hai.',true);

  if(!state.myRoster) return toast('Aapka current roster nahi mila.',true);
  if(!state.partner || !state.partnerRoster) return toast('Swap partner select karo.',true);
  if(!state.partnerAvailable) return toast('Employee available nahi hai.',true);

  const reason=$('swapReason').value.trim();
  if(!reason) return toast('Reason likho.',true);

  $('submitSwapBtn').disabled=true;
  try{
    const payload={
      p_org_id:state.org.id,
      p_requester_employee_id:state.emp.id,
      p_partner_employee_id:state.partner.id,
      p_swap_date:date,
      p_requester_roster_id:state.myRoster.id,
      p_partner_roster_id:state.partnerRoster.id,
      p_reason:reason
    };
    await sbRpc('app_create_shift_swap_request',payload);
    toast(`Request ${state.partner.full_name} ko bhej di gayi.`);
    $('swapReason').value='';
    await loadHistory();
    await loadMyRoster();
  }catch(err){
    console.error(err);
    toast(err.message || 'Request failed',true);
    $('submitSwapBtn').disabled=false;
  }
}

async function loadHistory(){
  try{
    const rows=await sbRpc('app_get_my_shift_swap_history',{p_org_id:state.org.id,p_employee_id:state.emp.id,p_limit:10});
    state.history=rows||[];
  }catch(e){
    console.warn('History failed:',e.message);
    state.history=[];
  }
  renderHistory();
}

function renderHistory(){
  const box=$('swapHistoryList');
  if(!state.history.length){box.innerHTML='<div style="padding:12px;background:#fff;border-radius:1rem">No shift swap requests found.</div>';return;}
  box.innerHTML=state.history.map(r=>{
    const status=String(r.status||'pending');
    const cls=status.includes('approved')?'approved':status.includes('reject')?'rejected':'pending';
    return `<div class="history-item">
      <div><strong>📅 ${fmtDate(r.swap_date)}</strong> | <span class="badge ${cls}">${esc(status)}</span></div>
      <div>From: ${esc(r.requester_name)} (${esc(r.requester_emp_code)}) → Partner: ${esc(r.partner_name)} (${esc(r.partner_emp_code)})</div>
      <div>Requester Shift: ${esc(r.requester_shift_name||'-')} | Partner Shift: ${esc(r.partner_shift_name||'-')}</div>
      <div>Reason: ${esc((r.reason||'').slice(0,90))}</div>
    </div>`;
  }).join('');
}

$('backArrowShift').onclick=()=>{
  const rp=getReturnPage();
  if(rp && rp!=='history.back') location.href=rp;
  else history.back();
};
$('swapDate').onchange=()=>loadMyRoster().catch(e=>toast(e.message,true));
$('partnerSearch').oninput=()=>searchEmployees($('partnerSearch').value).catch(e=>toast(e.message,true));
$('submitSwapBtn').onclick=submitSwap;

init().catch(e=>{
  console.error(e);
  $('currentEmpShiftInfo').textContent='Load failed';
  $('myCurrentShift').textContent=e.message || 'Load failed';
  setDisabled(true,e.message || 'Load failed');
  toast(e.message,true);
});
</script>
</body>
</html>
