<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>QR Attendance Admin | Supabase</title>
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body{background:radial-gradient(ellipse at 20% 30%,#0f2f2c,#051c1a);min-height:100vh;padding:1.5rem}
    .admin-container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,.96);border-radius:2rem;box-shadow:0 30px 45px -12px rgba(0,0,0,.25);overflow:hidden}
    .top-bar{background:#0a2c2f;padding:.8rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;color:white}
    .org-details{background:#174d47;padding:4px 16px;border-radius:40px;font-size:.8rem}
    .header{background:linear-gradient(135deg,#1a5c54,#0e3d38);padding:1rem 2rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;color:white}
    .header h1{font-size:1.5rem}.back-btn{background:rgba(255,255,255,.15);border:0;padding:7px 18px;border-radius:40px;color:white;cursor:pointer}
    .content{padding:2rem}.form-card{background:#f4faf8;border-radius:1.5rem;padding:1.5rem;margin-bottom:2rem;display:flex;flex-wrap:wrap;gap:1.5rem;align-items:flex-end}
    .form-group{display:flex;flex-direction:column;gap:6px;flex:1;min-width:150px}.form-group label{font-size:.7rem;font-weight:800;color:#1e6b63;text-transform:uppercase}
    input,select{padding:9px 14px;border-radius:2rem;border:1.5px solid #dcebe7;background:white;outline:none}.btn-primary{background:#1f6e68;color:white;border:0;padding:10px 24px;border-radius:2rem;font-weight:800;cursor:pointer}.btn-primary:disabled{opacity:.55;cursor:not-allowed}
    .qr-section{display:flex;flex-wrap:wrap;gap:2rem;margin-bottom:2rem}.qr-preview{background:#fffef7;border:1px solid #e0efeb;border-radius:1.5rem;padding:1rem;text-align:center;flex:1}
    #qrcode{display:flex;justify-content:center;margin-bottom:1rem}.download-btn{background:#e2e8f0;border:0;padding:7px 16px;border-radius:2rem;cursor:pointer;font-weight:700}.download-btn:disabled{opacity:.55;cursor:not-allowed}
    .section-title{font-size:1.2rem;font-weight:800;color:#1e5a4c;margin-bottom:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:12px}.table-wrapper{overflow-x:auto;max-height:60vh}
    table{width:100%;border-collapse:collapse;background:white;border-radius:1rem;overflow:hidden}th,td{padding:10px 8px;text-align:left;border-bottom:1px solid #eef4f2;white-space:nowrap}th{background:#eef6f4;color:#1e5a4c;position:sticky;top:0;z-index:2}
    .badge{display:inline-block;padding:3px 10px;border-radius:2rem;font-size:.7rem;font-weight:800}.badge-active{background:#e0f2e9;color:#1e6f3f}.badge-expired{background:#ffe6e5;color:#b91c1c}
    .history-tools{display:flex;flex-wrap:wrap;gap:10px;align-items:center;margin:0 0 12px}.history-tools input{max-width:170px}.page-bar{display:flex;justify-content:center;align-items:center;gap:8px;flex-wrap:wrap;margin-top:14px}.page-btn{background:#e2e8f0;border:0;border-radius:999px;padding:7px 14px;font-weight:800;cursor:pointer}.page-btn:disabled{opacity:.45;cursor:not-allowed}.muted-note{font-size:.75rem;color:#64748b;font-weight:700}
    .toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:white;padding:10px 18px;border-radius:40px;font-size:.8rem;z-index:1000;max-width:calc(100vw - 40px)}.toast.err{background:#b91c1c}
    .qr-expired-box{padding:35px 15px;background:#fff1f2;border:1px dashed #ef4444;border-radius:18px;color:#991b1b;font-weight:900;text-align:center;line-height:1.5}.qr-countdown{display:inline-block;margin-top:7px;background:#e0f2e9;color:#14532d;padding:5px 12px;border-radius:999px;font-weight:900}.qr-countdown.danger{background:#fee2e2;color:#991b1b}
    .qr-fallback{width:220px;height:220px;margin:auto;border:12px solid #1e5a4c;border-radius:18px;display:flex;align-items:center;justify-content:center;padding:16px;word-break:break-all;font-size:11px;font-weight:800;color:#1e5a4c;background:white}
    @media(max-width:700px){body{padding:.7rem}.content{padding:1rem}.top-bar,.header{padding:.8rem 1rem}.form-card{gap:.8rem}.form-group{min-width:100%}th,td{font-size:.78rem}}
  </style>
</head>
<body>
<div class="admin-container">
  <div class="top-bar">
    <div>User: <strong id="adminName">--</strong> | ID: <strong id="adminId">--</strong></div>
    <div class="org-details"><span id="orgName">--</span> | <span id="orgCode">--</span></div>
  </div>
  <div class="header">
    <h1>QR Attendance Generator</h1>
    <button class="back-btn" id="backBtn" type="button">Back</button>
  </div>
  <div class="content">
    <div class="form-card">
      <div class="form-group"><label>Select Date</label><input type="date" id="qrDate"></div>
      <div class="form-group"><label>QR Mode</label><select id="qrMode"><option value="punch_in">Punch In</option><option value="punch_out">Punch Out</option></select></div>
      <div class="form-group"><label>Validity Minutes</label><input type="number" id="validityMins" min="1" max="10080" value="15"></div>
      <div class="form-group"><label>Branch Optional</label><select id="branchSelect"><option value="">Main / Any Branch</option></select></div>
      <button id="generateQRBtn" class="btn-primary" type="button">Generate QR</button>
    </div>
    <div class="qr-section">
      <div class="qr-preview">
        <h3>Generated QR Code</h3>
        <div id="qrcode"></div>
        <button id="downloadQrBtn" class="download-btn" type="button" disabled>Download PNG</button>
        <p id="qrInfo" style="font-size:.75rem;margin-top:8px;line-height:1.5"></p>
      </div>
    </div>
    <div class="history-section">
      <div class="section-title"><span>QR Generation History</span><button id="downloadReportBtn" class="download-btn" type="button">Download Excel</button></div>
      <div class="history-tools">
        <input type="date" id="exportFromDate" title="Export from date">
        <input type="date" id="exportToDate" title="Export to date">
        <select id="historyPageSize"><option value="20">20 rows</option><option value="50" selected>50 rows</option><option value="100">100 rows</option></select>
        <span class="muted-note" id="historyMeta">Loading...</span>
      </div>
      <div class="table-wrapper"><table><thead><tr><th>#</th><th>Date</th><th>Mode</th><th>Generated By</th><th>Generated By ID</th><th>Generated At</th><th>Validity</th><th>Expires</th><th>Status</th><th>Token</th></tr></thead><tbody id="historyBody"></tbody></table></div>
      <div class="page-bar" id="historyPagination"></div>
    </div>
  </div>
</div>
<script>
'use strict';

var SUPABASE_URL = 'https://tovpcbzztvkiwamimrxt.supabase.co';
var REAL_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

function el(id){ return document.getElementById(id); }

var state = {
  org:null,
  opener:null,
  history:[],
  currentCanvas:null,
  currentToken:null,
  currentExpiresAt:null,
  qrTimer:null,
  historyPage:1,
  historyTotalCount:0,
  historyPageSize:50,
  busy:false
};

function esc(v){
  return String(v == null ? '' : v).replace(/[&<>"']/g, function(s){
    var map = {'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'};
    return map[s] || s;
  });
}

function toast(msg, err){
  var old = document.querySelector('.toast');
  if(old) old.remove();
  var d = document.createElement('div');
  d.className = 'toast' + (err ? ' err' : '');
  d.textContent = msg;
  document.body.appendChild(d);
  setTimeout(function(){ d.remove(); }, 3200);
}

function todayISO(){
  var n = new Date();
  return n.getFullYear() + '-' + String(n.getMonth()+1).padStart(2,'0') + '-' + String(n.getDate()).padStart(2,'0');
}

function urlParams(){ return new URLSearchParams(location.search); }
function getParam(name){ return urlParams().get(name) || ''; }

function safeJson(raw){
  try{ return raw ? JSON.parse(raw) : {}; }catch(e){ return {}; }
}

function norm(v){ return String(v || '').trim().toLowerCase(); }
function isDev(role){ var r = norm(role); return r === 'developer' || r === 'dev'; }
function isCompany(role, mode){
  var r = norm(role);
  var m = norm(mode);
  return m === 'company' || ['owner','admin','company','hr','manager','finance','operation','operations'].indexOf(r) >= 0;
}

function safeNavigate(page){
  if(!page) page = 'emp.html';
  page = String(page).replace(/^file:\/\/\/.*[\/\\]/i, '');
  page = page.split('?')[0] || page;
  location.href = page;
}


async function sbRpc(fn, payload){
  payload = payload || {};
  var r = await fetch(SUPABASE_URL + '/rest/v1/rpc/' + fn, {
    method: 'POST',
    headers: {
      apikey: REAL_ANON_KEY,
      Authorization: 'Bearer ' + REAL_ANON_KEY,
      'Content-Type': 'application/json'
    },
    body: JSON.stringify(payload)
  });

  var t = await r.text();
  var d = null;
  try{ d = t ? JSON.parse(t) : null; }catch(e){ d = t; }

  if(!r.ok){
    var msg = (d && (d.message || d.details || d.hint || d.code)) || t || r.statusText;
    console.error('RPC HTTP error', fn, payload, d || t);
    throw new Error(msg);
  }

  if(d && d.ok === false){
    console.error('RPC returned ok=false', fn, payload, d);
    throw new Error(d.message || d.sqlstate || 'RPC failed');
  }

  return d;
}

function pickArray(v){
  if(Array.isArray(v)) return v;
  if(v && Array.isArray(v.rows)) return v.rows;
  if(v && Array.isArray(v.data)) return v.data;
  return [];
}

function readSession(){
  var inlist = safeJson(sessionStorage.getItem('inlistSession') || localStorage.getItem('inlistSession'));
  var cs = safeJson(sessionStorage.getItem('currentSession') || localStorage.getItem('currentSession'));
  var ce = safeJson(sessionStorage.getItem('currentEmployee') || localStorage.getItem('currentEmployee'));

  var role = getParam('role') || getParam('opened_by_role') || inlist.role || cs.role || cs.userRole || ce.role || 'employee';
  var mode = getParam('mode') || cs.mode || cs.loginMode || ce.mode || 'employee';
  var userId = getParam('user_id') || getParam('opened_by_id') || inlist.userId || cs.userId || cs.adminId || cs.id || localStorage.getItem('admin_user_id') || '';
  var empId = getParam('emp_id') || cs.empId || cs.employee_id || cs.employeeId || ce.id || ce.employee_id || '';
  var empCode = getParam('emp_code') || cs.empCode || cs.emp_code || ce.emp_code || ce.empCode || localStorage.getItem('emp_code') || '';
  var email = getParam('email') || cs.email || cs.adminEmail || ce.email || '';
  var mobile = getParam('mobile') || cs.mobile || cs.phone || ce.mobile || '';
  var openedByName = getParam('opened_by_name') || getParam('opener_name') || '';
  var openedById = getParam('opened_by_id') || getParam('opener_id') || '';

  var showId = '--';
  var showName = 'User';

  if(isCompany(role, mode)){
    showId = openedById || userId || 'COMPANY';
    showName = openedByName || getParam('admin_name') || getParam('owner_name') || cs.adminName || cs.admin_name || cs.ownerName || cs.owner_name || cs.fullName || cs.full_name || cs.name || 'Company Admin';
  }else if(isDev(role)){
    showId = openedById || userId || empCode || empId || 'DEV';
    showName = openedByName || getParam('developer_name') || getParam('dev_name') || cs.fullName || cs.full_name || cs.name || email || 'Developer';
  }else{
    showId = openedById || empCode || empId || userId || '--';
    showName = openedByName || getParam('name') || ce.full_name || cs.fullName || cs.full_name || cs.name || email || empCode || 'Employee';
  }

  var returnPage = getParam('return_page') || '';
  if(!returnPage){
    if(isDev(role)) returnPage = 'dev.html';
    else if(isCompany(role, mode)) returnPage = 'admin.html';
    else returnPage = sessionStorage.getItem('return_page') || localStorage.getItem('return_page') || 'emp.html';
  }

  return {
    orgId: getParam('org_id') || inlist.orgId || cs.orgId || cs.org_id || ce.org_id || localStorage.getItem('org_id') || '',
    orgCode: getParam('org_code') || getParam('company_code') || inlist.orgCode || cs.orgCode || cs.org_code || ce.org_code || localStorage.getItem('org_code') || localStorage.getItem('orgCode') || '',
    branchId: getParam('branch_id') || inlist.branchId || cs.branchId || ce.branch_id || '',
    userId: userId,
    empId: empId,
    empCode: empCode,
    email: email,
    mobile: mobile,
    role: role,
    mode: mode,
    showId: showId,
    returnPage: returnPage,
    adminName: showName
  };
}


async function resolveContext(){
  var s = readSession();
  state.opener = s;

  var ctx = await sbRpc('qr_admin_screen_context', {
    p_org_id: s.orgId || null,
    p_org_code: s.orgCode || null,
    p_emp_id: s.empId || null,
    p_emp_code: s.empCode || null,
    p_user_id: s.userId || null,
    p_email: s.email || null,
    p_mobile: s.mobile || null
  });

  var org = ctx.org || null;
  if(!org) throw new Error('ORG_NOT_FOUND: valid org_id, org_code ya emp_id bhejo.');

  state.org = org;
  el('orgName').textContent = org.org_name || org.name || '--';
  el('orgCode').textContent = org.org_code || s.orgCode || '--';

  var headerName = s.adminName || 'User';
  var headerId = s.showId || '--';

  if(isCompany(s.role, s.mode)){
    headerId = s.userId || 'COMPANY';
    headerName = org.org_name || 'Company Admin';

    if(ctx.org_user){
      var u = ctx.org_user;
      headerId = u.id || s.userId || 'COMPANY';
      headerName = u.full_name || u.name || u.email || u.phone || org.org_name || 'Company Admin';
    }
  }else if(ctx.employee){
    var e = ctx.employee;
    headerId = s.showId || e.emp_code || e.id || '--';
    headerName = s.adminName || e.full_name || e.name || e.email || e.mobile || 'Employee';
  }

  el('adminName').textContent = headerName;
  el('adminId').textContent = headerId;

  var branches = ctx.branches || [];
  el('branchSelect').innerHTML = '<option value="">Main / Any Branch</option>' + branches.map(function(b){
    return '<option value="' + esc(b.id) + '">' + esc(b.branch_name) + ' (' + esc(b.branch_code) + ')</option>';
  }).join('');
  if(s.branchId) el('branchSelect').value = s.branchId;
}


async function expireOldTokens(){
  if(!state.org) return;
  await sbRpc('qr_attendance_expire_old', {p_org_id: state.org.id});
}

function getPageSize(){
  var sel = el('historyPageSize');
  state.historyPageSize = Number(sel && sel.value ? sel.value : 50);
  return state.historyPageSize;
}


async function loadHistoryPaged(page){
  if(!state.org) return;
  state.historyPage = Math.max(1, Number(page || state.historyPage || 1));
  var limit = getPageSize();
  var offset = (state.historyPage - 1) * limit;

  await expireOldTokens().catch(function(){});

  var res = await sbRpc('qr_attendance_history_page', {
    p_org_id: state.org.id,
    p_limit: limit,
    p_offset: offset
  });

  state.historyTotalCount = Number(res.total_count || 0);
  state.history = res.rows || [];

  renderHistory();
  renderHistoryPagination();
}

function renderHistory(){
  var now = Date.now();
  var body = el('historyBody');
  if(!body) return;

  if(!state.history.length){
    body.innerHTML = '<tr><td colspan="10" style="text-align:center">No QR generated</td></tr>';
    return;
  }

  var start = (state.historyPage - 1) * getPageSize();

  body.innerHTML = state.history.map(function(q,i){
    var expired = new Date(q.expires_at).getTime() < now || q.active === false;
    var generatedName = q.generated_by_name || q.created_by_name || q.created_by || 'Unknown';
    var generatedId = q.generated_by_id || q.created_by_id || '--';

    return '<tr>' +
      '<td>' + (start + i + 1) + '</td>' +
      '<td>' + esc(q.roster_date) + '</td>' +
      '<td>' + esc(q.mode || 'punch_in') + '</td>' +
      '<td>' + esc(generatedName) + '</td>' +
      '<td>' + esc(generatedId) + '</td>' +
      '<td>' + esc(new Date(q.created_at).toLocaleString('en-IN')) + '</td>' +
      '<td>' + esc(q.validity_minutes) + '</td>' +
      '<td>' + esc(new Date(q.expires_at).toLocaleString('en-IN')) + '</td>' +
      '<td><span class="badge ' + (expired ? 'badge-expired' : 'badge-active') + '">' + (expired ? 'EXPIRED' : 'ACTIVE') + '</span></td>' +
      '<td style="font-family:monospace">' + esc(q.token) + '</td>' +
      '</tr>';
  }).join('');
}

function renderHistoryPagination(){
  var limit = getPageSize();
  var totalPages = Math.max(1, Math.ceil((state.historyTotalCount || 0) / limit));
  var bar = el('historyPagination');
  var meta = el('historyMeta');

  if(meta){
    var start = state.historyTotalCount ? ((state.historyPage - 1) * limit + 1) : 0;
    var end = Math.min(state.historyPage * limit, state.historyTotalCount || 0);
    meta.textContent = 'Showing ' + start + '-' + end + ' of ' + (state.historyTotalCount || 0);
  }

  if(!bar) return;

  bar.innerHTML =
    '<button class="page-btn" id="prevHistoryBtn" ' + (state.historyPage <= 1 ? 'disabled' : '') + '>Prev</button>' +
    '<span class="muted-note">Page ' + state.historyPage + ' / ' + totalPages + '</span>' +
    '<button class="page-btn" id="nextHistoryBtn" ' + (state.historyPage >= totalPages ? 'disabled' : '') + '>Next</button>';

  el('prevHistoryBtn').onclick = function(){
    loadHistoryPaged(state.historyPage - 1).catch(function(e){ toast(e.message,true); });
  };
  el('nextHistoryBtn').onclick = function(){
    loadHistoryPaged(state.historyPage + 1).catch(function(e){ toast(e.message,true); });
  };
}

function clearCurrentQr(message){
  if(state.qrTimer){
    clearInterval(state.qrTimer);
    state.qrTimer = null;
  }

  state.currentCanvas = null;
  state.currentToken = null;
  state.currentExpiresAt = null;

  el('downloadQrBtn').disabled = true;
  el('qrcode').innerHTML = '<div class="qr-expired-box">' + esc(message || 'QR expired. New QR generate karein.') + '</div>';
  el('qrInfo').innerHTML = '';
}

function startQrExpiryTimer(expiresAt){
  if(state.qrTimer) clearInterval(state.qrTimer);
  state.currentExpiresAt = expiresAt;

  var tick = async function(){
    var remaining = new Date(expiresAt).getTime() - Date.now();

    if(remaining <= 0){
      clearCurrentQr('Time over. New QR generate karo.');
      await expireOldTokens().catch(function(){});
      await loadHistoryPaged(state.historyPage).catch(function(){});
      return;
    }

    var mins = Math.floor(remaining / 60000);
    var secs = Math.floor((remaining % 60000) / 1000);
    var live = el('liveCountdown');

    if(live){
      live.className = 'qr-countdown' + (remaining <= 60000 ? ' danger' : '');
      live.textContent = 'Expires in ' + mins + ':' + String(secs).padStart(2,'0');
    }
  };

  tick();
  state.qrTimer = setInterval(tick,1000);
}

function displayQrFallback(token){
  var qrDiv = el('qrcode');
  qrDiv.innerHTML = '<div class="qr-fallback">' + esc(token) + '</div>';
  state.currentCanvas = null;
  el('downloadQrBtn').disabled = true;
}

function displayQR(token, expiresAt, mode, date){
  if(new Date(expiresAt).getTime() <= Date.now()){
    clearCurrentQr('Ye QR already expired hai. Naya QR generate karo.');
    return;
  }

  var qrDiv = el('qrcode');
  qrDiv.innerHTML = '';

  // CDN qrcodejs hata diya gaya hai, isliye Tracking Prevention warning nahi aayegi.
  // QR image server se banega; agar image service load na ho to token fallback dikhega.
  var img = new Image();
  img.width = 220;
  img.height = 220;
  img.alt = 'Attendance QR';
  img.style.maxWidth = '220px';
  img.style.borderRadius = '14px';
  img.style.background = '#fff';
  img.style.padding = '8px';
  img.crossOrigin = 'anonymous';
  img.onload = function(){
    state.currentCanvas = null;
    el('downloadQrBtn').disabled = false;
  };
  img.onerror = function(){
    displayQrFallback(token);
    toast('QR image service load nahi hui. Token fallback show ho raha hai.', true);
  };
  img.src = 'https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=' + encodeURIComponent(token);
  qrDiv.appendChild(img);

  state.currentToken = token;

  el('qrInfo').innerHTML =
    'Token: <b>' + esc(token) + '</b><br>' +
    'Mode: ' + esc(mode) + ' | Date: ' + esc(date) + '<br>' +
    'Expires: ' + esc(new Date(expiresAt).toLocaleString('en-IN')) + '<br>' +
    '<span id="liveCountdown" class="qr-countdown"></span>';

  startQrExpiryTimer(expiresAt);
}


async function getLatestActiveQr(){
  if(!state.org) return null;
  var res = await sbRpc('qr_attendance_latest_active', {p_org_id: state.org.id});
  return res.row || null;
}

async function restoreActiveQrOnOpen(){
  var q = await getLatestActiveQr();
  if(q){
    displayQR(q.token, q.expires_at, q.mode || 'punch_in', q.roster_date);
  }else{
    clearCurrentQr('Active QR nahi mila. New QR generate karein.');
  }
}

function buildPayloadWithGeneratedBy(basePayload){
  var opener = state.opener || readSession();
  basePayload.generated_by_id = opener.showId || opener.userId || opener.empCode || opener.empId || null;
  basePayload.generated_by_name = opener.adminName || 'User';
  basePayload.generated_by_role = opener.role || null;
  basePayload.generated_by_mode = opener.mode || null;
  return basePayload;
}


async function insertTokenWithFallback(payload){
  return await sbRpc('qr_attendance_create_token', {
    p_org_id: payload.org_id,
    p_branch_id: payload.branch_id,
    p_org_code: payload.org_code,
    p_token: payload.token,
    p_roster_date: payload.roster_date,
    p_mode: payload.mode,
    p_validity_minutes: payload.validity_minutes,
    p_expires_at: payload.expires_at,
    p_generated_by_id: payload.generated_by_id,
    p_generated_by_name: payload.generated_by_name,
    p_generated_by_role: payload.generated_by_role,
    p_generated_by_mode: payload.generated_by_mode
  });
}

async function generateQR(){
  if(state.busy) return;
  state.busy = true;
  el('generateQRBtn').disabled = true;

  try{
    var rosterDate = el('qrDate').value;
    var mode = el('qrMode').value;
    var validity = Number(el('validityMins').value || 0);
    var branchId = el('branchSelect').value || null;

    if(!state.org) throw new Error('Org load nahi hua');
    if(!rosterDate) throw new Error('Date select karo');
    if(!validity || validity < 1) throw new Error('Validity minimum 1 minute honi chahiye');
    if(validity > 10080) throw new Error('Validity max 10080 minutes allowed hai');

    var token = 'QR-' + rosterDate.replaceAll('-','') + '-' + Math.random().toString(36).slice(2,10).toUpperCase() + Date.now().toString(36).toUpperCase();
    var expiresAt = new Date(Date.now() + validity * 60000).toISOString();

    var payload = buildPayloadWithGeneratedBy({
      org_id: state.org.id,
      branch_id: branchId,
      org_code: state.org.org_code,
      token: token,
      roster_date: rosterDate,
      mode: mode,
      validity_minutes: validity,
      expires_at: expiresAt,
      active: true
    });

    await insertTokenWithFallback(payload);

    displayQR(token, expiresAt, mode, rosterDate);
    state.historyPage = 1;
    await loadHistoryPaged(1);
    toast('QR generated and saved in Supabase');
  }catch(e){
    toast(e.message, true);
  }finally{
    state.busy = false;
    el('generateQRBtn').disabled = false;
  }
}

async function downloadQR(){
  var img = el('qrcode').querySelector('img');
  if(!img && !state.currentCanvas) return toast('QR image available nahi hai', true);
  var a = document.createElement('a');
  a.download = 'attendance_qr_' + (el('qrDate').value || todayISO()) + '.png';

  if(state.currentCanvas){
    a.href = state.currentCanvas.toDataURL('image/png');
    a.click();
    return;
  }

  try{
    var res = await fetch(img.src, {mode:'cors'});
    var blob = await res.blob();
    a.href = URL.createObjectURL(blob);
    a.click();
    setTimeout(function(){ URL.revokeObjectURL(a.href); }, 1000);
  }catch(e){
    a.href = img.src;
    a.target = '_blank';
    a.click();
  }
}


async function exportReport(){
  if(!state.org) return toast('Org load nahi hua', true);

  var fromDate = el('exportFromDate').value || '';
  var toDate = el('exportToDate').value || '';
  var maxRows = 5000;

  toast('Excel data preparing...');

  var res = await sbRpc('qr_attendance_export_rows', {
    p_org_id: state.org.id,
    p_from_date: fromDate || null,
    p_to_date: toDate || null,
    p_limit: maxRows + 1
  });

  var rows = res.rows || [];

  if(rows.length > maxRows){
    toast('Data 5000+ rows hai. Date range chhota karo.', true);
    return;
  }

  if(!rows.length){
    toast('Export ke liye data nahi mila', true);
    return;
  }

  var data = [['#','Date','Mode','Generated By','Generated By ID','Generated At','Validity','Expires At','Status','Token']];
  var now = Date.now();

  rows.forEach(function(q,i){
    data.push([
      i + 1,
      q.roster_date,
      q.mode,
      q.generated_by_name || q.created_by_name || q.created_by || 'Unknown',
      q.generated_by_id || q.created_by_id || '--',
      q.created_at,
      q.validity_minutes,
      q.expires_at,
      (new Date(q.expires_at).getTime() < now || q.active === false ? 'EXPIRED' : 'ACTIVE'),
      q.token
    ]);
  });

  if(typeof XLSX === 'undefined'){
    toast('XLSX library load nahi hui. Excel export unavailable.', true);
    return;
  }

  var ws = XLSX.utils.aoa_to_sheet(data);
  var wb = XLSX.utils.book_new();
  XLSX.utils.book_append_sheet(wb, ws, 'QR_History');

  var suffix = fromDate || toDate ? ((fromDate || 'start') + '_to_' + (toDate || 'today')) : todayISO();
  XLSX.writeFile(wb, 'QR_Attendance_History_' + suffix + '.xlsx');
  toast('Excel exported');
}

function goBack(){
  var s = state.opener || readSession();

  if(isDev(s.role)){
    safeNavigate(getParam('return_page') || 'dev.html');
    return;
  }

  if(isCompany(s.role, s.mode)){
    safeNavigate(getParam('return_page') || 'admin.html');
    return;
  }

  safeNavigate(getParam('return_page') || s.returnPage || 'emp.html');
}

function bindEvents(){
  el('generateQRBtn').onclick = generateQR;
  el('downloadQrBtn').onclick = downloadQR;
  el('downloadReportBtn').onclick = function(){
    exportReport().catch(function(e){ toast(e.message,true); });
  };
  el('backBtn').onclick = goBack;
  el('historyPageSize').onchange = function(){
    state.historyPage = 1;
    loadHistoryPaged(1).catch(function(e){ toast(e.message,true); });
  };
}

async function init(){
  bindEvents();
  el('qrDate').value = todayISO();
  clearCurrentQr('Abhi QR generate nahi hua. Generate QR par click karo.');

  try{
    await resolveContext();
    await loadHistoryPaged(1);
    await restoreActiveQrOnOpen();
  }catch(e){
    console.error(e);
    toast(e.message,true);
    el('historyBody').innerHTML = '<tr><td colspan="10" style="text-align:center;color:#b91c1c">' + esc(e.message) + '</td></tr>';
    if(el('historyMeta')) el('historyMeta').textContent = 'Error';
  }
}

window.addEventListener('pageshow', function(){
  if(state.org){
    restoreActiveQrOnOpen().catch(function(e){ toast(e.message,true); });
    loadHistoryPaged(state.historyPage).catch(function(){});
  }
});

if(document.readyState === 'loading'){
  document.addEventListener('DOMContentLoaded', init, {once:true});
}else{
  init();
}
</script>
