<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Device Verification | Admin / HR Panel</title>

  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <style>
    *{margin:0;padding:0;box-sizing:border-box;font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif}
    body{background:radial-gradient(ellipse at 20% 30%,#0f2f2c,#051c1a);min-height:100vh;padding:1rem}
    .container{max-width:1400px;margin:0 auto;background:rgba(255,255,255,.96);border-radius:2rem;box-shadow:0 30px 50px rgba(0,0,0,.25);overflow:hidden}
    .top-bar{background:#0a2c2f;padding:.7rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;color:#fff}
    .org-info{background:#174d47;padding:4px 14px;border-radius:40px;font-size:.8rem}
    .header{background:linear-gradient(135deg,#1a5c54,#0e3d38);padding:.9rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem;color:#fff}
    .header h1{font-size:1.3rem;display:flex;align-items:center;gap:8px}
    .back-btn{background:rgba(255,255,255,.15);color:#fff;border:none;padding:7px 16px;border-radius:40px;cursor:pointer}
    .filters{padding:1rem 1.5rem;background:#f4faf8;border-bottom:1px solid #e0efeb;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end}
    .filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:180px}
    .filter-group label{font-size:.7rem;font-weight:800;color:#1e6b63;text-transform:uppercase}
    select,input{padding:9px 14px;border-radius:2rem;border:1.5px solid #dcebe7;background:#fff;font-size:.82rem;outline:none}
    .btn-sm{background:#1f6e68;color:#fff;border:none;padding:9px 18px;border-radius:2rem;font-weight:700;cursor:pointer}
    .stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(170px,1fr));gap:12px;padding:1rem 1.5rem;background:#fff}
    .stat{border:1px solid #e0efeb;border-radius:1rem;padding:1rem;background:#fbfffd}
    .stat b{display:block;font-size:1.35rem;color:#124b45}
    .stat span{font-size:.75rem;color:#66837d}
    .employee-section{padding:1.5rem}
    .employee-card{background:#fff;border-radius:1.2rem;border:1px solid #e0efeb;margin-bottom:1.2rem;overflow:hidden}
    .emp-header{background:#eef6f4;padding:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.8rem}
    .emp-name{font-size:1.1rem;font-weight:800;color:#1e5a4c}
    .emp-id{font-size:.8rem;color:#6b8c9c;margin-top:3px}
    .device-section{padding:1rem}
    .section-subtitle{font-size:.9rem;font-weight:800;color:#1e5a4c;margin:.5rem 0 1rem;padding-left:.5rem;border-left:3px solid #1f6e68}
    .device-grid{display:flex;flex-direction:column;gap:1rem}
    .device-card{background:#fefcf7;border-radius:1rem;border:1px solid #e0efeb;padding:1rem}
    .device-card.current{border-left:4px solid #1f6e68;background:#f8fff8}
    .device-header{display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;margin-bottom:.5rem;gap:.5rem}
    .device-name{font-weight:800;color:#1e5a4c}
    .device-status{display:inline-block;padding:3px 10px;border-radius:2rem;font-size:.7rem;font-weight:800}
    .status-verified{background:#e0f2e9;color:#1e6f3f}
    .status-pending{background:#fff3e0;color:#c47a2e}
    .status-none{background:#edf2f7;color:#52616b}
    .device-details{display:flex;flex-wrap:wrap;gap:1rem;margin:.5rem 0;font-size:.76rem;color:#5b8a82}
    .device-actions{display:flex;gap:.5rem;margin-top:.7rem;flex-wrap:wrap}
    .action-btn{border:none;padding:6px 13px;border-radius:2rem;cursor:pointer;font-size:.72rem;font-weight:800}
    .btn-verify{background:#e0f2e9;color:#1e6f3f}
    .btn-unblock{background:#eef2f5;color:#2c655e}
    .empty,.loader{text-align:center;padding:2rem;color:#5b6b73}
    .toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:#fff;padding:9px 16px;border-radius:40px;font-size:.78rem;z-index:3000}
    .pagination{display:flex;justify-content:space-between;align-items:center;gap:.8rem;padding:1rem;background:#f8fffd;border:1px solid #e0efeb;border-radius:1rem;margin-bottom:1rem;flex-wrap:wrap}
    .pagination .page-info{font-size:.78rem;font-weight:800;color:#2c655e}
    .pagination .page-actions{display:flex;gap:.5rem;flex-wrap:wrap}
    .pagination button{border:none;border-radius:2rem;padding:7px 14px;font-size:.75rem;font-weight:800;cursor:pointer;background:#1f6e68;color:#fff}
    .pagination button:disabled{opacity:.45;cursor:not-allowed}
    .danger{background:#b91c1c!important}
    @media(max-width:650px){body{padding:.4rem}.container{border-radius:1.2rem}.employee-section{padding:.8rem}}
  </style>
</head>

<body>
<div class="container">

  <div class="top-bar">
    <div>
      <i class="fas fa-user-shield"></i>
      Login: <strong id="adminName">--</strong>
      |
      <span id="adminRole">--</span>
    </div>

    <div class="org-info">
      <i class="fas fa-building"></i>
      <span id="orgName">--</span>
      |
      <span id="orgCode">--</span>
    </div>
  </div>

  <div class="header">
    <h1>
      <i class="fas fa-mobile-alt"></i>
      Device Verification Manager
    </h1>

    <button class="back-btn" id="backBtn">
      <i class="fas fa-arrow-left"></i>
      Back
    </button>
  </div>

  <div class="filters">
    <div class="filter-group">
      <label>Search Employee</label>
      <input type="text" id="searchInput" placeholder="Name / EMP Code / Email / Mobile" />
    </div>

    <div class="filter-group">
      <label>Verification Status</label>
      <select id="statusFilter">
        <option value="all">All</option>
        <option value="verified">Verified</option>
        <option value="pending">Pending</option>
        <option value="no_device">No Device</option>
      </select>

    <button id="applyFilterBtn" class="btn-sm">Apply</button>
    <button id="resetFilterBtn" class="btn-sm" style="background:#e2e8f0;color:#2c655e">Reset</button>
    <button id="refreshBtn" class="btn-sm" style="background:#174d47">Refresh</button>
  </div>

  <div class="stats">
    <div class="stat">
      <b id="totalEmp">0</b>
      <span>Total employees</span>
    </div>

    <div class="stat">
      <b id="pendingCount">0</b>
      <span>Pending devices</span>
    </div>

    <div class="stat">
      <b id="verifiedCount">0</b>
      <span>Verified devices</span>
    </div>

    <div class="stat">
      <b id="noDeviceCount">0</b>
      <span>No device</span>
    </div>
  </div>

  <div id="employeeDevicesContainer" class="employee-section">
    <div class="loader">Loading...</div>
  </div>

</div>

<script>
const SUPABASE_URL = 'https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

function createMiniSupabaseClient(url, key, extraHeaders = {}){
  const base = url.replace(/\/$/, '');
  const headers = {
    apikey: key,
    Authorization: 'Bearer ' + key,
    'Content-Type': 'application/json',
    ...extraHeaders
  };

  return {
    async rpc(fn, args){
      const res = await fetch(base + '/rest/v1/rpc/' + fn, {
        method: 'POST',
        headers,
        body: JSON.stringify(args || {})
      });

      const raw = await res.text();
      let data = null;

      try { data = raw ? JSON.parse(raw) : null; }
      catch { data = raw; }

      if(!res.ok){
        return {
          data: null,
          error: {
            message: (data && (data.message || data.details || data.hint)) || raw || res.statusText
          }
        };
      }

      return { data, error: null };
    }
  };
}

function createOrgClient(orgId, orgCode){
  return createMiniSupabaseClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
    'x-org-id': orgId || '',
    'x-org-code': orgCode || ''
  });
}

let db = createMiniSupabaseClient(SUPABASE_URL, SUPABASE_ANON_KEY);

let sessionUser = null;
let organization = null;
let adminUser = null;
let employees = [];
let devices = [];

let currentSearch = '';
let currentStatusFilter = 'all';

// Render pagination: zyada employees/devices par browser lag na kare
const RENDER_PAGE_SIZE = 50;
const DEVICE_DISPLAY_LIMIT = 5;
let currentPage = 1;

const ALLOWED_ROLES = ['owner','admin','hr','developer','manager'];

function getStoredSession(){
  const params = new URLSearchParams(location.search);

  const fromUrl = {
    orgId: params.get('org_id') || '',
    orgCode: params.get('org_code') || '',
    userId: params.get('user_id') || '',
    branchId: params.get('branch_id') || '',
    role: params.get('role') || '',
    email: params.get('email') || '',
    mobile: params.get('mobile') || ''
  };

  const keys = [
    'currentSession',
    'inlistSession',
    'inlist_session',
    'session',
    'userSession',
    'loggedInUser',
    'currentUser'
  ];

  let saved = {};
  for(const key of keys){
    try{
      const raw = localStorage.getItem(key) || sessionStorage.getItem(key);
      if(raw){
        saved = JSON.parse(raw);
        break;
      }
    }catch(e){}
  }

  return {
    ...saved,
    org_id: fromUrl.orgId || saved.org_id || saved.orgId || '',
    orgId: fromUrl.orgId || saved.orgId || saved.org_id || '',
    org_code: fromUrl.orgCode || saved.org_code || saved.orgCode || '',
    orgCode: fromUrl.orgCode || saved.orgCode || saved.org_code || '',
    id: fromUrl.userId || saved.id || saved.userId || saved.user_id || '',
    userId: fromUrl.userId || saved.userId || saved.user_id || saved.id || '',
    branchId: fromUrl.branchId || saved.branchId || saved.branch_id || '',
    role: fromUrl.role || saved.role || saved.userRole || 'admin',
    email: fromUrl.email || saved.email || '',
    mobile: fromUrl.mobile || saved.mobile || saved.phone || ''
  };
}

function esc(v){
  return String(v ?? '').replace(/[&<>'"]/g, m => ({
    '&':'&amp;',
    '<':'&lt;',
    '>':'&gt;',
    "'":'&#39;',
    '"':'&quot;'
  }[m]));
}

function fmt(v){
  return v ? new Date(v).toLocaleString() : '--';
}

function showToast(msg,isErr=false){
  const old = document.querySelector('.toast');
  if(old) old.remove();

  const t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' danger' : '');
  t.textContent = msg;
  document.body.appendChild(t);

  setTimeout(()=>t.remove(),3000);
}

function showFatal(msg){
  document.getElementById('employeeDevicesContainer').innerHTML =
    `<div class="empty"><b>Error:</b> ${esc(msg)}</div>`;
  showToast(msg,true);
}

function deviceStatus(d){
  if(!d) return 'none';
  return d.is_approved ? 'verified' : 'pending';
}

function isUuid(v){
  return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{3}-[0-9a-f]{12}$/i.test(String(v || ''));
}

function getAdminUuid(){
  const id = sessionUser?.id || sessionUser?.user_id || sessionUser?.userId || null;
  return isUuid(id) ? id : null;
}

async function init(){
  sessionUser = getStoredSession();

  if(!sessionUser || (!sessionUser.orgId && !sessionUser.orgCode && !sessionUser.org_id && !sessionUser.org_code)){
    return showFatal('Login session nahi mila. Pehle login karein.');
  }

  const role = String(sessionUser.role || sessionUser.userRole || sessionUser.type || '').toLowerCase();

  if(!ALLOWED_ROLES.includes(role)){
    return showFatal('Access denied: sirf owner/admin/hr/developer/manager allowed hai.');
  }

  const orgId = sessionUser.orgId || sessionUser.org_id || null;
  const orgCode = sessionUser.orgCode || sessionUser.org_code || sessionUser.companyCode || sessionUser.company_code || null;
  const userId = getAdminUuid();

  db = createOrgClient(orgId || '', orgCode || '');
  console.log('DEVICE RLS HEADERS SET', { orgId, orgCode, userId });

  const { data, error } = await db.rpc('app_device_admin_data', {
    p_org_id: orgId || null,
    p_org_code: orgCode || null,
    p_user_id: userId || null
  });

  if(error) return showFatal(error.message);

  if(!data || data.ok !== true){
    return showFatal((data && data.message) || 'Device data load failed');
  }

  organization = data.org || {};
  adminUser = data.user || {};
  employees = data.employees || [];
  devices = data.devices || [];

  sessionUser = {
    ...sessionUser,
    ...adminUser,
    orgId: organization.id || orgId,
    orgCode: organization.org_code || orgCode,
    role: adminUser.role || role
  };

  const finalRole = String(sessionUser.role || role || '').toLowerCase();

  if(!ALLOWED_ROLES.includes(finalRole)){
    return showFatal('Access denied.');
  }

  if(sessionUser.active === false){
    return showFatal('User inactive hai.');
  }

  document.getElementById('adminName').textContent =
    adminUser.full_name || sessionUser.full_name || sessionUser.fullName || sessionUser.email || 'Admin';

  document.getElementById('adminRole').textContent = finalRole.toUpperCase();
  document.getElementById('orgName').textContent = organization.org_name || '--';
  document.getElementById('orgCode').textContent = organization.org_code || '--';

  render();
}

async function loadData(){
  document.getElementById('employeeDevicesContainer').innerHTML =
    '<div class="loader">Loading Supabase data...</div>';

  const orgId = sessionUser?.orgId || sessionUser?.org_id || organization?.id || null;
  const orgCode = sessionUser?.orgCode || sessionUser?.org_code || organization?.org_code || null;
  const userId = getAdminUuid();

  db = createOrgClient(orgId || '', orgCode || '');

  const { data, error } = await db.rpc('app_device_admin_data', {
    p_org_id: orgId || null,
    p_org_code: orgCode || null,
    p_user_id: userId || null
  });

  if(error) return showFatal(error.message);

  if(!data || data.ok !== true){
    return showFatal((data && data.message) || 'Device data load failed');
  }

  organization = data.org || {};
  adminUser = data.user || {};
  employees = data.employees || [];
  devices = data.devices || [];

  render();
}

function getEmployeeDevices(empId){
  return devices
    .filter(d => d.employee_id === empId)
    .sort((a,b)=>{
      const av = deviceStatus(a) === 'verified';
      const bv = deviceStatus(b) === 'verified';

      if(av && !bv) return -1;
      if(!av && bv) return 1;

      return new Date(b.last_seen_at || b.created_at || 0)
        - new Date(a.last_seen_at || a.created_at || 0);
    });
}

function isViewerEmployee(emp){
  const viewerEmpId = sessionUser?.emp_id || sessionUser?.empId || sessionUser?.employee_id || sessionUser?.employeeId || sessionUser?.employee_id_fk || '';
  const viewerUserId = sessionUser?.id || sessionUser?.userId || sessionUser?.user_id || '';
  const viewerEmpCode = sessionUser?.emp_code || sessionUser?.empCode || adminUser?.emp_code || '';
  const viewerEmail = sessionUser?.email || adminUser?.email || '';
  const viewerMobile = sessionUser?.mobile || sessionUser?.phone || adminUser?.mobile || adminUser?.phone || '';
  const viewerName = sessionUser?.full_name || sessionUser?.fullName || sessionUser?.name || adminUser?.full_name || adminUser?.name || '';

  const sameId = String(emp?.id || '') && (
    String(emp.id || '') === String(viewerEmpId || '') ||
    String(emp.id || '') === String(viewerUserId || '')
  );
  const sameCode = viewerEmpCode && String(emp?.emp_code || '').toLowerCase() === String(viewerEmpCode).toLowerCase();
  const sameEmail = viewerEmail && String(emp?.email || '').toLowerCase() === String(viewerEmail).toLowerCase();
  const sameMobile = viewerMobile && String(emp?.mobile || '') === String(viewerMobile);
  const sameName = viewerName && String(emp?.full_name || '').trim().toLowerCase() === String(viewerName).trim().toLowerCase();

  return !!(sameId || sameCode || sameEmail || sameMobile || sameName);
}

function getVisibleEmployees(){
  return employees.filter(e => !isViewerEmployee(e));
}

function getFilteredEmployees(){
  let list = getVisibleEmployees();
  const s = currentSearch.trim().toLowerCase();

  if(s){
    list = list.filter(e => [
      e.full_name,
      e.emp_code,
      e.email,
      e.mobile,
      e.department,
      e.designation
    ].some(x => String(x || '').toLowerCase().includes(s)));
  }

  if(currentStatusFilter !== 'all'){
    list = list.filter(e => {
      const ds = getEmployeeDevices(e.id);

      if(currentStatusFilter === 'no_device'){
        return ds.length === 0;
      }

      return ds.some(d => deviceStatus(d) === currentStatusFilter);
    });
  }

  return list;
}

function renderStats(){
  const visibleEmployees = getVisibleEmployees();
  const visibleIds = new Set(visibleEmployees.map(e => e.id));
  const visibleDevices = devices.filter(d => visibleIds.has(d.employee_id));

  document.getElementById('totalEmp').textContent = visibleEmployees.length;
  document.getElementById('pendingCount').textContent = visibleDevices.filter(d => deviceStatus(d) === 'pending').length;
  document.getElementById('verifiedCount').textContent = visibleDevices.filter(d => deviceStatus(d) === 'verified').length;
  document.getElementById('noDeviceCount').textContent = visibleEmployees.filter(e => getEmployeeDevices(e.id).length === 0).length;
}

function render(){
  renderStats();

  const list = getFilteredEmployees();
  const box = document.getElementById('employeeDevicesContainer');

  if(!list.length){
    box.innerHTML = '<div class="empty">No employees found</div>';
    return;
  }

  const totalPages = Math.max(1, Math.ceil(list.length / RENDER_PAGE_SIZE));
  if(currentPage > totalPages) currentPage = totalPages;
  if(currentPage < 1) currentPage = 1;

  const startIndex = (currentPage - 1) * RENDER_PAGE_SIZE;
  const pageRows = list.slice(startIndex, startIndex + RENDER_PAGE_SIZE);

  const pagerTop = paginationHtml(list.length, totalPages, startIndex, pageRows.length);

  box.innerHTML = pagerTop + pageRows.map(emp => {
    const ds = getEmployeeDevices(emp.id);
    const latest = ds[0];
    const st = deviceStatus(latest);
    const showDs = ds.slice(0, DEVICE_DISPLAY_LIMIT);
    const moreCount = Math.max(0, ds.length - showDs.length);

    return `
      <div class="employee-card">
        <div class="emp-header">
          <div>
            <div class="emp-name">${esc(emp.full_name)}</div>
            <div class="emp-id">
              ${esc(emp.emp_code)}
              |
              ${esc(emp.department || '--')}
              |
              ${esc(emp.designation || '--')}
              |
              ${esc(emp.email || '--')}
              |
              ${esc(emp.mobile || '--')}
            </div>
          </div>

          <span class="device-status status-${st}">
            ${latest ? st.toUpperCase() : 'NO DEVICE'}
          </span>
        </div>

        <div class="device-section">
          <div class="section-subtitle">📱 Registered Devices</div>
          <div class="device-grid">
            ${
              ds.length
              ? showDs.map((d,i) => deviceCard(d,i === 0)).join('') + (moreCount ? `<div class="device-card">+${moreCount} old device(s) hidden for speed.</div>` : '')
              : '<div class="device-card">Employee ka koi device abhi registered nahi hai.</div>'
            }
          </div>
        </div>
      </div>
    `;
  }).join('') + pagerTop;
}

function paginationHtml(total, totalPages, startIndex, pageCount){
  return `
    <div class="pagination">
      <div class="page-info">
        Showing ${total ? startIndex + 1 : 0}-${startIndex + pageCount} of ${total} employees · Page ${currentPage}/${totalPages}
      </div>
      <div class="page-actions">
        <button onclick="goPage(1)" ${currentPage === 1 ? 'disabled' : ''}>First</button>
        <button onclick="goPage(currentPage - 1)" ${currentPage === 1 ? 'disabled' : ''}>Prev</button>
        <button onclick="goPage(currentPage + 1)" ${currentPage === totalPages ? 'disabled' : ''}>Next</button>
        <button onclick="goPage(${totalPages})" ${currentPage === totalPages ? 'disabled' : ''}>Last</button>
      </div>
    </div>
  `;
}

function goPage(page){
  currentPage = page;
  render();
  document.querySelector('.employee-section')?.scrollIntoView({behavior:'smooth', block:'start'});
}

function deviceCard(d,isCurrent){
  const st = deviceStatus(d);

  return `
    <div class="device-card ${isCurrent ? 'current' : ''}">
      <div class="device-header">
        <span class="device-name">
          <i class="fas fa-laptop"></i>
          ${esc(d.device_name || d.device_id)}
        </span>

        <span class="device-status status-${st}">
          ${st.toUpperCase()}
          ${isCurrent ? ' • Latest' : ''}
        </span>
      </div>

      <div class="device-details">
        <span><i class="fas fa-fingerprint"></i> ${esc(d.device_id)}</span>
        <span><i class="fas fa-mobile-alt"></i> ${esc(d.platform || '--')}</span>
        <span><i class="fas fa-clock"></i> Last seen: ${fmt(d.last_seen_at)}</span>
        <span><i class="fas fa-calendar-plus"></i> Registered: ${fmt(d.created_at)}</span>
        <span><i class="fas fa-user-check"></i> Approved: ${fmt(d.approved_at)}</span>
      </div>

      <div class="device-actions">
        ${
          st !== 'verified'
          ? `<button class="action-btn btn-verify" onclick="verifyDevice('${d.id}')">✅ Verify</button>`
          : `<button class="action-btn btn-unblock" onclick="unverifyDevice('${d.id}')">↩️ Mark Pending</button>`
        }
      </div>
    </div>
  `;
}

async function verifyDevice(deviceId){
  await updateDevice(deviceId,true);
}

async function unverifyDevice(deviceId){
  await updateDevice(deviceId,false);
}

async function updateDevice(deviceId,isApproved){
  const dev = devices.find(d => d.id === deviceId);

  if(!dev){
    return showToast('Device record nahi mila',true);
  }

  // Rule: ek employee ka ek hi device verified rahega.
  // Agar new device verify karenge to usi employee ke purane verified devices pehle pending/unverified honge.
  if(isApproved){
    const oldVerified = devices.filter(d =>
      d.employee_id === dev.employee_id &&
      d.id !== deviceId &&
      deviceStatus(d) === 'verified'
    );

    if(oldVerified.length){
      const ok = confirm(`Is employee ka ${oldVerified.length} old verified device pending ho jayega. New device verify karein?`);
      if(!ok) return;
    }

    for(const old of oldVerified){
      const r = await callDeviceStatusRpc(old.id, false);
      if(!r.ok){
        return showToast('Old device unverify failed: ' + r.message, true);
      }
    }
  }

  const r = await callDeviceStatusRpc(deviceId, !!isApproved);
  if(!r.ok){
    return showToast('Update failed: ' + r.message, true);
  }

  showToast(isApproved ? 'New device verified ho gaya. Old device pending ho gaya.' : 'Device pending mark ho gaya');
  await loadData();
}

async function callDeviceStatusRpc(deviceId, isApproved){
  const orgId = sessionUser?.orgId || sessionUser?.org_id || organization?.id || null;
  const orgCode = sessionUser?.orgCode || sessionUser?.org_code || organization?.org_code || null;
  const adminId = getAdminUuid();
  const client = createOrgClient(orgId || '', orgCode || '');

  const { data, error } = await client.rpc('app_device_update_status', {
    p_device_id: deviceId,
    p_is_approved: !!isApproved,
    p_admin_id: adminId
  });

  if(error){
    console.error('Device update error:', error);
    return { ok:false, message:error.message || 'Bad Request' };
  }

  if(!data || data.ok !== true){
    return { ok:false, message:(data && data.message) || 'Device update failed' };
  }

  return { ok:true, data };
}

document.getElementById('applyFilterBtn').onclick = () => {
  currentSearch = document.getElementById('searchInput').value;
  currentStatusFilter = document.getElementById('statusFilter').value;
  currentPage = 1;
  render();
};

document.getElementById('resetFilterBtn').onclick = () => {
  document.getElementById('searchInput').value = '';
  document.getElementById('statusFilter').value = 'all';
  currentSearch = '';
  currentStatusFilter = 'all';
  currentPage = 1;
  render();
};

document.getElementById('refreshBtn').onclick = () => loadData();

document.getElementById('backBtn').onclick = () => {
  const orgId = sessionUser?.orgId || organization?.id || '';
  const orgCode = sessionUser?.orgCode || organization?.org_code || '';
  if(history.length > 1) history.back();
  else location.href = `admin.html?org_id=${encodeURIComponent(orgId)}&org_code=${encodeURIComponent(orgCode)}`;
};

window.verifyDevice = verifyDevice;
window.unverifyDevice = unverifyDevice;
window.goPage = goPage;

init();
</script>
