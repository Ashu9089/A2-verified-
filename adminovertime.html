<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
  <title>Admin | Overtime Review & Approval</title>
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="https://cdn.sheetjs.com/xlsx-0.20.2/package/dist/xlsx.full.min.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:Inter,system-ui,-apple-system,'Segoe UI',Roboto,sans-serif;background:radial-gradient(ellipse at 20% 30%,#eef2f9,#d9e2ec);min-height:100vh;padding:1rem}
    .glass-header{background:linear-gradient(135deg,rgba(30,58,65,.95),rgba(20,45,50,.95));backdrop-filter:blur(12px);border-radius:2rem;margin-bottom:1.5rem;padding:.8rem 1.5rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:1rem;box-shadow:0 8px 20px rgba(0,0,0,.1);color:white}
    .back-btn{background:rgba(255,255,255,.15);border:0;padding:8px 18px;border-radius:40px;cursor:pointer;font-weight:700;display:flex;align-items:center;gap:6px;color:white}
    .admin-title{font-weight:700;background:rgba(255,255,255,.2);padding:6px 20px;border-radius:40px;font-size:.9rem}.org-pill{background:rgba(255,255,255,.12);padding:6px 18px;border-radius:40px;font-size:.8rem}
    .container{max-width:1300px;margin:0 auto}.filters{background:white;border-radius:1.5rem;padding:1rem 1.5rem;margin-bottom:1rem;display:flex;flex-wrap:wrap;gap:1rem;align-items:flex-end;box-shadow:0 4px 12px rgba(0,0,0,.05)}
    .filter-group{display:flex;flex-direction:column;gap:5px;flex:1;min-width:140px}.filter-group label{font-size:.7rem;font-weight:800;color:#1e6b63;text-transform:uppercase}
    select,input{padding:8px 14px;border-radius:2rem;border:1.5px solid #dcebe7;background:white;font-size:.8rem;outline:none}.btn-sm{background:#1f6e68;color:white;border:0;padding:8px 18px;border-radius:2rem;font-weight:700;cursor:pointer}.btn-secondary{background:#e2e8f0;color:#2c655e;border:0;padding:8px 18px;border-radius:2rem;cursor:pointer;font-weight:700}
    .stats-row{display:flex;flex-wrap:wrap;gap:1rem;margin-bottom:1rem}.stat-card{background:#fff;border-radius:1rem;padding:.8rem 1rem;flex:1;min-width:110px;text-align:center;box-shadow:0 2px 8px rgba(0,0,0,.04)}.stat-number{font-size:1.5rem;font-weight:900;color:#1e5a4c}.stat-label{font-size:.7rem;font-weight:700;color:#64748b}
    .requests-list{display:flex;flex-direction:column;gap:1rem}.request-card{background:white;border-radius:1.5rem;border:1px solid #e0efeb;overflow:hidden;transition:.2s}.request-card:hover{box-shadow:0 8px 20px rgba(0,0,0,.08)}
    .card-header{background:#fefcf7;padding:1rem;display:flex;justify-content:space-between;align-items:center;flex-wrap:wrap;gap:.5rem;border-bottom:1px solid #eef4f2}.emp-info h3{font-size:1rem;font-weight:800;color:#1e5a4c}.emp-details{font-size:.72rem;color:#6b8c9c}
    .status-badge{padding:4px 12px;border-radius:2rem;font-size:.7rem;font-weight:800}.status-pending{background:#fff3e0;color:#c47a2e}.status-approved{background:#e0f2e9;color:#1e6f3f}.status-rejected{background:#ffe6e5;color:#b91c1c}.status-cancelled{background:#e5e7eb;color:#374151}
    .card-body{padding:1rem;display:flex;flex-wrap:wrap;gap:1rem}.info-section{flex:1;min-width:190px;background:#f8fafc;border-radius:1rem;padding:.8rem}.info-section h4{font-size:.75rem;font-weight:800;color:#1e6b63;margin-bottom:.5rem;text-transform:uppercase}.info-row{display:flex;justify-content:space-between;gap:10px;font-size:.82rem;margin-bottom:6px;line-height:1.4}.info-row span:last-child{text-align:right;font-weight:700}
    .shift-type{font-weight:800;padding:2px 8px;border-radius:20px;font-size:.7rem}.shift-morning{background:#e0f2e9;color:#1e6f3f}.shift-evening{background:#fff3e0;color:#c47a2e}.shift-night{background:#eef2fa;color:#0f62fe}.ot-hours{font-size:1.1rem;font-weight:900;color:#e67e22}
    .card-actions{padding:1rem;border-top:1px solid #eef4f2;display:flex;justify-content:flex-end;gap:1rem;flex-wrap:wrap}.approve-btn{background:#e0f2e9;color:#1e6f3f;border:0;padding:7px 20px;border-radius:2rem;font-weight:800;cursor:pointer}.reject-btn{background:#ffe6e5;color:#b91c1c;border:0;padding:7px 20px;border-radius:2rem;font-weight:800;cursor:pointer}.disabled-btn{background:#eef2f5;color:#8aa5a0;border:0;padding:7px 20px;border-radius:2rem;font-weight:800}
    .reject-note{width:100%;margin-top:8px}.reject-note input{width:100%}.pagination{display:flex;justify-content:center;gap:8px;margin-top:1.5rem;flex-wrap:wrap}.page-btn{background:#eef2f5;border:0;padding:6px 12px;border-radius:2rem;cursor:pointer}.page-btn.active{background:#1f6e68;color:white}
    .toast{position:fixed;bottom:20px;left:20px;background:#1a5e58;color:white;padding:8px 16px;border-radius:40px;font-size:.8rem;z-index:1000}.toast.err{background:#b91c1c}
  </style>
</head>
<body>
<div class="glass-header">
  <button class="back-btn" id="backBtn"><span class="material-icons" style="font-size:1.2rem">arrow_back</span> Back</button>
  <div class="admin-title">👑 Admin | Overtime Review</div>
  <div class="org-pill"><span id="orgName">--</span> | <span id="orgCode">--</span></div>
</div>

<div class="container">
  <div class="filters">
    <div class="filter-group"><label>Status</label><select id="statusFilter"><option value="all">All</option><option value="pending">Pending</option><option value="approved">Approved</option><option value="rejected">Rejected</option></select></div>
    <div class="filter-group"><label>Department</label><select id="deptFilter"><option value="all">All Departments</option></select></div>
    <div class="filter-group"><label>Search</label><input type="text" id="searchInput" placeholder="Emp Name/ID"></div>
    <div class="filter-group"><label>From Date</label><input type="date" id="fromDate"></div>
    <div class="filter-group"><label>To Date</label><input type="date" id="toDate"></div>
    <button id="applyFilter" class="btn-sm">Apply</button>
    <button id="resetFilter" class="btn-secondary">Reset</button>
    <button id="exportExcel" class="btn-secondary">Export Excel</button>
  </div>

  <div id="statsRow" class="stats-row"></div>
  <div id="requestsList" class="requests-list"></div>
  <div id="pagination" class="pagination"></div>
</div>

<script>
const SUPABASE_URL="https://tovpcbzztvkiwamimrxt.supabase.co";
const SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE";

const $=id=>document.getElementById(id);
let state={org:null,admin:null,session:{},rows:[],total:0,counts:{},page:1,limit:25,dept:'all',status:'all',search:'',from:null,to:null,departmentLoaded:false};

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(msg,err=false){const old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}
function fmtDate(v){if(!v)return'--';const d=new Date(String(v).includes('T')?v:v+'T00:00:00');return Number.isNaN(d.getTime())?String(v):d.toLocaleDateString('en-IN')}
function fmtTime(v){if(!v)return'--';if(String(v).includes('T')){const d=new Date(v);return Number.isNaN(d.getTime())?'--':d.toLocaleTimeString('en-IN',{hour:'2-digit',minute:'2-digit'})}return String(v).slice(0,5)}
function fmtNum(v){const n=Number(v||0);return Number.isFinite(n)?n.toFixed(2):'0.00'}
function getShiftType(start){if(!start)return"Unknown";const h=parseInt(String(start).slice(0,2),10);if(Number.isNaN(h))return"Unknown";if(h>=6&&h<12)return"Morning";if(h>=12&&h<18)return"Evening";return"Night"}
function safeJson(key){
  try{return JSON.parse(sessionStorage.getItem(key)||localStorage.getItem(key)||'{}')}catch{return{}}
}
function val(...items){return items.find(v=>v!==undefined&&v!==null&&String(v).trim()!==''&&String(v)!=='undefined'&&String(v)!=='null')||''}
function mergedParams(){
  const bag=new URLSearchParams();
  const add=u=>{try{new URLSearchParams(u||'').forEach((v,k)=>{if(v&&!bag.has(k))bag.set(k,v)})}catch(e){}};
  add(location.search); add(location.hash.replace(/^#/,''));
  try{ if(document.referrer){ const u=new URL(document.referrer); add(u.search); add(u.hash.replace(/^#/,'')); } }catch(e){}
  return bag;
}
function getSession(){
  const q=mergedParams();
  const current=safeJson('currentSession');
  const inlist=safeJson('inlistSession');
  const emp=safeJson('inlistEmployeeSession');
  const admin=safeJson('inlistAdminSession');
  const orgSession=safeJson('orgSession');
  const personal=safeJson('personalData');
  const last=safeJson('lastOrgContext');
  return{
    orgId:val(q.get('org_id'),q.get('orgId'),current.orgId,current.org_id,inlist.orgId,admin.orgId,emp.orgId,orgSession.orgId,orgSession.id,last.orgId,localStorage.getItem('org_id'),sessionStorage.getItem('org_id')),
    orgCode:val(q.get('org_code'),q.get('company_code'),q.get('orgCode'),current.orgCode,current.org_code,inlist.orgCode,admin.orgCode,emp.orgCode,orgSession.orgCode,orgSession.org_code,last.orgCode,localStorage.getItem('orgCode'),localStorage.getItem('org_code'),sessionStorage.getItem('orgCode'),sessionStorage.getItem('org_code')),
    userId:val(q.get('user_id'),q.get('userId'),current.userId,current.user_id,current.adminId,inlist.userId,admin.userId,admin.id),
    empId:val(q.get('emp_id'),q.get('empId'),current.empId,current.employee_id,emp.empId),
    empCode:val(q.get('emp_code'),q.get('empCode'),current.empCode,emp.empCode),
    branchId:val(q.get('branch_id'),q.get('branchId'),current.branchId,current.branch_id,inlist.branchId,admin.branchId,emp.branchId),
    role:val(q.get('role'),current.role,inlist.role,admin.role,emp.role,'admin'),
    mode:val(q.get('mode'),current.mode,'company'),
    email:val(q.get('email'),current.email,inlist.email,admin.email,emp.email,personal.email),
    mobile:val(q.get('mobile'),current.mobile,inlist.mobile,admin.mobile,emp.mobile,personal.mobile),
    name:val(q.get('name'),personal.fullName,current.fullName,current.name,admin.name,'Admin'),
    returnPage:val(q.get('return_page'),q.get('returnPage'),'admin.html')
  };
}
function orgHeaders(){
  return {
    apikey:SUPABASE_ANON_KEY,
    Authorization:'Bearer '+SUPABASE_ANON_KEY,
    'Content-Type':'application/json',
    Prefer:'return=representation',
    'x-org-id':state.org?.id||state.session.orgId||'',
    'x-org-code':state.org?.org_code||state.session.orgCode||''
  };
}
async function sbFetch(path,opts={}){
  const r=await fetch(SUPABASE_URL+path,{...opts,headers:{...orgHeaders(),...(opts.headers||{})}});
  const t=await r.text();let d=null;try{d=t?JSON.parse(t):null}catch{d=t}
  if(!r.ok)throw new Error(d?.message||d?.details||d?.hint||t||r.statusText);
  return d;
}
async function sbRpc(fn,args){return sbFetch('/rest/v1/rpc/'+fn,{method:'POST',body:JSON.stringify(args||{})});}
function qs(table,filter,select='*'){return `/rest/v1/${table}?${filter}&select=${encodeURIComponent(select)}`}

async function resolveOrg(){
  const s=getSession();
  state.session=s;
  console.log('OVERTIME CONTEXT',s);

  let org=null;

  // IMPORTANT FIX:
  // RLS kai baar organizations table ka direct select block kar deta hai.
  // Isliye agar URL/session me org_id available hai to page ko ORG_NOT_FOUND par stop nahi karenge.
  // Org row sirf display name ke liye fetch hoti hai; data RPC ke liye org_id enough hai.
  if(s.orgId||s.orgCode){
    org={id:s.orgId||null,org_code:s.orgCode||'',org_name:'Organization'};
  }

  if(s.orgId){
    try{
      const found=(await sbFetch(qs('organizations',`id=eq.${encodeURIComponent(s.orgId)}`)))[0]||null;
      if(found)org=found;
    }catch(e){console.warn('org by id display fetch skipped:',e.message)}
  }
  if((!org||!org.id)&&s.orgCode){
    try{
      const found=(await sbFetch(qs('organizations',`org_code=eq.${encodeURIComponent(s.orgCode)}`)))[0]||null;
      if(found)org=found;
    }catch(e){console.warn('org by code display fetch skipped:',e.message)}
  }
  if((!org||!org.id)&&s.email){
    try{
      const ou=(await sbFetch(qs('org_users',`email=eq.${encodeURIComponent(s.email)}`, 'org_id,role,email')))[0]||null;
      if(ou?.org_id){
        org={id:ou.org_id,org_code:s.orgCode||'',org_name:'Organization'};
        const found=(await sbFetch(qs('organizations',`id=eq.${encodeURIComponent(ou.org_id)}`)))[0]||null;
        if(found)org=found;
      }
    }catch(e){console.warn('org by email skipped:',e.message)}
  }

  if(!org||!org.id){
    const got=[];
    if(s.orgId)got.push('org_id='+s.orgId);
    if(s.orgCode)got.push('org_code='+s.orgCode);
    throw new Error('ORG_ID_MISSING: Overtime data ke liye org_id zaruri hai. Dashboard se open karte time URL me org_id bhejo. Current context: '+(got.join(', ')||'empty'));
  }

  state.org=org;
  state.session.orgId=org.id;
  state.session.orgCode=org.org_code||s.orgCode||'';
  try{
    sessionStorage.setItem('lastOrgContext',JSON.stringify({orgId:org.id,orgCode:org.org_code||s.orgCode||''}));
    localStorage.setItem('lastOrgContext',JSON.stringify({orgId:org.id,orgCode:org.org_code||s.orgCode||''}));
  }catch(e){}

  $('orgName').textContent=org.org_name||'Organization';
  $('orgCode').textContent=org.org_code||s.orgCode||'--';

  let admin=null;
  if(s.userId){
    try{admin=(await sbFetch(qs('org_users',`id=eq.${encodeURIComponent(s.userId)}&org_id=eq.${encodeURIComponent(org.id)}`)))[0]||null}catch(e){console.warn('org user by id skipped:',e.message)}
  }
  if(!admin&&s.email){
    try{admin=(await sbFetch(qs('org_users',`email=eq.${encodeURIComponent(s.email)}&org_id=eq.${encodeURIComponent(org.id)}`)))[0]||null}catch(e){console.warn('org user by email skipped:',e.message)}
  }
  state.admin=admin||{id:s.userId||null,role:s.role,email:s.email,full_name:s.name};
}
async function loadDepartments(){
  // Large data safety: yahan employees table ka full scan nahi karenge.
  // Department list current page ke data se auto-fill hogi; search/filter server-side RPC se hi chalega.
  $('deptFilter').innerHTML='<option value="all">All Departments</option>';
}
function readFilters(){
  state.status=$('statusFilter').value||'all';
  state.dept=$('deptFilter').value||'all';
  state.search=$('searchInput').value.trim()||null;
  state.from=$('fromDate').value||null;
  state.to=$('toDate').value||null;
}
async function loadRequests(page=state.page){
  state.page=Math.max(1,Number(page||1));readFilters();
  $('requestsList').innerHTML='<div style="text-align:center;padding:2rem">Loading...</div>';
  try{
    const data=await sbRpc('admin_get_overtime_requests',{
      p_org_id:state.org.id,
      p_status:state.status,
      p_department:state.dept,
      p_search:state.search,
      p_from_date:state.from,
      p_to_date:state.to,
      p_limit:state.limit,
      p_offset:(state.page-1)*state.limit
    });
    state.rows=Array.isArray(data?.items)?data.items:[];
    state.total=Number(data?.total||state.rows.length||0);
    state.counts=data?.counts||makeCounts(state.rows);
    updateDepartmentOptions(state.rows);
  }catch(e){
    console.warn('RPC admin_get_overtime_requests failed:',e.message);
    state.rows=[];state.total=0;state.counts={};
    throw new Error('Overtime data fetch nahi hua: '+e.message+' — Supabase me admin_get_overtime_requests RPC aur RLS policy check karo.');
  }
  renderStats();renderRequests();renderPagination();
}
function makeCounts(rows){
  const c={pending:0,approved:0,rejected:0,total_hours:0};
  (rows||[]).forEach(r=>{const st=String(r.status||'pending').toLowerCase();if(c[st]!==undefined)c[st]++;c.total_hours+=Number(r.requested_hours||r.calculated_hours||0)});
  return c;
}
function updateDepartmentOptions(rows){
  const select=$('deptFilter');
  const selected=select.value||'all';
  const existing=new Set([...select.options].map(o=>o.value));
  (rows||[]).map(r=>r.department).filter(Boolean).forEach(d=>{
    if(!existing.has(d)){
      const opt=document.createElement('option');opt.value=d;opt.textContent=d;select.appendChild(opt);existing.add(d);
    }
  });
  if([...select.options].some(o=>o.value===selected))select.value=selected;
}
function renderStats(){
  const c=state.counts||{};
  $('statsRow').innerHTML=`
    <div class="stat-card"><div class="stat-number">${state.total||0}</div><div class="stat-label">Total</div></div>
    <div class="stat-card"><div class="stat-number">${c.pending||0}</div><div class="stat-label">Pending</div></div>
    <div class="stat-card"><div class="stat-number">${c.approved||0}</div><div class="stat-label">Approved</div></div>
    <div class="stat-card"><div class="stat-number">${c.rejected||0}</div><div class="stat-label">Rejected</div></div>
    <div class="stat-card"><div class="stat-number">${fmtNum(c.total_hours||0)}</div><div class="stat-label">Total Hours</div></div>`;
}
function renderRequests(){
  const box=$('requestsList');
  if(!state.rows.length){box.innerHTML='<div style="text-align:center;padding:2rem;background:white;border-radius:1.2rem">No overtime requests found</div>';return}
  box.innerHTML=state.rows.map(req=>{
    const status=String(req.status||'pending').toLowerCase();
    const shiftType=getShiftType(req.shift_start);
    const shiftTypeClass='shift-'+shiftType.toLowerCase();
    const id=esc(req.id);
    return `<div class="request-card">
      <div class="card-header">
        <div class="emp-info">
          <h3>${esc(req.employee_name||req.full_name||'Employee')} (${esc(req.emp_code||'-')})</h3>
          <div class="emp-details">${esc(req.department||'-')} • ${fmtDate(req.ot_date||req.attendance_date)} • Applied: ${fmtDate(req.created_at)}</div>
        </div>
        <div><span class="status-badge status-${esc(status)}">${esc(status.replaceAll('_',' ').toUpperCase())}</span></div>
      </div>
      <div class="card-body">
        <div class="info-section"><h4>📋 Scheduled Shift</h4><div class="info-row"><span>Shift Type:</span><span class="shift-type ${shiftTypeClass}">${shiftType}</span></div><div class="info-row"><span>Start:</span><span>${fmtTime(req.shift_start)}</span></div><div class="info-row"><span>End:</span><span>${fmtTime(req.shift_end)}</span></div></div>
        <div class="info-section"><h4>⏰ Actual Attendance</h4><div class="info-row"><span>Punch In:</span><span>${fmtTime(req.punch_in)}</span></div><div class="info-row"><span>Punch Out:</span><span>${fmtTime(req.punch_out)}</span></div></div>
        <div class="info-section"><h4>🧾 Overtime</h4><div class="info-row"><span>Calculated:</span><span class="ot-hours">${fmtNum(req.calculated_hours)} hrs</span></div><div class="info-row"><span>Requested:</span><span>${fmtNum(req.requested_hours)} hrs</span></div><div class="info-row"><span>Reason:</span><span>${esc(req.reason||'-')}</span></div>${req.admin_note?`<div class="info-row"><span>Admin Note:</span><span>${esc(req.admin_note)}</span></div>`:''}</div>
      </div>
      <div class="card-actions" id="actions-${id}">
        ${status==='pending'?`<button class="approve-btn" data-id="${id}">✅ Approve</button><button class="reject-btn" data-id="${id}">❌ Reject</button><div class="reject-note" id="reject-note-${id}" style="display:none"><input type="text" placeholder="Rejection reason" id="rejectReason-${id}"><button class="btn-sm" style="margin-top:4px" data-id="${id}" id="confirmReject-${id}">Confirm Reject</button></div>`:`<button class="disabled-btn" disabled>${status.toUpperCase()}</button>`}
      </div>
    </div>`;
  }).join('');
  document.querySelectorAll('.approve-btn').forEach(btn=>btn.onclick=()=>updateRequestStatus(btn.dataset.id,'approved',null));
  document.querySelectorAll('.reject-btn').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.id;const note=$(`reject-note-${id}`);if(note){note.style.display='block';btn.style.display='none'}});
  document.querySelectorAll('[id^="confirmReject-"]').forEach(btn=>btn.onclick=()=>{const id=btn.dataset.id;const input=$(`rejectReason-${id}`);updateRequestStatus(id,'rejected',input?input.value.trim():'Rejected')});
}
function renderPagination(){
  const totalPages=Math.ceil((state.total||0)/state.limit);const p=$('pagination');
  if(totalPages<=1){p.innerHTML='';return}
  const pages=new Set([1,totalPages,state.page,state.page-1,state.page+1,state.page-2,state.page+2]);
  let html='';let last=0;
  [...pages].filter(x=>x>=1&&x<=totalPages).sort((a,b)=>a-b).forEach(i=>{
    if(last&&i-last>1)html+='<span style="padding:6px 4px;color:#64748b">...</span>';
    html+=`<button class="page-btn ${i===state.page?'active':''}" data-page="${i}">${i}</button>`;last=i;
  });
  p.innerHTML=html;document.querySelectorAll('.page-btn').forEach(b=>b.onclick=()=>loadRequests(Number(b.dataset.page)).catch(e=>{toast(e.message,true);$('requestsList').innerHTML=`<div style="text-align:center;padding:2rem;color:#b91c1c;background:white;border-radius:1.2rem">${esc(e.message)}</div>`}));
}
async function updateRequestStatus(id,status,note){
  if(!id)return toast('Request id missing',true);
  try{
    await sbRpc('admin_update_overtime_status',{p_request_id:id,p_admin_user_id:state.admin?.id||state.session.userId||null,p_status:status,p_admin_note:note||null});
    toast(`Overtime request ${status}`);
    await loadRequests();
  }catch(e){toast('Status update failed: '+e.message,true)}
}
function exportExcel(){
  if(!state.rows.length)return toast('No data to export',true);
  if(typeof XLSX==='undefined')return toast('Excel library load nahi hui. Internet/CDN check karo.',true);
  const sheet=[['ID','Date','Employee','Emp Code','Department','Shift Start','Shift End','Punch In','Punch Out','Calculated Hours','Requested Hours','Reason','Status','Admin Note']];
  state.rows.forEach(r=>sheet.push([r.id,r.ot_date||r.attendance_date,r.employee_name||r.full_name,r.emp_code,r.department,r.shift_start,r.shift_end,r.punch_in,r.punch_out,r.calculated_hours,r.requested_hours,r.reason,r.status,r.admin_note]));
  const ws=XLSX.utils.aoa_to_sheet(sheet),wb=XLSX.utils.book_new();XLSX.utils.book_append_sheet(wb,ws,'Overtime');XLSX.writeFile(wb,`Overtime_Requests_${new Date().toISOString().slice(0,10)}.xlsx`);
}
function goBack(){
  const s=state.session||getSession();
  if(s.returnPage&&s.returnPage!=='null'){
    const qs=new URLSearchParams(location.search).toString();
    location.href=s.returnPage+(s.returnPage.includes('?')?'&':'?')+qs;
    return;
  }
  history.length>1?history.back():location.href='admin.html';
}
$('applyFilter').onclick=()=>loadRequests(1).catch(e=>{toast(e.message,true);$('requestsList').innerHTML=`<div style="text-align:center;padding:2rem;color:#b91c1c;background:white;border-radius:1.2rem">${esc(e.message)}</div>`});
$('resetFilter').onclick=()=>{$('statusFilter').value='all';$('deptFilter').value='all';$('searchInput').value='';$('fromDate').value='';$('toDate').value='';loadRequests(1).catch(e=>toast(e.message,true))};
$('exportExcel').onclick=exportExcel;
$('backBtn').onclick=goBack;
let searchTimer=null;
$('searchInput').addEventListener('keydown',e=>{if(e.key==='Enter')loadRequests(1).catch(er=>toast(er.message,true))});
$('searchInput').addEventListener('input',()=>{clearTimeout(searchTimer);searchTimer=setTimeout(()=>{const v=$('searchInput').value.trim();if(v.length===0||v.length>=2)loadRequests(1).catch(er=>toast(er.message,true));},650)});
(async()=>{try{await resolveOrg();await loadDepartments();await loadRequests(1)}catch(e){console.error(e);toast(e.message,true);$('requestsList').innerHTML=`<div style="text-align:center;padding:2rem;color:#b91c1c;background:white;border-radius:1.2rem">${esc(e.message)}</div>`}})();
</script>
</body>
</html>
