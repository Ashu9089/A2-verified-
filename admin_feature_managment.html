<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>Feature Management</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Inter,system-ui,sans-serif;background:linear-gradient(145deg,#0a2f2a,#061e1c);min-height:100vh;padding:22px;color:#123}
.wrap{max-width:1480px;margin:auto}.head{position:sticky;top:0;z-index:50;background:rgba(10,47,42,.94);backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px);border:1px solid rgba(255,255,255,.2);border-radius:0 0 28px 28px;padding:14px 18px;margin:-22px -22px 22px;display:flex;justify-content:space-between;gap:12px;align-items:center;flex-wrap:nowrap;color:white;box-shadow:0 12px 30px rgba(0,0,0,.22)}.head h2{font-size:1.25rem;font-weight:900;white-space:nowrap}.head-left{display:flex;align-items:center;gap:12px;min-width:0}.back-btn{width:42px;height:42px;border-radius:999px;border:1.5px solid rgba(255,255,255,.45);background:rgba(255,255,255,.14);color:white;font-size:1.25rem;font-weight:900;display:flex;align-items:center;justify-content:center;cursor:pointer;flex-shrink:0}.back-btn:hover{background:rgba(255,255,255,.24)}.badge{background:rgba(255,255,255,.16);border-radius:999px;padding:8px 16px;font-weight:800;font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:52vw}
.grid{display:grid;grid-template-columns:.9fr 1.35fr;gap:22px}.card{background:#fff;border-radius:28px;box-shadow:0 20px 40px rgba(0,0,0,.25);overflow:hidden}.card-h{padding:16px 20px;background:#fefbf5;border-bottom:1px solid #e7eee9;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}.card-h h3{font-size:1.05rem;color:#1c5c53;font-weight:900}.body{padding:20px}
.summary{display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-bottom:16px}.box{background:#f6faf8;border:1px solid #dcebe7;border-radius:18px;padding:14px;text-align:center}.box b{font-size:1.5rem;color:#1f6e68}.box span{display:block;font-size:.62rem;font-weight:900;color:#60827b;text-transform:uppercase;margin-top:3px}
.selectbox{background:#f6faf8;border-radius:18px;padding:12px;margin-bottom:14px}.selectbox label{font-size:.72rem;font-weight:900;color:#1c5c53;display:block;margin-bottom:6px;text-transform:uppercase}
select,input,button{border-radius:999px;border:1px solid #cbdcd6;padding:10px 15px;font-weight:700;outline:none}select,input{width:100%;background:white}.btn{background:#1f6e68;color:white;border:0;cursor:pointer;font-weight:900}.btn.out{background:white;color:#1f6e68;border:1.5px solid #1f6e68}.btn:disabled{opacity:.5;cursor:not-allowed}
.feature-list,.emp-list{max-height:560px;overflow:auto}.feature,.emp{display:flex;justify-content:space-between;align-items:center;gap:12px;padding:12px 0;border-bottom:1px solid #edf2ef}.fname,.ename{font-weight:900;color:#1f3d3a}.sub{font-size:.72rem;color:#6d8b86;margin-top:2px}.key{font-size:.62rem;background:#edf7f4;color:#1f6e68;padding:2px 8px;border-radius:999px;font-weight:900}.emp{background:#fff;border:1px solid #e2ece8;border-radius:16px;margin-bottom:9px;padding:12px 14px;cursor:pointer}.emp:hover,.emp.active{background:#e0f2ef;border-left:5px solid #1f8a7c}
.search{display:flex;gap:8px;margin-bottom:14px}.assign-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:10px;margin-top:14px}.assign{background:#fefcf7;border:1px solid #e2ece8;border-radius:16px;padding:12px;display:flex;justify-content:space-between;align-items:center;gap:10px}.toggle{width:46px;height:24px;background:#cbd5d1;border-radius:999px;position:relative;cursor:pointer;flex-shrink:0}.toggle:after{content:'';position:absolute;left:3px;top:2px;width:20px;height:20px;background:#fff;border-radius:50%;box-shadow:0 1px 3px rgba(0,0,0,.25);transition:.2s}.toggle.on{background:#1f8a7c}.toggle.on:after{left:23px}.toggle.loading{opacity:.5;pointer-events:none}
.empty{padding:18px;text-align:center;color:#7a9c94;background:#f8fdfb;border:1px dashed #cbdcd6;border-radius:16px}.toast{position:fixed;right:26px;bottom:26px;background:#1f6e68;color:white;padding:12px 20px;border-radius:999px;font-weight:800;box-shadow:0 10px 25px rgba(0,0,0,.2);z-index:99}.toast.err{background:#bc5a4c}.role.company{background:#fef3c7;color:#92400e}.role.employee{background:#dcfce7;color:#166534}
@media(max-width:1000px){.grid{grid-template-columns:1fr}.summary{grid-template-columns:repeat(2,1fr)}.head{margin:-22px -22px 18px;border-radius:0 0 22px 22px}.badge{max-width:45vw;font-size:.72rem;padding:7px 10px}.head h2{font-size:1.02rem}.back-btn{width:38px;height:38px}}
</style>
</head>
<body>
<div class="wrap">
  <div class="head"><div class="head-left"><button class="back-btn" id="backBtn" type="button" title="Back">←</button><h2>Feature Management</h2></div><div class="badge" id="sessionBadge">Resolving login...</div></div>
  <div class="grid">
    <div class="card">
      <div class="card-h"><h3 id="featureTitle">Assignable Features</h3><button class="btn out" id="refreshBtn">Refresh</button></div>
      <div class="body">
        <div class="summary">
          <div class="box"><b id="featureCount">0</b><span>Assignable Features</span></div>
          <div class="box"><b id="staffCount">0</b><span>Visible Staff</span></div>
          <div class="box"><b id="assignedCount">0</b><span>Selected Assigned</span></div>
          <div class="box"><b id="modeBox">--</b><span>Mode</span></div>
        </div>
        <div class="selectbox"><label>Company</label><select id="companySelect"></select></div>
        <div id="featureList" class="feature-list"><div class="empty">Loading features...</div></div>
      </div>
    </div>
    <div class="card">
      <div class="card-h"><h3>Staff List</h3><button class="btn" id="giveAllBtn">Give all visible features</button></div>
      <div class="body">
        <div class="search"><input id="searchStaff" placeholder="Search staff by name, emp code, email, mobile"></div>
        <div id="staffList" class="emp-list"><div class="empty">Loading staff...</div></div>
        <div style="margin-top:18px;background:#f8fdfb;border-radius:22px;padding:16px">
          <div style="font-weight:900;color:#1c5c53;margin-bottom:10px">Assign Features To: <span id="selectedStaff">Select staff</span></div>
          <div id="assignGrid" class="assign-grid"><div class="empty">Select staff to assign features</div></div>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';

const sb = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
const state={session:{},mode:'company',org:null,operator:null,features:[],staff:[],selected:null,access:{}};

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(m,e=false){let old=document.querySelector('.toast');if(old)old.remove();let t=document.createElement('div');t.className='toast'+(e?' err':'');t.textContent=m;document.body.appendChild(t);setTimeout(()=>t.remove(),3500)}
function norm(v){return String(v||'').toLowerCase().trim()}
function uuid(v){return /^[0-9a-f]{8}-[0-9a-f]{4}-[1-5][0-9a-f]{3}-[89ab][0-9a-f]{12}$/i.test(String(v||''))}
function getJson(key){try{return JSON.parse(localStorage.getItem(key)||sessionStorage.getItem(key)||'{}')}catch{return{}}}
function empName(e){return e?.full_name||e?.name||e?.emp_name||'Unnamed'}

function readSession(){
  const p=new URLSearchParams(location.search);
  const cs=getJson('currentSession');
  const ce=getJson('currentEmployee');
  const urlMode=norm(p.get('mode')||'');
  const urlHasCompany=!!(p.get('org_id')||p.get('org_code')||p.get('company_code'));
  const urlHasEmp=!!(p.get('emp_id')||p.get('employee_id')||p.get('emp_code')||p.get('employee_code')||p.get('staff_code'));
  let forcedMode='';
  if(urlMode==='company') forcedMode='company';
  else if(urlMode==='employee'||urlMode==='emp') forcedMode='employee';
  else if(urlHasCompany&&!urlHasEmp) forcedMode='company';
  else if(urlHasEmp) forcedMode='employee';
  const useCompany=forcedMode==='company';
  return{
    forcedMode,
    orgId:p.get('org_id')||cs.org_id||cs.orgId||cs.companyId||(!useCompany?(ce.org_id||ce.orgId):null)||null,
    orgCode:p.get('org_code')||p.get('company_code')||cs.org_code||cs.orgCode||cs.companyCode||(!useCompany?(ce.org_code||ce.orgCode):null)||localStorage.getItem('orgCode')||localStorage.getItem('org_code')||'',
    userId:p.get('user_id')||cs.userId||cs.adminId||cs.orgUserId||cs.org_user_id||null,
    empId:useCompany?null:(p.get('emp_id')||p.get('employee_id')||ce.id||ce.employee_id||ce.employeeId||cs.employee_id||cs.employeeId||cs.empId||null),
    rawEmployeeId:p.get('emp_id')||p.get('employee_id')||ce.id||ce.employee_id||ce.employeeId||cs.employee_id||cs.employeeId||cs.empId||null,
    empCode:useCompany?'':(p.get('emp_code')||p.get('employee_code')||p.get('staff_code')||ce.emp_code||ce.empCode||cs.emp_code||cs.empCode||localStorage.getItem('emp_code')||localStorage.getItem('empCode')||''),
    email:useCompany?(p.get('email')||cs.adminEmail||cs.email||''):(p.get('email')||ce.email||cs.email||cs.adminEmail||''),
    mobile:useCompany?(p.get('mobile')||cs.adminPhone||cs.mobile||cs.phone||''):(p.get('mobile')||ce.mobile||ce.phone||cs.mobile||cs.phone||cs.adminPhone||''),
    role:norm(p.get('role')||cs.role||cs.userRole||(!useCompany?ce.role:'')||'')
  };
}

async function callRpc(name,args){
  const {data,error}=await sb.rpc(name,args||{});
  if(error) throw Error(error.message || JSON.stringify(error));
  if(!data || data.ok!==true) throw Error((data&&data.message) || `${name} failed`);
  return data;
}

async function loadScreen(){
  const data=await callRpc('app_feature_screen_data',{
    p_org_id: uuid(state.session.orgId)?state.session.orgId:null,
    p_org_code: state.session.orgCode||null,
    p_emp_id: uuid(state.session.empId)?state.session.empId:null,
    p_emp_code: state.session.empCode||null,
    p_email: state.session.email||null,
    p_mobile: state.session.mobile||null,
    p_role: state.session.role||null,
    p_forced_mode: state.session.forcedMode||null
  });
  state.mode=data.mode||'company';
  state.org=data.org;
  state.operator=data.operator||null;
  state.features=data.features||[];
  state.staff=data.staff||[];
  state.access={};
  state.selected=null;
  $('companySelect').innerHTML=`<option value="${esc(state.org.id)}">${esc(state.org.org_name)} (${esc(state.org.org_code)})</option>`;
  $('companySelect').disabled=true;
  updateHeader();
  renderFeatures();
  renderStaff();
  $('featureCount').textContent=state.features.length;
  $('assignedCount').textContent='0';
  $('selectedStaff').textContent='Select staff';
  $('assignGrid').innerHTML='<div class="empty">Select staff to assign features</div>';
}

function updateHeader(){
  if(state.mode==='company'){
    $('sessionBadge').innerHTML=`<span class="key role company">COMPANY</span> ${esc(state.org.org_name)} (${esc(state.org.org_code)})`;
    $('modeBox').textContent='COMPANY';
  }else{
    $('sessionBadge').innerHTML=`<span class="key role employee">EMP</span> ${esc(empName(state.operator))} (${esc(state.operator.emp_code)})`;
    $('modeBox').textContent=state.operator?.emp_code||'EMP';
  }
}

function renderFeatures(){
  const desc=state.mode==='company'?`${state.org.org_name} ke enabled features`:`${empName(state.operator)} (${state.operator.emp_code}) ko assigned features`;
  $('featureTitle').textContent=state.mode==='company'?'Company Assignable Features':'Employee Assignable Features';
  $('featureList').innerHTML=state.features.length?state.features.map(f=>`
    <div class="feature"><div><div class="fname">${esc(f.feature_name||f.feature_key)} <span class="key">${esc(f.feature_key)}</span></div><div class="sub">${esc(desc)}</div></div><span>✅</span></div>
  `).join(''):'<div class="empty">Assignable feature nahi mila. Pehle Developer panel me company ko feature ON karo.</div>';
}

function sameClean(a,b){
  const x=norm(a), y=norm(b);
  return !!x && !!y && x===y;
}


function profileText(e){
  return [e?.role,e?.emp_role,e?.user_role,e?.designation,e?.department,e?.employee_type,e?.emp_code,empName(e)].map(norm).join(' ');
}

function roleWords(e){
  return [e?.role,e?.emp_role,e?.user_role,e?.designation,e?.department,e?.employee_type,e?.emp_code,empName(e)]
    .map(norm)
    .filter(Boolean);
}

function hasRoleWord(e, words){
  const vals=roleWords(e);
  return vals.some(v=>words.includes(v));
}

function isOwnerOrCompanyProfile(e){
  if(!e) return false;
  const code=norm(e.emp_code), name=norm(empName(e));
  const role=norm(e.role||e.emp_role||e.user_role||'');
  const type=norm(e.employee_type||'');

  // Company/owner profile ko list/count se hamesha hide karo.
  if(['company','owner','owner_profile','company_profile'].includes(code)) return true;
  if(['company','owner','owner_profile','company_profile'].includes(role)) return true;
  if(['company','owner','owner_profile','company_profile'].includes(type)) return true;
  if(name==='company' || name==='owner' || name.includes('company profile') || name.includes('owner profile')) return true;
  return false;
}

function isPrivilegedForEmployeeView(e){
  if(!e) return false;
  const code=norm(e.emp_code), name=norm(empName(e));
  const role=norm(e.role||e.emp_role||e.user_role||'');
  const designation=norm(e.designation||'');
  const type=norm(e.employee_type||'');

  // Employee/staff login me upper roles hide rahenge.
  // Dhyan: department me HR/Finance likha ho sakta hai, isliye department se hide nahi kar rahe.
  const privileged=['admin','owner','company','developer','dev','superadmin','super_admin','hr','operation manager','operations manager','finance','finance manager','manager'];
  if(privileged.includes(code)) return true;
  if(privileged.includes(role)) return true;
  if(privileged.includes(type)) return true;
  if(privileged.includes(designation)) return true;
  if(name==='admin' || name==='owner' || name==='company' || name.includes('admin profile') || name.includes('owner profile') || name.includes('company profile')) return true;
  return false;
}

function isOpenedByThisEmployee(e){
  if(!e) return false;
  const s=state.session||{};
  const op=state.operator||{};

  if(op.id && String(e.id)===String(op.id)) return true;
  if(s.empId && String(e.id)===String(s.empId)) return true;
  if(s.rawEmployeeId && String(e.id)===String(s.rawEmployeeId)) return true;
  if(sameClean(e.emp_code, s.empCode) || sameClean(e.emp_code, op.emp_code)) return true;
  if(sameClean(e.email, s.email) || sameClean(e.email, op.email)) return true;
  if(sameClean(e.mobile, s.mobile) || sameClean(e.mobile, op.mobile)) return true;
  return false;
}

function getVisibleStaff(){
  let rows=(state.staff||[]).filter(e=>!isOwnerOrCompanyProfile(e));

  if(state.mode==='employee'){
    // Employee login: apna naam + upper roles hide.
    rows=rows.filter(e=>!isOpenedByThisEmployee(e)).filter(e=>!isPrivilegedForEmployeeView(e));
  }else{
    // Admin/owner/company login: saare actual staff dikhenge.
    // Yahan self/admin ko hide nahi kar rahe, warna staff count kam ho jata tha.
    rows=rows.filter(e=>!isOwnerOrCompanyProfile(e));
  }
  return rows;
}

function renderStaff(){
  const q=norm($('searchStaff').value||'');
  const visibleStaff = getVisibleStaff();
  $('staffCount').textContent=visibleStaff.length;
  const rows=visibleStaff.filter(e=>[empName(e),e.emp_code,e.email,e.mobile,e.department,e.designation,e.role,e.emp_role].some(v=>norm(v).includes(q)));
  $('staffList').innerHTML=rows.length?rows.map(e=>`
    <div class="emp ${state.selected?.id===e.id?'active':''}" data-id="${esc(e.id)}"><div><div class="ename">${esc(empName(e))} <span class="key">${esc(e.emp_code)}</span></div><div class="sub">${esc(e.department||'-')} · ${esc(e.designation||e.role||'-')} · ${esc(e.email||e.mobile||'-')}</div></div><span>›</span></div>
  `).join(''):'<div class="empty">Staff list empty hai.</div>';
  document.querySelectorAll('.emp').forEach(x=>x.onclick=()=>selectStaff(x.dataset.id));
}

async function selectStaff(id){
  const emp=getVisibleStaff().find(e=>String(e.id)===String(id));
  if(!emp)return;
  state.selected=emp;
  $('selectedStaff').textContent=`${empName(emp)} (${emp.emp_code})`;
  await loadStaffAccess();
  renderStaff();
}

async function loadStaffAccess(){
  state.access={};
  if(!state.selected)return;
  const data=await callRpc('app_feature_staff_access',{p_employee_id:state.selected.id});
  (data.access||[]).forEach(a=>state.access[a.feature_id]=a);
  renderAssignGrid();
}

function renderAssignGrid(){
  if(!state.selected){$('assignGrid').innerHTML='<div class="empty">Select staff to assign features</div>';return}
  $('assignedCount').textContent=Object.values(state.access).filter(a=>a.is_enabled&&state.features.some(f=>f.id===a.feature_id)).length;
  $('assignGrid').innerHTML=state.features.length?state.features.map(f=>{
    const on=!!state.access[f.id]?.is_enabled;
    return `<div class="assign"><div><div class="fname">${esc(f.feature_name||f.feature_key)}</div><div class="sub">${esc(f.feature_key)}</div></div><div class="toggle ${on?'on':''}" data-fid="${esc(f.id)}"></div></div>`;
  }).join(''):'<div class="empty">Is login ke paas assignable feature nahi hai.</div>';
  document.querySelectorAll('.toggle').forEach(t=>t.onclick=()=>toggleFeature(t.dataset.fid,t));
}

async function toggleFeature(featureId,el){
  if(!state.selected)return toast('Select staff first',true);
  if(!state.features.some(f=>String(f.id)===String(featureId)))return toast('Ye feature is login ke paas nahi hai, assign nahi kar sakte',true);
  el.classList.add('loading');
  const cur=state.access[featureId], next=!cur?.is_enabled;
  try{
    await callRpc('app_feature_set_employee_feature',{p_employee_id:state.selected.id,p_feature_id:featureId,p_is_enabled:next});
    await loadStaffAccess();
    toast('Feature updated');
  }catch(e){toast(e.message,true)}
  el.classList.remove('loading');
}

async function giveAll(){
  if(!state.selected)return toast('Select staff first',true);
  if(!state.features.length)return toast('Assignable feature nahi hai',true);
  $('giveAllBtn').disabled=true;$('giveAllBtn').textContent='Assigning...';
  try{
    await callRpc('app_feature_give_all',{p_employee_id:state.selected.id});
    await loadStaffAccess();
    toast('All assignable features assigned');
  }catch(e){toast(e.message,true)}
  $('giveAllBtn').disabled=false;$('giveAllBtn').textContent='Give all visible features';
}

async function init(){
  try{
    $('featureList').innerHTML='<div class="empty">Loading features...</div>';
    $('staffList').innerHTML='<div class="empty">Loading staff...</div>';
    state.session=readSession();
    await loadScreen();
    console.log('Feature screen mode:',state.mode,state.session,state.operator);
  }catch(e){
    toast(e.message,true);
    console.error(e);
    $('sessionBadge').textContent='Error';
    $('featureList').innerHTML=`<div class="empty">${esc(e.message)}<br><br>SQL file ke RPC functions pehle Supabase SQL Editor me run karo.</div>`;
    $('staffList').innerHTML=`<div class="empty">${esc(e.message)}</div>`;
  }
}

$('refreshBtn').onclick=init;
$('searchStaff').oninput=renderStaff;
$('giveAllBtn').onclick=giveAll;
$('backBtn').onclick=()=>{
  const p=new URLSearchParams(location.search);
  const ret=p.get('return_page')||p.get('back')||p.get('from');
  if(ret){ location.href=ret; return; }
  if(history.length>1){ history.back(); return; }
  location.href='admin.html';
};
init();
</script>
</body>
</html>
