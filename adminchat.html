<body>
<div class="glass-header">
  <button class="back-btn" id="backBtn"><span class="material-icons" style="font-size:1.2rem">arrow_back</span> Back</button>
  <div class="title">👑 Admin Chat</div>
  <div style="width:80px"></div>
</div>

<div class="chat-container">
  <div class="left-panel">
    <div class="panel-header">
      <h2><span class="material-icons">support_agent</span> Admin Chat</h2>
      <div class="admin-box" id="adminBox">Loading...</div>
      <div class="search-row">
        <input type="text" id="searchStaff" placeholder="Search staff name / emp id...">
        <button id="searchBtn">Search</button>
      </div>
    </div>

    <div class="developer-section">
      <div class="section-title">Developer / Support</div>
      <div id="developerList">Loading...</div>
    </div>

    <div class="staff-section-title">Staff Messages / Staff List (10 only)</div>
    <div id="staffList" class="contacts-list">Loading...</div>

    <div class="pager">
      <button id="prevPage">Prev</button>
      <span id="pageInfo" style="font-size:.76rem;font-weight:900;color:#475569">Page 1</span>
      <button id="nextPage">Next</button>
    </div>
  </div>

  <div class="chat-panel">
    <div class="chat-header">
      <button class="mobile-chat-back" id="mobileChatBack"><span class="material-icons">arrow_back</span> List</button>
      <div class="chat-contact">
        <div class="chat-avatar" id="chatAvatar">👤</div>
        <div>
          <div style="font-weight:900" id="chatName">Select staff/developer</div>
          <div style="font-size:.72rem;color:#6b8c9c;font-weight:700" id="chatRole"></div>
        </div>
      </div>
      <div class="actions" id="chatActions"></div>
      <div class="chat-menu-wrap">
        <button class="menu-dot-btn" id="chatMenuBtn" type="button" title="More options"><span class="material-icons">more_vert</span></button>
        <div class="chat-menu" id="chatMenu"></div>
      </div>
    </div>

    <div id="messagesArea" class="messages-area">
      <div class="empty">Select staff/developer to start chat</div>
    </div>
    <button id="scrollBottomBtn" class="scroll-bottom-btn" type="button" title="Go to latest message"><span class="material-icons">keyboard_arrow_down</span></button>
    <div id="typingIndicator" class="typing-indicator"></div>

    <div class="reply-area" id="replyArea">
      <div class="input-group">
        <textarea id="messageInput" rows="1" placeholder="Type message... (Ctrl+Enter)"></textarea>
        <button id="attachMediaBtn" class="attach-btn"><span class="material-icons">attach_file</span></button>
        <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none">
        <button id="sendMessageBtn" class="send-btn">Send</button>
      </div>
      <div id="previewArea" class="preview-area"></div>
    </div>
  </div>
</div>

<div id="imageViewer" class="image-viewer"><img id="imageViewerImg" alt="chat image preview"></div>

<div id="deleteConfirm" class="delete-confirm">
  <div class="delete-box">
    <h3>Delete Message</h3>
    <p id="deleteConfirmText">Delete this message?</p>
    <div class="delete-actions">
      <button id="confirmDeleteBoth" class="danger" type="button">Delete for Both</button>
      <button id="confirmDeleteMe" class="soft" type="button">Delete for Me</button>
      <button id="cancelDeleteMsg" class="soft" type="button">Cancel</button>
    </div>
  </div>
</div>

<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';
const sb=window.supabase.createClient(SUPABASE_URL,SUPABASE_ANON_KEY);
const $=id=>document.getElementById(id);
let state={org:null,adminUser:null,adminEmp:null,developers:[],staff:[],current:null,messages:[],page:1,limit:10,search:'',pendingMedia:null,pendingDeleteMsgId:null,chatChannel:null,globalChannel:null,typingTimer:null,myTypingTimer:null,lastTypingSent:0,isMobileChatOpen:false,loadMessagesRunning:false,loadContactsRunning:false,forceScrollBottom:false,lastLocalMessageId:null,lastMessageErrorAt:0};

function esc(v){return String(v??'').replace(/[&<>"']/g,s=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#039;'}[s]))}
function toast(msg,err=false){let old=document.querySelector('.toast');if(old)old.remove();const t=document.createElement('div');t.className='toast'+(err?' err':'');t.textContent=msg;document.body.appendChild(t);setTimeout(()=>t.remove(),3000)}
function initials(name){return String(name||'?').split(/\s+/).slice(0,2).map(x=>x[0]).join('').toUpperCase()||'?'}
function fmtTime(iso){if(!iso)return'';const d=new Date(iso);const diff=Math.floor((Date.now()-d.getTime())/60000);if(diff<1)return'Just now';if(diff<60)return`${diff} min ago`;if(diff<1440)return`${Math.floor(diff/60)} hrs ago`;return d.toLocaleDateString('en-IN')}
function mediaSrc(m){return m?.media_data||m?.media_url||''}
function canDeleteForBoth(m){
  if(!m||!state.adminEmp?.id)return false;
  const sentByMe=String(m.sender_employee_id)===String(state.adminEmp.id);
  const created=new Date(m.created_at||0).getTime();
  return sentByMe && created && (Date.now()-created)<=5*60*1000;
}
function messageLabel(m){
  if(m?.media_type==='image')return 'image';
  if(m?.media_type==='video')return 'video';
  if(m?.media_type==='audio')return 'audio';
  return 'message';
}
function openMessageDeleteMenu(id){
  document.querySelectorAll('.delete-menu.show').forEach(x=>x.classList.remove('show'));
  const menu=document.querySelector(`[data-del-menu="${CSS.escape(String(id))}"]`);
  if(menu)menu.classList.add('show');
}
function closeDeleteMenus(){document.querySelectorAll('.delete-menu.show').forEach(x=>x.classList.remove('show'))}
function openDeleteConfirm(id,mode){
  const m=state.messages.find(x=>String(x.id)===String(id));
  if(!m)return;
  state.pendingDeleteMsgId=id;
  const both=mode==='both';
  $('confirmDeleteBoth').style.display=canDeleteForBoth(m)?'inline-block':'none';
  $('deleteConfirmText').textContent=both?`Is ${messageLabel(m)} ko dono side se delete karna hai?`:`Is ${messageLabel(m)} ko sirf apne side se hide/delete karna hai?`;
  $('deleteConfirm').dataset.mode=mode;
  $('deleteConfirm').classList.add('show');
}
function closeDeleteConfirm(){state.pendingDeleteMsgId=null;const m=$('deleteConfirm');if(m)m.classList.remove('show')}
async function deleteMessage(mode){
  const id=state.pendingDeleteMsgId;
  if(!id)return;
  const m=state.messages.find(x=>String(x.id)===String(id));
  if(mode==='both' && !canDeleteForBoth(m)){
    closeDeleteConfirm();
    return toast('Delete for Both sirf apne sent message par 5 minute ke andar allowed hai.',true);
  }
  const forBoth=mode==='both';
  try{
    await rpc('chat_delete_message',{p_message_id:id,p_employee_id:state.adminEmp.id,p_delete_for_both:forBoth,p_delete_media:!!forBoth});
  }catch(e){
    if(String(e.message||'').includes('p_delete_media') || String(e.message||'').includes('function')){
      await rpc('chat_delete_message',{p_message_id:id,p_employee_id:state.adminEmp.id,p_delete_for_both:forBoth});
    }else{throw e;}
  }
  closeDeleteConfirm();
  toast(forBoth?'Deleted for both':'Deleted for me');
  await loadMessages(false);
  await loadDevelopers().catch(()=>{});
  await loadStaff(state.page).catch(()=>{});
}
function openImageViewer(src){const v=$('imageViewer'),img=$('imageViewerImg');if(!v||!img||!src)return;img.src=src;v.classList.add('show')}
function closeImageViewer(){const v=$('imageViewer'),img=$('imageViewerImg');if(v)v.classList.remove('show');if(img)img.src=''}
function isNearBottom(){const box=$('messagesArea');if(!box)return true;return (box.scrollHeight-box.scrollTop-box.clientHeight)<120}
function scrollToBottom(){const box=$('messagesArea');if(!box)return;box.scrollTop=box.scrollHeight;updateScrollBottomButton()}
function updateScrollBottomButton(){const btn=$('scrollBottomBtn');if(!btn)return;btn.classList.toggle('show',!!state.current&&!isNearBottom())}
function currentViewerCanBlock(){return true}
function myBlocked(c){
  // Button label sirf meri taraf ke block status se decide hoga.
  // Agar dusre ne block kiya hai to mere paas ab bhi "Block" option rahega.
  return !!(c?.my_is_blocked || c?.blocked_by_me || c?.is_blocked_by_me);
}
function otherBlocked(c){
  return !!(c?.other_is_blocked || c?.blocked_by_other || c?.is_blocked_by_other);
}
function effectiveBlocked(c){
  // Chat band tab rahegi jab meri taraf ya dusri taraf me se kisi ne bhi block kiya ho.
  return !!(c?.is_blocked || c?.effective_is_blocked || myBlocked(c) || otherBlocked(c));
}
function blockLabel(c){
  return myBlocked(c) ? 'Unblock' : 'Block';
}
function blockMenuLabel(c){
  return myBlocked(c) ? 'Unblock User' : 'Block User';
}
function blockChipText(c){
  if(myBlocked(c) && otherBlocked(c)) return 'Both Blocked';
  if(myBlocked(c)) return 'Blocked by You';
  if(otherBlocked(c) || effectiveBlocked(c)) return 'Blocked';
  return '';
}

/* ===== Admin read badge guard ===== */
function adminReadStoreKey(){
  return `admin_chat_read_at_${state.adminEmp?.id || 'admin'}`;
}
function readAdminReadMap(){
  try{return JSON.parse(localStorage.getItem(adminReadStoreKey())||'{}')||{}}catch(e){return{}}
}
function saveAdminReadMap(map){
  localStorage.setItem(adminReadStoreKey(), JSON.stringify(map||{}));
}
function setAdminConversationReadAt(convId, iso){
  if(!convId)return;
  const map=readAdminReadMap();
  map[String(convId)] = iso || new Date().toISOString();
  saveAdminReadMap(map);
}
function getAdminConversationReadAt(convId){
  if(!convId)return 0;
  const iso=readAdminReadMap()[String(convId)];
  const t=iso ? new Date(iso).getTime() : 0;
  return Number.isFinite(t) ? t : 0;
}
function adminContactLastMessageTime(c){
  const v=c?.last_message_at || c?.last_message_created_at || c?.latest_message_at || c?.updated_at || c?.created_at || '';
  const t=v ? new Date(v).getTime() : 0;
  return Number.isFinite(t) ? t : 0;
}
function sanitizeAdminContactAfterRead(c){
  if(!c?.conversation_id)return c;
  const readAt=getAdminConversationReadAt(c.conversation_id);
  if(!readAt)return c;
  const lastTs=adminContactLastMessageTime(c);
  if(!lastTs || lastTs<=readAt){
    return {...c, unread_count:0};
  }
  return c;
}
function zeroAdminUnreadLocal(convId){
  if(!convId)return;
  state.developers=(state.developers||[]).map(c=>String(c.conversation_id)===String(convId)?{...c,unread_count:0}:c);
  state.staff=(state.staff||[]).map(c=>String(c.conversation_id)===String(convId)?{...c,unread_count:0}:c);
  if(state.current && String(state.current.conversation_id)===String(convId)){
    state.current={...state.current,unread_count:0};
  }
  renderDevelopers();
  renderStaff();
}
async function markAdminConversationRead(convId){
  if(!convId || !state.adminEmp?.id)return;
  const nowIso=new Date().toISOString();
  setAdminConversationReadAt(convId, nowIso);
  zeroAdminUnreadLocal(convId);
  try{
    await rpc('chat_mark_conversation_read',{
      p_conversation_id: convId,
      p_employee_id: state.adminEmp.id
    });
  }catch(e){
    console.warn('[ADMIN CHAT READ] chat_mark_conversation_read skipped:', e.message||e);
    try{
      const {error}=await sb.from('chat_conversation_reads').upsert({
        conversation_id: convId,
        employee_id: state.adminEmp.id,
        read_at: nowIso
      },{onConflict:'conversation_id,employee_id'});
      if(error) throw error;
    }catch(er){
      console.warn('[ADMIN CHAT READ] direct read marker skipped:', er.message||er);
    }
  }
}
function isDeveloperContact(c){const t=[c?.role_label,c?.role,c?.designation,c?.department,c?.employee_type,c?.full_name].map(v=>String(v||'').toLowerCase()).join(' ');return /developer|devloper|\bdev\b|support/.test(t)}
async function rpc(fn,args){const {data,error}=await sb.rpc(fn,args||{});if(error)throw error;return data}
function localMsgId(){return 'local-'+Date.now()+'-'+Math.random().toString(16).slice(2)}
function messageKey(m){return String(m?.id||m?.client_event_id||'')}
function mergeMessages(oldList,newList){
  const map=new Map();
  (oldList||[]).forEach(m=>{const k=messageKey(m);if(k)map.set(k,m);});
  (newList||[]).forEach(m=>{
    const k=messageKey(m);if(!k)return;
    // Same text/media/time ke local optimistic row ko real DB row se replace karo.
    for(const [ok,ov] of [...map.entries()]){
      if(String(ok).startsWith('local-') &&
         String(ov.sender_employee_id)===String(m.sender_employee_id) &&
         String(ov.message_text||'')===String(m.message_text||'') &&
         String(ov.media_type||'')===String(m.media_type||'') &&
         Math.abs(new Date(ov.created_at||0).getTime()-new Date(m.created_at||0).getTime())<120000){
        map.delete(ok);
      }
    }
    map.set(k,m);
  });
  return [...map.values()].sort((a,b)=>new Date(a.created_at||0)-new Date(b.created_at||0));
}
function showSoftError(msg){
  const now=Date.now();
  if(now-state.lastMessageErrorAt>3500){
    state.lastMessageErrorAt=now;
    toast(msg,true);
  }
}
function getMessageLimit(){return 100}
function getCurrentConversationId(){return state.current?.conversation_id||null}
function getMessagesTableNames(){return ['chat_messages','employee_chat_messages']}
function getPayloadConversationId(payload){
  const row=payload?.new||payload?.old||{};
  return row.conversation_id;
}
function getSession(){let s={},p={};try{s=JSON.parse(localStorage.getItem('currentSession')||'{}')}catch(e){}try{p=JSON.parse(localStorage.getItem('personalData')||'{}')}catch(e){}return{org_code:String(s.orgCode||s.org_code||localStorage.getItem('orgCode')||localStorage.getItem('org_code')||'HOSP001').toUpperCase(),email:s.email||p.email||'',phone:s.phone||p.phone||s.mobile||p.mobile||'',admin_id:s.adminId||s.userId||s.id||p.id||null,admin_name:p.fullName||p.full_name||s.fullName||s.full_name||s.name||'Admin'}}

async function loadDevelopers(){

async function loadStaff(page=state.page){
  state.page=Math.max(1,page);
  const data=await rpc('admin_empchat_get_staff_contacts',{p_org_id:state.org.id,p_admin_employee_id:state.adminEmp.id,p_search:state.search||null,p_limit:state.limit,p_offset:(state.page-1)*state.limit});

  state.staff=(data.items||[]).map(sanitizeAdminContactAfterRead).filter(x=>{

    if(role.includes('owner')||role.includes('developer')||role.includes('devloper')||role.includes('admin'))return false;

}
function renderDevelopers(){

}

function isProtectedContact(c){
  // Developer/support ko block nahi karna. Admin/owner viewer staff/user ko block kar sakta hai.
  return isDeveloperContact(c);
}
function renderChatActions(){
  const c=state.current;
  if(!c){
    $('chatActions').innerHTML='';
    renderChatMenu();
    return;
  }
  const protectedUser=isProtectedContact(c);
  let html=`<button class="action-btn" id="refreshBtn"><span class="material-icons">refresh</span>Refresh</button>`;
  if(currentViewerCanBlock() && !protectedUser){
    html+=`<button class="action-btn danger-action" id="blockBtn"><span class="material-icons">block</span>${blockLabel(c)}</button>`;
  }
  $('chatActions').innerHTML=html;
  $('refreshBtn').onclick=()=>loadMessages();
  if($('blockBtn')) $('blockBtn').onclick=()=>toggleBlock().catch(er=>toast(er.message,true));

}
function renderChatMenu(){
  const menu=$('chatMenu');
  const btn=$('chatMenuBtn');
  if(!menu||!btn)return;
  const c=state.current;
  if(!c){
    btn.style.display='none';
    menu.classList.remove('show');
    menu.innerHTML='';
    return;
  }
  btn.style.display='flex';
  const protectedUser=isProtectedContact(c);
  let html=`<button type="button" id="menuRefresh"><span class="material-icons" style="font-size:1rem">refresh</span> Refresh</button>`;
  if(currentViewerCanBlock() && !protectedUser){
    html+=`<button type="button" id="menuBlock" class="danger-menu"><span class="material-icons" style="font-size:1rem">block</span> ${blockMenuLabel(c)}</button>`;
  }else if(protectedUser){
    html+=`<button type="button" class="muted-menu"><span class="material-icons" style="font-size:1rem">lock</span> Developer protected</button>`;
  }
  menu.innerHTML=html;
  if($('menuRefresh')) $('menuRefresh').onclick=()=>{menu.classList.remove('show');loadMessages().catch(er=>toast(er.message,true));};
  if($('menuBlock')) $('menuBlock').onclick=()=>{menu.classList.remove('show');toggleBlock().catch(er=>toast(er.message,true));};
}
function updateReplyBox(){
  const reply=$('replyArea');
  const c=state.current;
  if(!c){
    reply.innerHTML='<div class="reply-disabled">Select chat first</div>';
    return;
  }
  if(effectiveBlocked(c)){
    reply.innerHTML=`<div class="reply-disabled">Ye chat blocked hai. ${myBlocked(c)?'Unblock karne ke baad message bhej sakte ho.':'Dusre user ne block kiya hai. Aap apni side se bhi Block kar sakte ho.'}</div>`;
    return;
  }
  reply.innerHTML=`<div class="input-group">
    <textarea id="messageInput" rows="1" placeholder="Type message... (Ctrl+Enter)"></textarea>
    <button id="attachMediaBtn" class="attach-btn"><span class="material-icons">attach_file</span></button>
    <input type="file" id="mediaInput" accept="image/*,video/*,audio/*" style="display:none">
    <button id="sendMessageBtn" class="send-btn">Send</button>
  </div>
  <div id="previewArea" class="preview-area"></div>`;
  setupInputEvents();
}
async function toggleBlock(){
  if(!state.current)return;
  if(isProtectedContact(state.current)){
    toast('Developer / Support ko block nahi kar sakte. Staff/User block ho sakta hai.',true);
    return;
  }
  const next=!myBlocked(state.current);
  await rpc('chat_set_block',{
    p_conversation_id:state.current.conversation_id,
    p_employee_id:state.adminEmp.id,
    p_blocked:next
  });
  state.current={...state.current,my_is_blocked:next,blocked_by_me:next,is_blocked: next || otherBlocked(state.current)};
  toast(next?'User blocked':'User unblocked');
  renderChatActions();
  updateReplyBox();
  await loadDevelopers().catch(()=>{});
  await loadStaff(state.page).catch(()=>{});
}

async function selectContact(convId){
  const all=[...state.developers,...state.staff];
  const c=all.find(x=>String(x.conversation_id)===String(convId));
  if(!c)return;
  state.current=sanitizeAdminContactAfterRead(c);
  $('chatName').textContent=c.full_name;
  $('chatRole').textContent=`${c.role_label||'Staff'} • ${c.emp_code||''} • ${c.online?'Online':'Offline'}`;
  $('chatAvatar').textContent=initials(c.full_name);
  renderChatActions();
  updateReplyBox();
  openMobileChat();
  setupConversationRealtime(c.conversation_id);
  await loadMessages(true);
  await markAdminConversationRead(c.conversation_id);
  renderDevelopers();renderStaff();
}
async function loadMessages(forceBottom=false){
  if(!state.current||!state.adminEmp?.id)return;
  if(state.loadMessagesRunning)return;
  const convId=state.current.conversation_id;
  const box=$('messagesArea');
  const wasNear=forceBottom || state.forceScrollBottom || isNearBottom();
  const oldTop=box?box.scrollTop:0;
  const oldHeight=box?box.scrollHeight:0;
  state.loadMessagesRunning=true;
  try{
    const rows=await rpc('admin_empchat_get_messages',{
      p_conversation_id:convId,
      p_admin_employee_id:state.adminEmp.id,
      p_limit:getMessageLimit()
    });
    if(getCurrentConversationId()!==convId)return;
    state.messages=mergeMessages(state.messages, rows||[]);
    renderMessages({stickToBottom:wasNear,oldTop,oldHeight});
    await markAdminConversationRead(convId);
  }catch(e){
    console.error('loadMessages failed:',e);
    showSoftError(e.message||'Messages load error');
  }finally{
    state.forceScrollBottom=false;
    state.loadMessagesRunning=false;
  }
}
function renderMessages(opts={}){
  const box=$('messagesArea');
  const stickToBottom=opts.stickToBottom!==false;
  const oldTop=opts.oldTop||0;
  const oldHeight=opts.oldHeight||0;
  if(!state.messages.length){box.innerHTML='<div class="empty">No messages yet.</div>';updateScrollBottomButton();return}
  box.innerHTML=state.messages.map(m=>{
    const sent=String(m.sender_employee_id)===String(state.adminEmp.id);
    const src=esc(mediaSrc(m));
    let content='';
    if(m.media_type==='image')content+=`<img src="${src}" class="msg-media" onclick="openImageViewer(this.src)"><div class="media-tools"><a href="${src}" download class="media-link"><span class="material-icons" style="font-size:.95rem">download</span>Download</a></div>`;
    if(m.media_type==='video')content+=`<video controls src="${src}" class="msg-media"></video><div class="media-tools"><a href="${src}" download class="media-link"><span class="material-icons" style="font-size:.95rem">download</span>Download Video</a></div>`;
    if(m.media_type==='audio')content+=`<audio controls style="width:230px;max-width:100%;margin-top:5px" src="${src}"></audio><div class="media-tools"><a href="${src}" download class="media-link"><span class="material-icons" style="font-size:.95rem">download</span>Download Audio</a></div>`;
    if(m.message_text)content+=`<div>${esc(m.message_text)}</div>`;
    const bothAllowed=canDeleteForBoth(m);
    return `<div class="message-wrapper" data-msg-id="${esc(m.id)}">
      <div class="message-bubble ${sent?'sent-msg':'received-msg'}">
        <div class="bubble">${content||'<i>Media</i>'}<div class="msg-time">${fmtTime(m.created_at)}${m._sending?' • sending...':''}</div></div>
      </div>
      <button class="msg-more always" type="button" data-del-open="${esc(m.id)}" title="Delete options"><span class="material-icons" style="font-size:1rem">more_vert</span></button>
      <div class="delete-menu" data-del-menu="${esc(m.id)}">
        ${bothAllowed?`<button type="button" class="danger" data-delete-both="${esc(m.id)}"><span class="material-icons" style="font-size:1rem">delete_forever</span>Delete for Both</button>`:''}
        <button type="button" data-delete-me="${esc(m.id)}"><span class="material-icons" style="font-size:1rem">delete_outline</span>Delete for Me</button>
        <div class="delete-note">${bothAllowed?'Both side delete 5 min ke andar available hai.':'Both side delete sirf apne sent message par 5 min tak.'}</div>
      </div>
    </div>`;
  }).join('');
  if(stickToBottom){box.scrollTop=box.scrollHeight;}else{box.scrollTop=oldTop+(box.scrollHeight-oldHeight > 0 ? 0 : 0);}
  updateScrollBottomButton();
}
function openMobileChat(){

  document.querySelector('.chat-container').classList.add('mobile-chat-open');
  document.body.classList.add('mobile-chat-active');

    const box=$('messagesArea');

function closeMobileChat(){

  document.querySelector('.chat-container').classList.remove('mobile-chat-open');
  document.body.classList.remove('mobile-chat-active');
}
function showTyping(name){
  const el=$('typingIndicator');
  el.innerHTML=`<span class="typing-dots">${esc(name||'User')} kuch type kar raha hai</span>`;
  el.classList.add('show');
  clearTimeout(state.typingTimer);
  state.typingTimer=setTimeout(()=>{el.classList.remove('show');el.innerHTML=''},2200);
}
function setupGlobalRealtime(){
  if(!state.org?.id)return;
  try{ if(state.globalChannel) sb.removeChannel(state.globalChannel); }catch(e){}
  let ch=sb.channel('admin-contact-list-'+state.org.id+'-'+state.adminEmp.id);
  getMessagesTableNames().forEach(tbl=>{
    ch=ch.on('postgres_changes',{event:'*',schema:'public',table:tbl},async(payload)=>{
      const row=payload.new||payload.old||{};
      // Org filter realtime payload me ho to use karo, nahi to safe refresh.
      if(row.org_id && String(row.org_id)!==String(state.org.id))return;
      await loadDevelopers().catch(()=>{});
      await loadStaff(state.page).catch(()=>{});
    });
  });
  state.globalChannel=ch.subscribe(status=>{ if(status==='CHANNEL_ERROR') console.warn('Realtime contact list channel error'); });
}
function setupConversationRealtime(conversationId){
  try{ if(state.chatChannel) sb.removeChannel(state.chatChannel); }catch(e){}
  const channelName='admin-chat-'+conversationId+'-'+state.adminEmp.id;
  let ch=sb.channel(channelName,{config:{broadcast:{self:false}}})
    .on('broadcast',{event:'typing'},payload=>{
      const p=payload.payload||{};
      if(String(p.conversation_id)!==String(conversationId))return;
      if(String(p.sender_employee_id)===String(state.adminEmp.id))return;
      if(p.is_typing===false){$('typingIndicator').classList.remove('show');$('typingIndicator').innerHTML='';return;}
      showTyping(p.sender_name||state.current?.full_name||'User');
    })
    .on('postgres_changes',{event:'*',schema:'public',table:'chat_typing_status',filter:`conversation_id=eq.${conversationId}`},payload=>{
      const row=payload.new||{};
      if(String(row.conversation_id)!==String(conversationId))return;
      if(String(row.employee_id)===String(state.adminEmp.id))return;
      const fresh=Date.now()-new Date(row.updated_at||0).getTime()<6000;
      if(row.is_typing&&fresh) showTyping(row.sender_name||state.current?.full_name||'User');
      else {$('typingIndicator').classList.remove('show');$('typingIndicator').innerHTML='';}
    });

  getMessagesTableNames().forEach(tbl=>{
    ch=ch.on('postgres_changes',{event:'*',schema:'public',table:tbl,filter:`conversation_id=eq.${conversationId}`},async(payload)=>{
      if(String(getPayloadConversationId(payload))!==String(conversationId))return;
      state.forceScrollBottom=isNearBottom() || String((payload.new||{}).sender_employee_id)===String(state.adminEmp.id);
      await loadMessages(state.forceScrollBottom).catch(()=>{});
      await loadDevelopers().catch(()=>{});
      await loadStaff(state.page).catch(()=>{});
    });
  });

  state.chatChannel=ch.subscribe(status=>{ if(status==='CHANNEL_ERROR') console.warn('Realtime chat channel error'); });
}
async function setMyTyping(isTyping){
  if(!state.current||!state.adminEmp?.id)return;
  const payload={conversation_id:state.current.conversation_id,employee_id:state.adminEmp.id,is_typing:!!isTyping,updated_at:new Date().toISOString(),sender_name:state.adminEmp.full_name||'Admin'};
  try{await sb.from('chat_typing_status').upsert(payload,{onConflict:'conversation_id,employee_id'});}catch(e){}
  try{
    if(state.chatChannel){
      await state.chatChannel.send({type:'broadcast',event:'typing',payload:{conversation_id:state.current.conversation_id,sender_employee_id:state.adminEmp.id,sender_name:state.adminEmp.full_name||'Admin',is_typing:!!isTyping}});
    }
  }catch(e){}
}
function sendTypingSignal(){
  if(!state.current)return;
  const now=Date.now();
  if(now-state.lastTypingSent>900){
    state.lastTypingSent=now;
    setMyTyping(true);
  }
  clearTimeout(state.myTypingTimer);
  state.myTypingTimer=setTimeout(()=>setMyTyping(false),1600);
}
function startSmartPolling(){
  setInterval(()=>{
    loadDevelopers().catch(()=>{});
    loadStaff(state.page).catch(()=>{});
    // Realtime active ho to heavy message polling mat karo. Fallback ke liye 5 sec par safe refresh.
    if(state.current && !state.loadMessagesRunning) loadMessages(false).catch(()=>{});
  },5000);
}
function setupInputEvents(){
  if($('sendMessageBtn')) $('sendMessageBtn').onclick=sendMessage;
  if($('messageInput')){
    $('messageInput').onkeydown=e=>{if(e.ctrlKey&&e.key==='Enter')sendMessage()};
    $('messageInput').oninput=sendTypingSignal;
  }
  if($('attachMediaBtn')) $('attachMediaBtn').onclick=()=>$('mediaInput')?.click();
  if($('mediaInput')) $('mediaInput').onchange=handleMediaSelect;
}
function handleMediaSelect(e){
  const file=e.target.files[0];if(!file)return;
  if(!file.type.startsWith('image/')&&!file.type.startsWith('video/')&&!file.type.startsWith('audio/'))return toast('Only image/video/audio allowed',true);
  if(file.size>8*1024*1024)return toast('Max 8MB allowed',true);
  const reader=new FileReader();
  reader.onload=ev=>{
    let mt='audio';if(file.type.startsWith('image/'))mt='image';if(file.type.startsWith('video/'))mt='video';
    state.pendingMedia={type:mt,data:ev.target.result};
    const preview = mt==='image'?`<img src="${state.pendingMedia.data}">`:(mt==='video'?`<video src="${state.pendingMedia.data}"></video>`:`<div style="width:65px;height:65px;border-radius:8px;border:1px solid #e2e8f0;display:flex;align-items:center;justify-content:center;background:#f8fafc;color:#1f6e68"><span class="material-icons">audiotrack</span></div>`);
    if($('previewArea')) $('previewArea').innerHTML=`<div class="preview-item">${preview}<div class="remove-preview" id="clearPreview">×</div></div>`;
    if($('clearPreview')) $('clearPreview').onclick=()=>{state.pendingMedia=null;if($('previewArea')) $('previewArea').innerHTML=''};
  };
  reader.readAsDataURL(file);e.target.value='';
}
async function sendMessage(){
  if(!state.current)return toast('Select chat first',true);
  if(effectiveBlocked(state.current))return toast(myBlocked(state.current)?'Chat blocked hai. Pehle unblock karo.':'Dusre user ne block kiya hai. Message send nahi hoga.',true);
  const input=$('messageInput');
  const text=input?.value.trim()||'';
  const media=state.pendingMedia?{...state.pendingMedia}:null;
  if(!text&&!media)return toast('Message/image/video/audio required',true);

  const optimisticId=localMsgId();
  const optimistic={
    id:optimisticId,
    conversation_id:state.current.conversation_id,
    sender_employee_id:state.adminEmp.id,
    receiver_employee_id:state.current.employee_id||null,
    message_text:text||null,
    media_type:media?.type||null,
    media_data:media?.data||null,
    media_url:null,
    created_at:new Date().toISOString(),
    _sending:true
  };

  state.messages=mergeMessages(state.messages,[optimistic]);
  state.lastLocalMessageId=optimisticId;
  state.forceScrollBottom=true;
  renderMessages({stickToBottom:true});

  if(input)input.value='';
  state.pendingMedia=null;
  if($('previewArea')) $('previewArea').innerHTML='';
  await setMyTyping(false);

  try{
    await rpc('admin_empchat_send_message',{
      p_conversation_id:state.current.conversation_id,
      p_admin_employee_id:state.adminEmp.id,
      p_message_text:text||null,
      p_media_type:media?.type||null,
      p_media_data:media?.data||null
    });
    await new Promise(r=>setTimeout(r,300));
    state.forceScrollBottom=true;
    await loadMessages(true);
    await loadDevelopers().catch(()=>{});
    await loadStaff(state.page).catch(()=>{});
  }catch(e){
    state.messages=state.messages.map(m=>String(m.id)===String(optimisticId)?{...m,_sending:false,_failed:true,message_text:(m.message_text||text||'')+'  ❌ Failed'}:m);
    renderMessages({stickToBottom:true});
    toast(e.message||'Message send failed',true);
  }
}
$('developerList').onclick=e=>{const item=e.target.closest('.contact-item');if(item)selectContact(item.dataset.conv).catch(er=>toast(er.message,true))};
$('staffList').onclick=e=>{const item=e.target.closest('.contact-item');if(item)selectContact(item.dataset.conv).catch(er=>toast(er.message,true))};
$('searchStaff').onkeydown=e=>{if(e.key==='Enter')$('searchBtn').click()};
$('searchBtn').onclick=()=>{state.search=$('searchStaff').value.trim();loadStaff(1).catch(e=>toast(e.message,true))};
$('prevPage').onclick=()=>loadStaff(state.page-1).catch(e=>toast(e.message,true));
$('nextPage').onclick=()=>loadStaff(state.page+1).catch(e=>toast(e.message,true));
$('mobileChatBack').onclick=closeMobileChat;

if($('chatMenuBtn')) $('chatMenuBtn').onclick=(e)=>{e.stopPropagation();if(!$('chatMenu'))return;$('chatMenu').classList.toggle('show');};
document.addEventListener('click',(e)=>{const menu=$('chatMenu');const btn=$('chatMenuBtn');if(menu&&btn&&!menu.contains(e.target)&&!btn.contains(e.target))menu.classList.remove('show');});
if($('scrollBottomBtn')) $('scrollBottomBtn').onclick=scrollToBottom;
if($('messagesArea')) $('messagesArea').addEventListener('scroll',updateScrollBottomButton);
if($('messagesArea')) $('messagesArea').addEventListener('click',(e)=>{
  const open=e.target.closest('[data-del-open]');
  if(open){e.stopPropagation();return openMessageDeleteMenu(open.dataset.delOpen);}
  const both=e.target.closest('[data-delete-both]');
  if(both){e.stopPropagation();closeDeleteMenus();return openDeleteConfirm(both.dataset.deleteBoth,'both');}
  const me=e.target.closest('[data-delete-me]');
  if(me){e.stopPropagation();closeDeleteMenus();return openDeleteConfirm(me.dataset.deleteMe,'me');}
});
if($('imageViewer')) $('imageViewer').onclick=closeImageViewer;
if($('confirmDeleteBoth')) $('confirmDeleteBoth').onclick=()=>deleteMessage('both').catch(e=>toast(e.message,true));
if($('confirmDeleteMe')) $('confirmDeleteMe').onclick=()=>deleteMessage('me').catch(e=>toast(e.message,true));
if($('cancelDeleteMsg')) $('cancelDeleteMsg').onclick=closeDeleteConfirm;
if($('deleteConfirm')) $('deleteConfirm').onclick=e=>{if(e.target.id==='deleteConfirm')closeDeleteConfirm();};
document.addEventListener('click',(e)=>{if(!e.target.closest('.delete-menu')&&!e.target.closest('[data-del-open]'))closeDeleteMenus();});
window.addEventListener('popstate',()=>{ if(state.isMobileChatOpen) closeMobileChat(); });
$('backBtn').onclick=()=>{ if(state.isMobileChatOpen){ closeMobileChat(); return; } history.length>1?history.back():location.href='admin.html'; };
window.addEventListener('beforeunload',()=>{try{setMyTyping(false);if(state.chatChannel)sb.removeChannel(state.chatChannel);if(state.globalChannel)sb.removeChannel(state.globalChannel)}catch(e){}});
init().catch(e=>{toast(e.message,true);$('staffList').innerHTML='<div class="empty" style="color:#b91c1c">'+esc(e.message)+'</div>'});
</script>
