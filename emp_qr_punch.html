<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Employee QR Punch | Supabase</title>
<script src="https://unpkg.com/html5-qrcode"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0;font-family:Inter,system-ui,Segoe UI,Roboto,sans-serif}
body{min-height:100vh;background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);padding:22px;color:#123}
.card{max-width:850px;margin:auto;background:#fff;border-radius:28px;box-shadow:0 25px 45px rgba(0,0,0,.35);overflow:hidden}
.head{background:#0a2c2f;color:#fff;padding:16px 22px;display:flex;justify-content:space-between;align-items:center;gap:10px;flex-wrap:wrap}
.back{background:rgba(255,255,255,.14);border:0;color:#fff;border-radius:999px;padding:9px 17px;cursor:pointer;font-weight:800}
.body{padding:24px}.emp{background:#f1f8f6;border-radius:18px;padding:13px;margin-bottom:18px;font-weight:800;color:#14532d}
#reader{width:100%;max-width:420px;margin:14px auto;border-radius:18px;overflow:hidden}
.input-row{display:flex;gap:10px;flex-wrap:wrap;margin:16px 0}input{flex:1;min-width:220px;padding:12px 15px;border-radius:999px;border:1px solid #cbd5e1}button{border:0;border-radius:999px;padding:12px 18px;font-weight:900;cursor:pointer}
.primary{background:#1f6e68;color:#fff}.light{background:#e2e8f0;color:#0f172a}.status{margin-top:16px;padding:14px;border-radius:18px;background:#f8fafc;color:#334155;line-height:1.6;font-weight:700}
.toast{position:fixed;left:18px;bottom:18px;background:#14532d;color:#fff;border-radius:999px;padding:12px 18px;z-index:99;font-weight:900}.toast.err{background:#991b1b}
</style>
</head>
<body>
<div class="card">
  <div class="head"><button class="back" onclick="history.back()">← Back</button><h2>QR Attendance Punch</h2><button class="back" id="refreshBtn">Refresh</button></div>
  <div class="body">
    <div class="emp" id="empBox">Loading employee...</div>
    <button class="primary" id="startScanBtn">Start Camera Scan</button>
    <button class="light" id="stopScanBtn">Stop</button>
    <div id="reader"></div>
    <div class="input-row"><input id="tokenInput" placeholder="QR token manually paste karo"><button class="primary" id="submitTokenBtn">Submit QR Punch</button></div>
    <div class="status" id="statusBox">QR scan karo ya token paste karo. Valid QR se attendance table me punch save hoga.</div>
  </div>
</div>
<script>
const SUPABASE_URL='https://tovpcbzztvkiwamimrxt.supabase.co';
const SUPABASE_ANON_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InRvdnBjYnp6dHZraXdhbWltcnh0Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3Nzg0OTYwMzAsImV4cCI6MjA5NDA3MjAzMH0.utU3KsVOdSzl2Q6ay6-HlB_7RgzEGUMvasFfWclW4XE';
function sbRpc(fn,args){return fetch(SUPABASE_URL+'/rest/v1/rpc/'+fn,{method:'POST',headers:{apikey:SUPABASE_ANON_KEY,Authorization:'Bearer '+SUPABASE_ANON_KEY,'Content-Type':'application/json'},body:JSON.stringify(args||{})}).then(async r=>{const t=await r.text();let d=null;try{d=t?JSON.parse(t):null}catch{d=t}if(!r.ok)throw new Error(d?.message||d?.details||t||r.statusText);return d})}
const $=id=>document.getElementById(id); let scanner=null; let busy=false;
function toast(m,e=false){const old=document.querySelector('.toast');if(old)old.remove();const d=document.createElement('div');d.className='toast'+(e?' err':'');d.textContent=m;document.body.appendChild(d);setTimeout(()=>d.remove(),3000)}
function getLogin(){let cur={};try{cur=JSON.parse(localStorage.getItem('inlist_employee_login_v2')||localStorage.getItem('currentEmployee')||'{}')}catch(e){};return{org_code:(cur.org_code||cur.orgCode||localStorage.getItem('org_code')||localStorage.getItem('orgCode')||'HOSP001').toUpperCase(),emp_code:(cur.emp_code||cur.empCode||localStorage.getItem('emp_code')||localStorage.getItem('empCode')||'EMP001').toUpperCase()}}
function setStatus(html){$('statusBox').innerHTML=html}
async function submitToken(token){
  if(busy)return; token=String(token||'').trim(); if(!token)return toast('QR token missing',true);
  busy=true; setStatus('Punch saving...');
  try{
    const login=getLogin();
    const data=await sbRpc('app_qr_attendance_punch',{p_org_code:login.org_code,p_emp_code:login.emp_code,p_token:token,p_device_id:localStorage.getItem('inlist_verified_device_id_v1')||null});
    setStatus(`<b>Saved!</b><br>Status: ${data.status}<br>Date: ${data.attendance_date}<br>Punch In: ${data.punch_in||'--'}<br>Punch Out: ${data.punch_out||'--'}`);
    toast('QR attendance saved');
  }catch(e){setStatus('<b>Error:</b> '+e.message);toast(e.message,true)}
  finally{busy=false}
}
async function startScan(){
  if(scanner) return;
  scanner=new Html5Qrcode('reader');
  await scanner.start({facingMode:'environment'},{fps:10,qrbox:{width:250,height:250}}, async decoded=>{
    $('tokenInput').value=decoded;
    await stopScan();
    submitToken(decoded);
  });
}
async function stopScan(){if(scanner){try{await scanner.stop()}catch(e){} scanner.clear(); scanner=null}}
$('startScanBtn').onclick=()=>startScan().catch(e=>toast(e.message,true)); $('stopScanBtn').onclick=stopScan; $('submitTokenBtn').onclick=()=>submitToken($('tokenInput').value); $('refreshBtn').onclick=()=>location.reload();
const l=getLogin(); $('empBox').textContent=`Employee: ${l.emp_code} | Org: ${l.org_code}`;
</script>
</body>
</html>
